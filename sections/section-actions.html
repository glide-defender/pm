<script>

// ═══ ROW ACTION MENU (context) ═══
window.showRowMenu = function(btn, actions) {
  document.querySelectorAll('.row-menu-pop').forEach(x=>x.remove());
  const rect = btn.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.className = 'row-menu-pop';
  menu.style.cssText = `position:fixed;top:${rect.bottom+4}px;left:${rect.right-180}px;min-width:180px;background:#1a1a1a;border:1px solid #333;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:999;padding:4px;font-family:inherit`;
  menu.innerHTML = actions.map((a,i)=>a.divider?'<div style="height:1px;background:#2a2a2a;margin:4px 0"></div>':`<div data-i="${i}" style="padding:7px 12px;font-size:12.5px;color:${a.color||'#E5E7EB'};border-radius:5px;cursor:pointer;user-select:none">${a.label}</div>`).join('');
  menu.querySelectorAll('[data-i]').forEach(el=>{el.onmouseenter=()=>el.style.background='#252525';el.onmouseleave=()=>el.style.background='';el.onclick=e=>{e.stopPropagation();menu.remove();actions[+el.dataset.i].fn();};});
  document.body.appendChild(menu);
  setTimeout(()=>{document.addEventListener('click',function closeMenu(){menu.remove();document.removeEventListener('click',closeMenu);},{once:true});},50);
};

window.healthDot = function(status) {
  const s = (status||'').toLowerCase();
  if (/open|blocked|overdue|critical|late|fail|not started/.test(s)) return '🔴';
  if (/progress|partial|warn|review|pending|draft/.test(s)) return '🟡';
  if (/closed|complete|paid|done|healthy|ok|on time|resolved/.test(s)) return '🟢';
  return '⚪';
};
window.healthColor = function(status) {
  const s = (status||'').toLowerCase();
  if (/open|blocked|overdue|critical|late|fail|not started/.test(s)) return '#EF4444';
  if (/progress|partial|warn|review|pending|draft/.test(s)) return '#F59E0B';
  if (/closed|complete|paid|done|healthy|ok|on time|resolved/.test(s)) return '#22C55E';
  return '#6a6a6a';
};

window.attachmentsWidget = function(entityType, entityId) {
  const key = entityType + ':' + entityId;
  const list = (window.__ATTACHMENTS__[key]||[]);
  const rows = list.length ? list.map((a,i) => `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#181818;border:1px solid #262626;border-radius:6px;margin-bottom:4px"><span style="font-size:14px">${a.ext==='pdf'?'📄':a.ext==='jpg'||a.ext==='png'?'🖼️':'📎'}</span><span style="flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</span><span style="font-size:10.5px;color:#6a6a6a">${a.size||''}</span><button class="btn" style="padding:3px 8px;font-size:11px" onclick="window.__removeAttach('${key}',${i})">×</button></div>`).join('') : '<div style="padding:8px 0;color:#6a6a6a;font-size:11.5px;font-style:italic">No attachments</div>';
  return `<div style="margin-top:14px;padding-top:12px;border-top:1px solid #2a2a2a"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#9CA3AF">Attachments (${list.length})</div><button class="btn" style="padding:5px 10px;font-size:11px" onclick="window.__addAttach('${entityType}',${JSON.stringify(entityId)})">+ Attach file</button></div>${rows}</div>`;
};
window.__addAttach = function(et, id) {
  const name = prompt('File name (demo — real version opens file picker):', 'photo.jpg');
  if (!name) return;
  const ext = (name.split('.').pop()||'').toLowerCase();
  const key = et + ':' + id;
  (window.__ATTACHMENTS__[key] = window.__ATTACHMENTS__[key] || []).push({ name, ext, size: '0.8 MB', by: 'Alex Morgan', at: new Date().toISOString() });
  console.log('Make payload (attach):', { entityType: et, entityId: id, name });try{parent.postMessage({type:'toast',msg:'Saved',kind:'success'},'*');}catch(e){}
  const widget = document.querySelector('[onclick*="__addAttach"]')?.closest('div').parentElement;
  if (widget) widget.outerHTML = window.attachmentsWidget(et, id);
};
window.__removeAttach = function(key, idx) {
  if (!confirm('Remove this attachment?')) return;
  window.__ATTACHMENTS__[key].splice(idx, 1);
  const [et, id] = key.split(':');
  const widget = document.querySelector(`[onclick*="__addAttach(\\'${et}\\',${JSON.stringify(id.includes(',')?id:+id||id)}"]`)?.closest('div').parentElement;
  if (widget) widget.outerHTML = window.attachmentsWidget(et, id.includes(',')?id:+id||id);
};

// ═══ @-mention autocomplete ═══
window.__CONTACTS__ = window.__CONTACTS__ || ['Alex Morgan','Sam Rivera','John Doe','Taylor Brooks','Jennifer Doe'];
window.__wireMention = function(inputId, hostId) {
  const inp = document.getElementById(inputId);
  if (!inp || inp.dataset.mwired) return;
  inp.dataset.mwired = '1';
  let dropdown = null;
  function closeDrop(){ if(dropdown){dropdown.remove();dropdown=null;} }
  inp.addEventListener('input', e=>{
    const v = e.target.value;
    const pos = e.target.selectionStart;
    const before = v.slice(0, pos);
    const m = before.match(/@([a-zA-Z ]*)$/);
    closeDrop();
    if (!m) return;
    const q = m[1].toLowerCase();
    const matches = window.__CONTACTS__.filter(c => c.toLowerCase().includes(q)).slice(0,5);
    if (!matches.length) return;
    dropdown = document.createElement('div');
    dropdown.style.cssText = 'position:absolute;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:7px;box-shadow:0 8px 20px rgba(0,0,0,.5);padding:3px;z-index:200;min-width:180px';
    const r = inp.getBoundingClientRect();
    dropdown.style.left = r.left+'px';
    dropdown.style.top = (r.top-5-matches.length*30)+'px';
    dropdown.innerHTML = matches.map((c,i)=>`<div data-c="${c}" style="padding:6px 10px;font-size:12px;border-radius:4px;cursor:pointer${i===0?';background:#252525':''}">${c}</div>`).join('');
    document.body.appendChild(dropdown);
    dropdown.querySelectorAll('[data-c]').forEach(el=>{
      el.onmousedown=ev=>{
        ev.preventDefault();
        const c = el.dataset.c;
        const newVal = v.slice(0, pos - m[0].length) + '@' + c + ' ' + v.slice(pos);
        inp.value = newVal;
        inp.focus();
        closeDrop();
      };
    });
  });
  inp.addEventListener('blur', ()=>setTimeout(closeDrop,150));
};

window.originLink = function(entity) {
  if (!entity?.originFrom) return '';
  const label = entity.originFrom==='punch'?'Punch Item':entity.originFrom==='observation'?'Observation':entity.originFrom==='rfi'?'RFI':entity.originFrom==='meeting'?'Meeting':'Source';
  return `<div style="margin-bottom:14px;padding:8px 12px;background:rgba(66,134,244,.08);border:1px solid rgba(66,134,244,.2);border-left:2px solid #4286f4;border-radius:6px;font-size:11.5px;color:#9ec2f4">↳ Converted from ${label} #${entity.originId}</div>`;
};

// ═══ Auto-wire mentions on any comment input added to DOM ═══
(function(){
  const obs = new MutationObserver(muts=>{
    muts.forEach(m=>m.addedNodes.forEach(n=>{
      if (n.nodeType!==1) return;
      const inputs = n.querySelectorAll ? n.querySelectorAll('input[id^="cw-in-"]') : [];
      inputs.forEach(inp=>window.__wireMention(inp.id,''));
      if (n.id && n.id.startsWith('cw-in-')) window.__wireMention(n.id,'');
    }));
  });
  obs.observe(document.body, { childList:true, subtree:true });
})();

window.commentsWidget = function(entityType, entityId) {
  const key = entityType + ':' + entityId;
  const list = window.__COMMENTS__[key] || [];
  const renderList = list.length
    ? list.map(c => `<div style="padding:8px 0;border-bottom:1px solid #252525;font-size:12px"><div style="display:flex;gap:6px;align-items:baseline"><strong style="color:#E5E7EB">${c.who}</strong><span style="color:#6a6a6a;font-size:10.5px">${new Date(c.at).toLocaleDateString('en-US',{month:'short',day:'numeric'})} ${new Date(c.at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div><div style="color:#9CA3AF;margin-top:2px;line-height:1.5">${c.txt.replace(/@(\w+(?:\s\w+)?)/g,'<span style="color:#60a5fa;font-weight:600">@$1</span>')}</div></div>`).join('')
    : '<div style="padding:10px 0;color:#6a6a6a;font-size:11.5px;font-style:italic">No comments yet</div>';
  return `<div style="margin-top:16px;padding-top:14px;border-top:1px solid #2a2a2a"><div style="font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#9CA3AF;margin-bottom:8px">Comments (${list.length})</div><div id="cw-list-${entityId}">${renderList}</div><div style="display:flex;gap:6px;margin-top:10px"><input class="fi" id="cw-in-${entityId}" placeholder="Add a comment… (use @ to mention)" style="flex:1"/><button class="btn bp" onmouseenter="window.__wireMention('cw-in-'+arguments[0].target?.id||'','')" onclick="__postComment('${entityType}',${JSON.stringify(entityId)})">Post</button></div></div>`;
};
window.__postComment = function(entityType, entityId) {
  const key = entityType + ':' + entityId;
  const inp = document.getElementById('cw-in-'+entityId);
  const txt = inp.value.trim();
  if (!txt) return;
  (window.__COMMENTS__[key] = window.__COMMENTS__[key] || []).push({ who: 'Alex Morgan', txt, at: new Date().toISOString() });
  console.log('Make payload (comment):', { entityType, entityId, txt });try{parent.postMessage({type:'toast',msg:'Saved',kind:'success'},'*');}catch(e){}
  inp.value = '';
  const host = inp.closest('div').parentElement;
  host.outerHTML = window.commentsWidget(entityType, entityId);
};

// ═══ PAYLOAD INGESTION ═══
// Reads window.__PAYLOAD__, normalizes schema-shape tasks/milestones into internal demo shape
// so the existing UI code stays unchanged. Outbound Make payloads (save/bulk/import/delete)
// emit schema shape via buildSavePayload() et al. Falls through to demo on empty/malformed.
(function ingestPayload(){
  try {
    const P = window.__PAYLOAD__;
    if (!P) return;

    const expectedVersion = 1;
    const actualVersion = P?.meta?.payload_version;
    if (actualVersion != null && actualVersion !== expectedVersion) {
      console.warn(`[tasks] payload v${expectedVersion} expected, got v${actualVersion} — rendering best-effort`);
    }

    // ── Contact lookups (project contacts first, then account-wide); dedupe by email ──
    const projectContacts = Array.isArray(P?.contacts) ? P.contacts : [];
    const allContacts = Array.isArray(P?.lookups?.all_contacts) ? P.lookups.all_contacts : [];
    projectContacts.forEach(c => {
      if (c?.email) __contactByEmail[c.email] = c.name || c.email;
      if (c?.name) __contactByName[c.name] = c.email || null;
    });
    allContacts.forEach(c => {
      if (c?.email && !__contactByEmail[c.email]) __contactByEmail[c.email] = c.name || c.email;
      if (c?.name && !__contactByName[c.name]) __contactByName[c.name] = c.email || null;
    });
    // Project-first ordering for @-mention autocomplete (per INGESTION-TEMPLATE §1)
    const orderedNames = [...new Set([
      ...projectContacts.map(c => c?.name).filter(Boolean),
      ...allContacts.map(c => c?.name).filter(Boolean)
    ])];
    if (orderedNames.length) window.__CONTACTS__ = orderedNames;

    // ── Normalize milestones ──
    if (Array.isArray(P?.milestones) && P.milestones.length) {
      const normMs = P.milestones
        .filter(m => m && typeof m === 'object')
        .map(m => ({
          id: m.id ?? null,
          name: m.name ?? '(untitled milestone)',
          phase: m.phase ?? '',
          status: m.status ?? null,
          duration_days: m.duration_days ?? null,
          owner_email: m.owner_email ?? null
        }))
        .filter(m => m.id != null);
      if (normMs.length) MS = normMs;
    }

    // ── Normalize tasks ──
    if (Array.isArray(P?.tasks) && P.tasks.length) {
      const normTasks = P.tasks
        .filter(t => t && typeof t === 'object')
        .map(t => {
          const email = t.assignee_email ?? t.owner_email ?? null;
          const ownerName = t.owner ?? (email ? (__contactByEmail[email] || email) : '');
          return {
            id: t.id ?? null,
            name: t.title ?? t.name ?? '(untitled task)',
            ms: t.milestone_id ?? t.ms ?? (MS[0]?.id ?? null),
            status: t.status ?? 'Not Started',
            owner: ownerName,
            owner_email: email,                         // pass-through for My Work filter
            progress: typeof t.percent_complete === 'number' ? t.percent_complete
                    : typeof t.progress === 'number' ? t.progress : 0,
            durationDays: t.duration_days ?? t.durationDays ?? 1,
            start: t.start ?? null,
            end: t.end ?? null,
            priority: t.priority ?? 'Normal',
            originFrom: t.originFrom ?? null,
            originId: t.originId ?? null
          };
        })
        .filter(t => t.id != null);
      if (normTasks.length) items = normTasks;
    }

    console.warn('Payload ingestion active:', 'tasks');
  } catch (err) {
    console.warn(`[tasks] payload ingestion failed, falling back to demo data:`, err);
  }
})();

// ═══ OUTBOUND PAYLOAD BUILDER (schema.md tasks[] shape) ═══
function buildSavePayload(task, isNew) {
  return {
    ...(isNew ? {} : { id: task.id }),
    title: task.name,
    milestone_id: task.ms,
    assignee_email: task.owner_email ?? null,
    duration_days: task.durationDays ?? 1,
    percent_complete: task.progress ?? 0,
    status: task.status,
    priority: task.priority ?? 'Normal',
    originFrom: task.originFrom ?? null,
    originId: task.originId ?? null
  };
}

const sc = s => {
  const x = (s||'').toLowerCase();
  if (/open|blocked|overdue|critical|late|fail|not started/.test(x)) return 'p-o';
  if (/progress|partial|warn|review|pending|draft/.test(x)) return 'p-p';
  return 'p-c';
};
const init = n => (n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const pcol = p => p>=95?'#22C55E':p>=50?'#F59E0B':p>0?'#4286f4':'#6a6a6a';
const isOpen = s => /open|not started|todo|backlog/i.test(s||'');
const isProg = s => /progress|partial|review|pending|draft/i.test(s||'');
const isDone = s => /closed|complete|done|resolved/i.test(s||'');
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

function filtered(){
  const q = document.getElementById('srch').value.toLowerCase();
  const fs = document.getElementById('fstatus').value;
  let list = items;
  if (fs) list = list.filter(i => i.status === fs);
  return !q ? list : list.filter(i =>
    JSON.stringify(i).toLowerCase().includes(q) ||
    (MS.find(m => m.id === i.ms)?.name || '').toLowerCase().includes(q)
  );
}

function renderAll(){
  document.getElementById('k-o').textContent = items.filter(i=>isOpen(i.status)).length;
  document.getElementById('k-p').textContent = items.filter(i=>isProg(i.status)).length;
  document.getElementById('k-c').textContent = items.filter(i=>isDone(i.status)).length;
  const avg = items.length ? Math.round(items.reduce((s,i)=>s+(i.progress||0),0)/items.length) : 0;
  document.getElementById('k-avg').textContent = avg+'%';
  document.getElementById('sub').textContent = items.length+' items across '+new Set(items.map(i=>i.ms)).size+' milestones';
  const rows = filtered();
  const byMS = {};
  rows.forEach(i => { (byMS[i.ms] = byMS[i.ms] || []).push(i); });
  const order = MS.filter(m => byMS[m.id]);
  document.getElementById('groups').innerHTML = order.length ? order.map(m=>{
    const list = byMS[m.id];
    // Duration-weighted roll-up (MS Project standard); tasks without duration get weight 1
    const totalW = list.reduce((s,i)=>s+(i.durationDays||1),0);
    const mp = list.length ? Math.round(list.reduce((s,i)=>s+((i.progress||0)*(i.durationDays||1)),0)/totalW) : 0;
    const derivedLabel = list.length ? `calculated from ${list.length} item${list.length!==1?'s':''}` : 'no tasks';
    const isCol = collapsed[m.id];
    return `<div class="grp"><div class="gh${isCol?' collapsed':''}" data-ms="${esc(m.id)}"><span class="gchev">▼</span><span class="gn">${esc(m.name)}</span><span class="gph">${esc(m.phase)} · ${derivedLabel}</span><span class="gpb"><span class="gpf" style="width:${mp}%"></span></span><span class="gpt">${mp}%</span></div><div class="ail">${list.map(a=>{
      const idJson = JSON.stringify(a.id);
      const idAttr = esc(idJson);
      const checked = __selected.has(a.id) ? 'on' : '';
      return `<div class="ai" data-id="${idAttr}"><div style="display:flex;align-items:center;gap:8px;min-width:0"><span class="row-check ${checked}" onclick="event.stopPropagation();toggleSelect(${idJson.replace(/"/g,'&quot;')},this)"></span><span class="ai-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.name)}</span><span style="font-size:9px;flex-shrink:0">${window.healthDot(a.status)}</span></div><span class="pill ${sc(a.status)}">${esc(a.status)}</span><div class="ai-prog"><div class="apb"><div class="apf" style="width:${a.progress||0}%;background:${pcol(a.progress||0)}"></div></div><span class="apt">${a.progress||0}%</span></div><div class="own"><span class="av">${init(a.owner)}</span>${esc(a.owner||'Unassigned')}</div></div>`;
    }).join('')}</div></div>`;
  }).join('') : '<div style="padding:40px;text-align:center;color:#9CA3AF;background:#1f1f1f;border:1px solid #2a2a2a;border-radius:10px">No tasks match.</div>';
  document.querySelectorAll('.gh').forEach(el => el.onclick = () => {
    // Resolve milestone id back (string attr — match by stringified compare)
    const key = el.dataset.ms;
    const hit = MS.find(m => String(m.id) === key);
    const msId = hit ? hit.id : key;
    collapsed[msId] = !collapsed[msId];
    renderAll();
  });
  document.querySelectorAll('.ai[data-id]').forEach(el => el.onclick = e => {
    e.stopPropagation();
    let id;
    try { id = JSON.parse(el.dataset.id.replace(/&quot;/g,'"')); } catch(ex) { id = el.dataset.id; }
    openD(id);
  });
}

let __selected = new Set();
function toggleSelect(id, el){
  if(__selected.has(id)){__selected.delete(id);el?.classList.remove('on');}
  else{__selected.add(id);el?.classList.add('on');}
  const n = __selected.size;
  document.getElementById('bulk-count').textContent = n;
  document.getElementById('bulk-bar').classList.toggle('show', n>0);
}
function clearSelection(){
  __selected.clear();
  document.querySelectorAll('.row-check.on').forEach(c=>c.classList.remove('on'));
  document.getElementById('bulk-bar').classList.remove('show');
  document.getElementById('bulk-count').textContent = 0;
}

function bulkStatus(s){
  if(!__selected.size) return;
  const ids = [...__selected];
  items.forEach(i => {
    if (__selected.has(i.id)) {
      i.status = s;
      if (isDone(s)) i.progress = 100;
    }
  });
  // Schema-shape Make payload
  console.log('Make payload (task_bulk_update):', { task_ids: ids, status: s });
  try{parent.postMessage({type:'toast',msg:`${ids.length} items updated`,kind:'success'},'*');}catch(e){}
  clearSelection(); renderAll();
}

function bulkAssign(){
  const who = prompt('Assign to (name or email):');
  if(!who) return;
  const ids = [...__selected];
  const looksEmail = /@/.test(who);
  const email = looksEmail ? who : (__contactByName[who] ?? null);
  const display = looksEmail ? (__contactByEmail[who] || who) : who;
  items.forEach(i => {
    if (__selected.has(i.id)) {
      i.owner = display;
      i.owner_email = email;
    }
  });
  // Schema-shape Make payload
  console.log('Make payload (task_bulk_assign):', { task_ids: ids, assignee_email: email });
  try{parent.postMessage({type:'toast',msg:`${ids.length} items assigned to ${display}`,kind:'success'},'*');}catch(e){}
  clearSelection(); renderAll();
}

function bulkImport(){
  const rows = prompt('Paste CSV rows (task title per line):');
  if(!rows) return;
  const lines = rows.split('\n').filter(l=>l.trim());
  const defaultMs = MS[0]?.id ?? null;
  const outboundBatch = [];
  let added = 0;
  lines.forEach((line, idx) => {
    const tmpId = 'tmp-'+Date.now()+'-'+idx;
    const newTask = {
      id: tmpId,
      name: line.trim(),
      ms: defaultMs,
      status: 'Not Started',
      owner: '',
      owner_email: null,
      progress: 0,
      durationDays: 1,
      priority: 'Normal',
      originFrom: null,
      originId: null
    };
    items.push(newTask);
    outboundBatch.push(buildSavePayload(newTask, true));
    added++;
  });
  // Schema-shape Make payload
  console.log('Make payload (task_bulk_import):', { tasks: outboundBatch });
  try{parent.postMessage({type:'toast',msg:`${added} tasks imported`,kind:'success'},'*');}catch(e){}
  renderAll();
}

function bulkDelete(){
  if(!confirm(`Delete ${__selected.size} items?`)) return;
  const ids = [...__selected];
  items = items.filter(i => !__selected.has(i.id));
  // Schema-shape Make payload
  console.log('Make payload (task_bulk_delete):', { task_ids: ids });
  try{parent.postMessage({type:'toast',msg:`${ids.length} items deleted`,kind:'success'},'*');}catch(e){}
  clearSelection(); renderAll();
}

document.getElementById('srch').oninput = renderAll;

window.__viewMilestone = function(msId){
  try{parent.postMessage({type:'navigate', section:'schedule', entityId: msId},'*');}catch(e){}
};

function openD(id){
  editing = (id != null)
    ? { ...(items.find(i => i.id === id) || {}) }
    : { id:null, name:'', ms:(MS[0]?.id ?? null), status:'Not Started', owner:'', owner_email:null, progress:0, durationDays:1, priority:'Normal', originFrom:null, originId:null };
  document.getElementById('drt').textContent = (id != null) ? 'Update Task' : 'New Task';
  document.getElementById('bd').style.display = (id != null) ? 'inline-block' : 'none';
  const a = editing;
  const taskStatuses = (window.__STATUSES__?.task) || ['Not Started','In Progress','Blocked','Done'];
  const contactOptions = (window.__CONTACTS__||[]).map(n => `<option ${n===a.owner?'selected':''}>${esc(n)}</option>`).join('');
  const deepLink = (a.id != null && a.ms != null)
    ? `<div class="deeplink" onclick='window.__viewMilestone(${JSON.stringify(a.ms)})'>→ View milestone in Schedule</div>`
    : '';
  const msOptions = MS.map(m => `<option value="${esc(m.id)}">${esc(m.name)}</option>`).join('');
  const statusOptions = taskStatuses.map(s => `<option ${s===a.status?'selected':''}>${esc(s)}</option>`).join('');
  document.getElementById('drb').innerHTML =
    `${window.originLink(editing)}${deepLink}` +
    `<div class="f"><label class="fl">Action Item</label><input class="fi" id="d-name" value="${esc(a.name)}" placeholder="What needs to be done?"/></div>` +
    `<div class="fr"><div class="f"><label class="fl">Milestone</label><select class="fs" id="d-ms">${msOptions}</select></div>` +
    `<div class="f"><label class="fl">Status</label><select class="fs" id="d-st">${statusOptions}</select></div></div>` +
    `<div class="fr"><div class="f"><label class="fl">Owner</label><select class="fs" id="d-ow"><option value="">Unassigned</option>${contactOptions}</select></div>` +
    `<div class="f"><label class="fl">Priority</label><select class="fs" id="d-pri"><option ${a.priority==='Low'?'selected':''}>Low</option><option ${(!a.priority||a.priority==='Normal')?'selected':''}>Normal</option><option ${a.priority==='High'?'selected':''}>High</option><option ${a.priority==='Urgent'?'selected':''}>Urgent</option></select></div></div>` +
    `<div class="f"><label class="fl">Progress</label><div style="display:flex;align-items:center;gap:10px;padding:8px 0"><input type="range" class="slider" id="d-pc" min="0" max="100" value="${a.progress||0}"/><span class="pcval" id="pcval">${a.progress||0}%</span></div></div>` +
    `${a.id!=null?window.commentsWidget('task',a.id):''}${a.id!=null?window.attachmentsWidget('task',a.id):''}`;
  // Set milestone select (stringified compare handles both numeric and string IDs)
  const msSel = document.getElementById('d-ms');
  if (msSel && a.ms != null) msSel.value = String(a.ms);
  document.getElementById('d-ow').value = a.owner || '';
  document.getElementById('d-pc').oninput = e => document.getElementById('pcval').textContent = e.target.value+'%';
  document.getElementById('dbg').classList.add('on');
  document.getElementById('dr').classList.add('on');
}

function closeD(){
  document.getElementById('dbg').classList.remove('on');
  document.getElementById('dr').classList.remove('on');
}

function saveA(){
  const name = document.getElementById('d-name').value.trim();
  if(!name){ alert('Action item name required'); return; }
  const statusVal = document.getElementById('d-st').value;
  const ownerName = document.getElementById('d-ow').value;
  // Resolve email: prefer payload-derived map; else keep editing's email if name unchanged; else null
  const ownerEmail = ownerName
    ? (__contactByName[ownerName] ?? (editing.owner === ownerName ? editing.owner_email : null))
    : null;
  const msVal = document.getElementById('d-ms').value;
  // Preserve original ID type (numeric demo IDs vs string schema IDs like "MS-01")
  const msHit = MS.find(m => String(m.id) === msVal);
  const msId = msHit ? msHit.id : msVal;
  const progress = +document.getElementById('d-pc').value;
  const priority = document.getElementById('d-pri').value;
  const finalProgress = isDone(statusVal) ? 100 : progress;

  const isNew = editing.id == null || (typeof editing.id === 'string' && editing.id.startsWith('tmp-'));
  const a = {
    id: isNew ? ('tmp-'+Date.now()) : editing.id,
    name,
    ms: msId,
    status: statusVal,
    owner: ownerName,
    owner_email: ownerEmail,
    progress: finalProgress,
    durationDays: editing.durationDays ?? 1,
    start: editing.start ?? null,
    end: editing.end ?? null,
    priority,
    originFrom: editing.originFrom ?? null,
    originId: editing.originId ?? null
  };
  // Update or insert in internal store
  if (!isNew) {
    const idx = items.findIndex(x => x.id === editing.id);
    if (idx >= 0) items[idx] = a; else items.push(a);
  } else {
    items.push(a);
  }

  // Schema-shape Make payload — matches schema.md tasks[] element
  console.log('Make payload (task_save):', buildSavePayload(a, isNew));
  try{parent.postMessage({type:'toast',msg:'Saved',kind:'success'},'*');}catch(e){}
  closeD(); renderAll();
}

function delA(){
  if(editing?.id == null) return;
  if(!confirm('Delete?')) return;
  const id = editing.id;
  items = items.filter(i => i.id !== id);
  console.log('Make payload (task_delete):', { id });
  try{parent.postMessage({type:'toast',msg:'Deleted',kind:'success'},'*');}catch(e){}
  closeD(); renderAll();
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeD(); });
renderAll();

// Populate status filter dropdown once (after ingestion, so schema statuses flow through)
(function(){
  const sel = document.getElementById('fstatus');
  if (!sel || sel.dataset.pop) return;
  sel.dataset.pop = '1';
  const uniq = [...new Set(items.map(x=>x.status).filter(Boolean))].sort();
  uniq.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
  sel.onchange = renderAll;
})();
</script></body></html>
