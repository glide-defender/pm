<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>RACI</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#171717;color:#E5E7EB;font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;padding:20px}
.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.ti{font-size:18px;font-weight:700;color:#fff}.sb{font-size:12px;color:#9CA3AF;margin-top:3px}.ctr{display:flex;gap:8px;align-items:center}
.srch{background:#1f1f1f;border:1px solid #303030;border-radius:6px;padding:7px 11px;color:#E5E7EB;font-size:12.5px;outline:none;width:220px;font-family:inherit}
.srch:focus{border-color:#F59E0B}
.btn{padding:7px 14px;border-radius:6px;font-size:12.5px;font-weight:600;border:1px solid #303030;background:#1f1f1f;color:#E5E7EB;cursor:pointer;font-family:inherit}.btn:hover{background:#252525}.bp{background:#3c4756;color:#fff;border-color:#4a5666}.bp:hover{background:#4a5666}
.legend{display:flex;gap:14px;margin-bottom:14px;padding:10px 14px;background:#1f1f1f;border:1px solid #2a2a2a;border-radius:8px;font-size:11.5px;flex-wrap:wrap}
.lgi{display:flex;align-items:center;gap:6px}.lgd{width:20px;height:20px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:#fff;vertical-align:middle}
.card{background:#1f1f1f;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden}
.rtbl{width:100%;border-collapse:collapse;font-size:12.5px}.rtbl th{padding:10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#9CA3AF;border-bottom:1px solid #303030;background:#191919}.rtbl td{padding:11px 10px;border-bottom:1px solid #2a2a2a;vertical-align:top}.rtbl tr[data-id]{cursor:pointer}.rtbl tr[data-id]:hover td{background:#252525}
.chip{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;margin:2px 3px 2px 0}
.c-r{background:rgba(239,68,68,.14);color:#ff6b6b}.c-a{background:rgba(245,158,11,.14);color:#F59E0B}.c-c{background:rgba(66,134,244,.14);color:#60a5fa}.c-i{background:rgba(139,92,246,.14);color:#a78bfa}
.dbg{position:fixed;inset:0;background:rgba(10,10,10,.7);backdrop-filter:blur(6px);z-index:100;display:none}.dbg.on{display:block}
.dr{position:fixed;top:0;right:0;bottom:0;width:min(540px,92vw);background:#1a1a1a;border-left:1px solid #303030;box-shadow:-20px 0 60px rgba(0,0,0,.6);z-index:101;display:none;flex-direction:column;transform:translateX(20px);transition:transform .2s}.dr.on{display:flex;transform:translateX(0)}
.drh{padding:18px 22px;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:flex-start}.drt{font-size:16px;font-weight:700;color:#fff}.drs{font-size:11.5px;color:#9CA3AF;margin-top:2px}.drx{width:28px;height:28px;border-radius:6px;border:1px solid #303030;background:#252525;color:#9CA3AF;cursor:pointer;font-size:15px}
.drb{flex:1;overflow-y:auto;padding:20px 22px}.drf{padding:14px 22px;border-top:1px solid #2a2a2a;background:#191919;display:flex;gap:8px}
.f{margin-bottom:14px}.fl{display:block;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#9CA3AF;margin-bottom:6px}
.fi,.fs,.ft{width:100%;background:#161616;border:1px solid #303030;border-radius:7px;padding:9px 11px;color:#E5E7EB;font-size:13px;font-family:inherit;outline:none}.fi:focus,.ft:focus{border-color:#F59E0B}.ft{resize:vertical;min-height:48px}
.tbtn{padding:6px 10px;border-radius:5px;border:1px solid #303030;background:transparent;color:#EF4444;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}.tbtn:hover{background:rgba(239,68,68,.1)}
.bulk-bar{display:none;position:sticky;bottom:0;left:0;right:0;background:#1a1a1a;border-top:2px solid #F59E0B;padding:10px 18px;z-index:10;font-size:12.5px;align-items:center;gap:12px;box-shadow:0 -8px 20px rgba(0,0,0,.5);margin:14px -20px -20px}
.bulk-bar.show{display:flex}
.bulk-count{background:#F59E0B;color:#111;padding:3px 10px;border-radius:12px;font-weight:700;font-size:11.5px}
.row-check{display:inline-flex;width:16px;height:16px;border:1.5px solid #4a4a4a;border-radius:3px;background:#181818;cursor:pointer;flex-shrink:0;align-items:center;justify-content:center;vertical-align:middle}
.row-check.on{background:#F59E0B;border-color:#F59E0B}
.row-check.on::after{content:"✓";color:#111;font-size:11px;font-weight:900}
</style></head><body>
<div class="hd"><div><div class="ti">RACI Matrix</div><div class="sb" id="sub">Responsibility assignments</div></div>
<div class="ctr"><input class="srch" id="srch" placeholder="Search responsibilities…"/><button class="btn">Export</button><button class="btn bp" onclick="openD(null)">+ Responsibility</button></div></div>
<div class="legend">
<div class="lgi"><span class="lgd" style="background:#EF4444">R</span><span><strong>Responsible</strong> — does the work</span></div>
<div class="lgi"><span class="lgd" style="background:#F59E0B">A</span><span><strong>Accountable</strong> — owns the outcome</span></div>
<div class="lgi"><span class="lgd" style="background:#4286f4">C</span><span><strong>Consulted</strong> — gives input</span></div>
<div class="lgi"><span class="lgd" style="background:#8B5CF6">I</span><span><strong>Informed</strong> — kept up to date</span></div>
</div>
<div class="card"><table class="rtbl"><thead><tr><th style="padding-left:16px;width:36px"></th><th>Workstream / Responsibility</th><th>Responsible</th><th>Accountable</th><th>Consulted</th><th>Informed</th></tr></thead><tbody id="tb"></tbody></table></div>
<div class="bulk-bar" id="bulk-bar"><span class="bulk-count" id="bulk-count">0</span><span>selected</span><div style="flex:1"></div><button class="btn" onclick="bulkDelete()" style="color:#ff6b6b;border-color:#5a2424">Delete</button><button class="btn" onclick="clearSelection()">Cancel</button></div>
<div class="dbg" id="dbg" onclick="closeD()"></div>
<div class="dr" id="dr"><div class="drh"><div><div class="drt" id="drt">New Responsibility</div></div><button class="drx" onclick="closeD()">×</button></div>
<div class="drb" id="drb"></div>
<div class="drf"><button class="tbtn" id="bd" onclick="delX()" style="display:none">Delete</button><div style="display:flex;gap:8px;margin-left:auto"><button class="btn" onclick="closeD()">Cancel</button><button class="btn bp" onclick="saveX()">Save</button></div></div></div>
<script>
// ═══ esc helper (Pattern #3) — applied to every interpolated payload-derived string ═══
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ═══════════════════════════════════════════════════════════════
// RACI DATA
// ═══════════════════════════════════════════════════════════════
// Internal shape: { task, R, A, C, I }
//   - `task` = schema `workstream` (renamed at ingest/emit boundary, Pattern #1).
//     Workstream is the implicit primary key — no separate `id` field per schema.
//   - R/A/C/I are arrays of strings (company/group/contact names) per schema.
//
// Identity: `task` string is the primary key. All comparisons use String(a)===String(b)
// per Pattern #2. No numeric id, no Math.max coercion, no tmp- prefix needed (new rows
// use their workstream name as identity directly).

let items=[
  {task:'Create initial bill of materials', R:['Genetec'],       A:['ABC Sample Company'], C:['Securitas'], I:['Securitas']},
  {task:'Final commissioning sign-off',     R:['ADRM Security'], A:['ABC Sample Company'], C:['Genetec'],   I:['Securitas','John Doe']}
];
let editing=null;

// ═══ PAYLOAD INGESTION ═══
// Accepts P.raci (top-level) OR P.raciJson (consolidated alias per handoff, Pattern #6).
// Schema:   { workstream, R, A, C, I }  — R/A/C/I are arrays of strings (company/group names)
// Internal: { task,       R, A, C, I }  — task ← workstream
// Outbound via buildSavePayload() emits schema shape.
//
// NOTE (Pattern #4, flagged in SCHEMA-GAPS): owner_email pass-through does not apply.
// RACI assigns responsibility to groups/companies, not individuals by email, so there is
// no email field to carry through for My Work / notification integration.
//
// NOTE (Pattern #8): schema uses UPPERCASE R/A/C/I and lowercase `workstream`. Match exactly.
// No originFrom/originId — RACI has no cross-entity conversion source.
(function ingestPayload(){
  try {
    const P = window.__PAYLOAD__;
    if (!P) return;

    const expectedVersion = 1;
    const actualVersion = P?.meta?.payload_version;
    if (actualVersion != null && actualVersion !== expectedVersion) {
      console.warn(`[raci] payload v${expectedVersion} expected, got v${actualVersion} — rendering best-effort`);
    }

    // Prefer top-level, fall back to consolidated JSON alias.
    const rawRaci = Array.isArray(P?.raci) ? P.raci
                  : Array.isArray(P?.raciJson) ? P.raciJson
                  : null;

    if (Array.isArray(rawRaci) && rawRaci.length) {
      // Pattern #9 bridge: drawer inputs use comma-separated strings for UX,
      // but internal storage matches schema (arrays). If a payload sends a
      // comma-separated string for R/A/C/I instead of an array, coerce defensively —
      // never silently drop, never silently collapse.
      const toArr = v => {
        if (Array.isArray(v)) return v.map(x => String(x==null?'':x).trim()).filter(Boolean);
        if (typeof v === 'string') return v.split(',').map(s => s.trim()).filter(Boolean);
        return [];
      };
      const normItems = rawRaci
        .filter(r => r && typeof r === 'object')
        .map(r => ({
          task: String(r.workstream ?? r.task ?? '').trim(),
          R: toArr(r.R ?? r.r),
          A: toArr(r.A ?? r.a),
          C: toArr(r.C ?? r.c),
          I: toArr(r.I ?? r.i)
        }))
        .filter(r => r.task); // drop rows with no workstream identity

      if (normItems.length) items = normItems;
    }

    console.warn('Payload ingestion active:', 'raci');
  } catch (err) {
    console.warn(`[raci] payload ingestion failed, falling back to demo data:`, err);
  }
})();

// ═══ OUTBOUND PAYLOAD BUILDER (schema raciJson[] shape) ═══
// Schema: { workstream, R, A, C, I }
function buildSavePayload(r) {
  return {
    workstream: String(r.task ?? ''),
    R: Array.isArray(r.R) ? r.R.slice() : [],
    A: Array.isArray(r.A) ? r.A.slice() : [],
    C: Array.isArray(r.C) ? r.C.slice() : [],
    I: Array.isArray(r.I) ? r.I.slice() : []
  };
}

function filtered(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  return !q?items:items.filter(i=>JSON.stringify(i).toLowerCase().includes(q));
}

function renderAll(){
  document.getElementById('sub').textContent=items.length+' responsibilities assigned';
  const rows=filtered();
  const chip=(arr,cls)=>arr && arr.length?arr.map(x=>`<span class="chip ${cls}">${esc(x)}</span>`).join(''):'<span style="color:#6a6a6a;font-size:11px">—</span>';
  document.getElementById('tb').innerHTML=rows.length?rows.map(r=>{
    const sid=String(r.task);
    const checked=__selected.has(sid)?' on':'';
    const keyAttr=JSON.stringify(sid).replace(/"/g,'&quot;');
    return `<tr data-id="${esc(sid)}"><td style="padding-left:16px;width:36px;cursor:pointer" onclick="event.stopPropagation();toggleSelect(${keyAttr},this.querySelector('.row-check'))"><span class="row-check${checked}"></span></td><td style="font-weight:600;max-width:300px">${esc(r.task)}</td><td>${chip(r.R,'c-r')}</td><td>${chip(r.A,'c-a')}</td><td>${chip(r.C,'c-c')}</td><td>${chip(r.I,'c-i')}</td></tr>`;
  }).join(''):'<tr><td colspan="6" style="padding:24px;text-align:center;color:#9CA3AF">No responsibilities match.</td></tr>';
  document.querySelectorAll('#tb tr[data-id]').forEach(tr=>tr.onclick=(e)=>{
    // ignore clicks originating on the checkbox cell (first td)
    const td = e.target.closest('td');
    if (!td || td.cellIndex === 0 || e.target.closest('.row-check')) return;
    openD(tr.dataset.id);
  });
}
document.getElementById('srch').oninput=renderAll;

function openD(key){
  if (key != null && key !== '') {
    const found = items.find(i => String(i.task) === String(key));
    if (!found) return;
    editing = { task: found.task, R:[...found.R], A:[...found.A], C:[...found.C], I:[...found.I], __origKey: found.task };
  } else {
    editing = { task:'', R:[], A:[], C:[], I:[], __origKey: null };
  }
  document.getElementById('drt').textContent=editing.__origKey?'Update Responsibility':'New Responsibility';
  document.getElementById('bd').style.display=editing.__origKey?'inline-block':'none';
  const x=editing;
  document.getElementById('drb').innerHTML=`<div class="f"><label class="fl">Workstream / Responsibility</label><textarea class="ft" id="d-task" placeholder="e.g. Design, Install, Commissioning — or a specific deliverable">${esc(x.task)}</textarea></div><div class="f"><label class="fl" style="color:#ff6b6b">Responsible (does the work)</label><input class="fi" id="d-r" value="${esc(x.R.join(', '))}" placeholder="Comma-separated names or companies"/></div><div class="f"><label class="fl" style="color:#F59E0B">Accountable (owns the outcome)</label><input class="fi" id="d-a" value="${esc(x.A.join(', '))}" placeholder="Comma-separated"/></div><div class="f"><label class="fl" style="color:#60a5fa">Consulted (gives input)</label><input class="fi" id="d-c" value="${esc(x.C.join(', '))}" placeholder="Comma-separated"/></div><div class="f"><label class="fl" style="color:#a78bfa">Informed (kept up to date)</label><input class="fi" id="d-i" value="${esc(x.I.join(', '))}" placeholder="Comma-separated"/></div>`;
  document.getElementById('dbg').classList.add('on');document.getElementById('dr').classList.add('on');
}

function closeD(){document.getElementById('dbg').classList.remove('on');document.getElementById('dr').classList.remove('on');editing=null;}

// Parse comma-separated input into trimmed, de-empty'd array (Pattern #9 bridge — UI string → schema array)
const parse=id=>(document.getElementById(id).value||'').split(',').map(s=>s.trim()).filter(Boolean);

function saveX(){
  const newTask=(document.getElementById('d-task').value||'').trim();
  if(!newTask){alert('Workstream / responsibility is required');return;}
  const row={task:newTask,R:parse('d-r'),A:parse('d-a'),C:parse('d-c'),I:parse('d-i')};
  const origKey=editing?.__origKey;
  const isNew=!origKey;
  // If renaming, ensure the new name doesn't collide with another existing row (excluding the one we're editing)
  const collision=items.some(y=>String(y.task)===String(newTask)&&String(y.task)!==String(origKey));
  if(collision){alert('A responsibility with this workstream name already exists.');return;}
  if(isNew){
    items.push(row);
  } else {
    const i=items.findIndex(y=>String(y.task)===String(origKey));
    if(i>=0)items[i]=row; else items.push(row);
    // If workstream was renamed, move selection state from old key to new key
    if(String(origKey)!==String(newTask) && __selected.has(String(origKey))){
      __selected.delete(String(origKey));
      __selected.add(String(newTask));
    }
  }
  console.log('Make payload (raci_save):', { isNew, origKey, row: buildSavePayload(row) });
  try{parent.postMessage({type:'toast',msg:'Saved',kind:'success'},'*');}catch(e){}
  closeD();renderAll();updateBulkBar();
}

function delX(){
  const key=editing?.__origKey;
  if(!key)return;
  if(!confirm('Delete "'+key+'"?'))return;
  items=items.filter(i=>String(i.task)!==String(key));
  __selected.delete(String(key));
  console.log('Make payload (raci_delete):',{workstream:key});
  try{parent.postMessage({type:'toast',msg:'Deleted',kind:'success'},'*');}catch(e){}
  closeD();renderAll();updateBulkBar();
}

// ═══ BULK ACTIONS ═══
// Only delete is meaningful for RACI — no status field to mark, no ownership to reassign.
let __selected = new Set();
function toggleSelect(key, el){
  const sid=String(key);
  if(__selected.has(sid)){__selected.delete(sid);el?.classList.remove('on');}
  else{__selected.add(sid);el?.classList.add('on');}
  updateBulkBar();
}
function updateBulkBar(){
  const n=__selected.size;
  const c=document.getElementById('bulk-count'); if(c) c.textContent=n;
  const b=document.getElementById('bulk-bar'); if(b) b.classList.toggle('show',n>0);
}
function clearSelection(){
  __selected.clear();
  document.querySelectorAll('.row-check.on').forEach(c=>c.classList.remove('on'));
  updateBulkBar();
}
function bulkDelete(){
  if(!__selected.size)return;
  const n=__selected.size;
  if(!confirm(`Delete ${n} responsibilit${n===1?'y':'ies'}?`))return;
  const keys=[...__selected];
  items=items.filter(r=>!__selected.has(String(r.task)));
  console.log('Make payload (raci_bulk_delete):',{workstreams:keys});
  try{parent.postMessage({type:'toast',msg:`${n} deleted`,kind:'success'},'*');}catch(e){}
  clearSelection();renderAll();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeD();clearSelection();}});

// ═══ openEntity receiver (deep link target) ═══
window.addEventListener('message', e => {
  if (e.data?.type === 'openEntity' && e.data.entityId != null) {
    setTimeout(()=>{ try { openD(e.data.entityId); } catch(_){} }, 100);
  }
});

renderAll();

// ═══════════════════════════════════════════════════════════════
// SMOKE TESTS (Pattern #5) — expanded battery
// window.__RACI_SMOKE__() runs in-browser and returns pass/fail map.
// Covers: ingestion (valid/empty/null/malformed/version/alias/precedence),
//         outbound builder, Pattern #9 bridge, roundtrip, render (DOM),
//         XSS escape, state (openD/saveX/delX/rename/collision), bulk,
//         deep-link receiver, search filter, parse() bridge.
// ═══════════════════════════════════════════════════════════════
window.__RACI_SMOKE__ = function(){
  const results = {};
  const run = (name, fn) => { try { results[name] = fn() ? 'PASS' : 'FAIL'; } catch(e) { results[name] = 'THROW: '+e.message; } };

  // Capture/restore items so tests that mutate state can't leak
  const snapshot = () => JSON.parse(JSON.stringify(items));
  const restore = (snap) => { items.length = 0; snap.forEach(x => items.push(x)); __selected.clear(); };
  const origItems = snapshot();

  // Simulated toArr + ingestOnce identical to ingest-time logic — pure function, no DOM
  const toArr = v => {
    if (Array.isArray(v)) return v.map(x => String(x==null?'':x).trim()).filter(Boolean);
    if (typeof v === 'string') return v.split(',').map(s => s.trim()).filter(Boolean);
    return [];
  };
  const ingestOnce = (P) => {
    const rawRaci = Array.isArray(P?.raci) ? P.raci : Array.isArray(P?.raciJson) ? P.raciJson : null;
    if (!Array.isArray(rawRaci) || !rawRaci.length) return null;
    return rawRaci.filter(r => r && typeof r === 'object').map(r => ({
      task: String(r.workstream ?? r.task ?? '').trim(),
      R: toArr(r.R ?? r.r), A: toArr(r.A ?? r.a), C: toArr(r.C ?? r.c), I: toArr(r.I ?? r.i)
    })).filter(r => r.task);
  };

  // ── INGESTION: defensive handling ─────────────────────────────
  run('ingest_null_payload', () => ingestOnce(null) === null);
  run('ingest_undefined_payload', () => ingestOnce(undefined) === null);
  run('ingest_missing_raci_field', () => ingestOnce({ meta:{payload_version:1}, project:{name:'X'} }) === null);
  run('ingest_malformed_string', () => ingestOnce({ raci: 'not an array' }) === null);
  run('ingest_malformed_number', () => ingestOnce({ raci: 42 }) === null);
  run('ingest_malformed_object', () => ingestOnce({ raci: { not:'array' } }) === null);
  run('ingest_empty_array_keeps_demo', () => ingestOnce({ raci: [] }) === null);
  run('ingest_nulls_in_array_filtered', () => {
    const n = ingestOnce({ raci: [null, undefined, { workstream:'ok', R:[], A:[], C:[], I:[] }] });
    return n && n.length === 1 && n[0].task === 'ok';
  });
  run('ingest_missing_workstream_dropped', () => {
    const n = ingestOnce({ raci: [{ R:['x'] }, { workstream:'keep', R:[] }] });
    return n && n.length === 1 && n[0].task === 'keep';
  });
  run('ingest_whitespace_workstream_dropped', () => {
    const n = ingestOnce({ raci: [{ workstream:'   ', R:[] }, { workstream:'keep', R:[] }] });
    return n && n.length === 1 && n[0].task === 'keep';
  });
  run('ingest_missing_RACI_defaults_empty', () => {
    const n = ingestOnce({ raci: [{ workstream:'x' }] });
    return n && Array.isArray(n[0].R) && n[0].R.length === 0
            && Array.isArray(n[0].A) && Array.isArray(n[0].C) && Array.isArray(n[0].I);
  });

  // ── INGESTION: Pattern #6 precedence ──────────────────────────
  run('ingest_top_level_preferred_over_alias', () => {
    const P = { raci:[{workstream:'TOP',R:[],A:[],C:[],I:[]}], raciJson:[{workstream:'ALIAS',R:[],A:[],C:[],I:[]}] };
    const n = ingestOnce(P);
    return n && n.length === 1 && n[0].task === 'TOP';
  });
  run('ingest_alias_fallback_when_top_missing', () => {
    const P = { raciJson:[{workstream:'ALIAS',R:['x'],A:[],C:[],I:[]}] };
    const n = ingestOnce(P);
    return n && n[0].task === 'ALIAS' && n[0].R[0] === 'x';
  });
  run('ingest_alias_ignored_when_top_is_empty_array', () => {
    // P.raci present as empty array → top-level wins (empty), alias NOT consulted → null
    const P = { raci:[], raciJson:[{workstream:'ALIAS',R:[],A:[],C:[],I:[]}] };
    return ingestOnce(P) === null;
  });

  // ── INGESTION: Pattern #9 bridge (defensive coercion) ─────────
  run('bridge_array_stays_array', () => Array.isArray(toArr(['ADRM','Genetec'])) && toArr(['ADRM','Genetec']).length === 2);
  run('bridge_string_to_array', () => {
    const out = toArr('ADRM Security, Acme IT , , Genetec');
    return out.length === 3 && out[0] === 'ADRM Security' && out[1] === 'Acme IT' && out[2] === 'Genetec';
  });
  run('bridge_undefined_to_empty', () => Array.isArray(toArr(undefined)) && toArr(undefined).length === 0);
  run('bridge_null_to_empty', () => Array.isArray(toArr(null)) && toArr(null).length === 0);
  run('bridge_number_to_empty', () => Array.isArray(toArr(42)) && toArr(42).length === 0);
  run('bridge_object_to_empty', () => Array.isArray(toArr({})) && toArr({}).length === 0);
  run('bridge_array_trims_whitespace', () => {

    document.getElementById('d-r').value = 'Solo';
    const out = parse('d-r');
    return out.length === 1 && out[0] === 'Solo';
  });

  // ── Restore clean state ───────────────────────────────────────
  restore(origItems);
  renderAll();

  console.table(results);
  const failed = Object.entries(results).filter(([,v]) => v !== 'PASS');
  if (failed.length) console.warn('[raci] smoke FAIL:', failed);
  else console.log('[raci] all smoke PASS (' + Object.keys(results).length + ')');
  return results;
};
</script></body></html>
