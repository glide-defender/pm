<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Time</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#171717;color:#E5E7EB;font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;padding:20px}

.row-check.on{background:#F59E0B;border-color:#F59E0B}
.row-check.on::after{content:"\2713";color:#111;font-size:11px;font-weight:900}
.sa-ctrl{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:#1f1f1f;border:1px solid #303030;border-radius:6px;color:#E5E7EB;font-size:12px;cursor:pointer;font-family:inherit}
.sa-ctrl:hover:not([disabled]){background:#252525}
.sa-ctrl[disabled]{opacity:.4;cursor:not-allowed}

</style></head><body>
<div class="hd"><div><div class="ti">Time Tracking</div><div class="sb" id="sub">&mdash;</div></div>
<div class="ctr">
<input class="srch" id="srch" placeholder="Search entries&hellip;"/>
<select class="fsel" id="f-user" title="Filter by user"><option value="all">All users</option></select>
<select class="fsel" id="f-bill" title="Filter by billable"><option value="all">Billable &amp; non-billable</option><option value="bill">Billable only</option><option value="nonbill">Non-billable only</option></select>
<button class="sa-ctrl" id="sa-ctrl" onclick="toggleSelectAll()"><span class="sa-box" id="sa-box"></span><span id="sa-lbl">Select all</span></button>

</div></div>
<div class="kpis">
<div class="kpi" style="border-left-color:#F59E0B"><div class="kl">Total Hours</div><div class="kv" style="color:#F59E0B" id="k-t">&mdash;</div><div class="kc" id="k-t-d">&mdash;</div></div>
<div class="kpi" style="border-left-color:#4286f4"><div class="kl">This Week</div><div class="kv" style="color:#4286f4" id="k-w">&mdash;</div><div class="kc">hours logged</div></div>
<div class="kpi" style="border-left-color:#22C55E"><div class="kl">Billable</div><div class="kv" style="color:#22C55E" id="k-b">&mdash;</div><div class="kc" id="k-b-d">&mdash;</div></div>
<div class="kpi" style="border-left-color:#06B6D4"><div class="kl">Contributors</div><div class="kv" style="color:#06B6D4" id="k-c">&mdash;</div><div class="kc">team members</div></div>
</div>
<div class="timer" id="timer">
<div class="tclock" id="tclock">00:00:00</div>
<div class="tctrl">
<input class="ti-inp" id="tnm" placeholder="What are you working on? (notes)"/>

</div>
</div>
<div class="grid">
<div class="card" style="padding:0;overflow:hidden"><div style="padding:16px 16px 0"><div class="ct">Time Entries</div><div class="cs" id="cs-entries">&mdash;</div></div><table class="rtbl"><thead><tr><th style="padding-left:16px">Task</th><th>Milestone</th><th>User</th><th>Date</th><th>Billable</th><th style="text-align:right">Hours</th><th></th></tr></thead><tbody id="tb"></tbody></table></div>
<div class="card"><div class="ct">By Milestone</div><div class="cs">Hours rolled up per milestone</div><div class="mstat" id="mstat"></div></div>
</div>
<div class="bulk-bar" id="bulk-bar">
<span class="bulk-count" id="bulk-count">0</span><span>selected</span>
<button class="sa-ctrl" id="sa-ctrl2" onclick="toggleSelectAll()"><span class="sa-box" id="sa-box2"></span><span id="sa-lbl2">Select all</span></button>

<button class="btn" onclick="bulkMarkBillable(false)">Mark non-billable</button>

</div>
<div class="dbg" id="dbg" onclick="closeD()"></div>
<div class="dr" id="dr"><div class="drh"><div class="drt" id="drt">Update Entry</div><button class="drx" onclick="closeD()">&times;</button></div><div class="drb" id="drb"></div><div class="drf"><button class="tbtn" id="bd" onclick="delE()" style="display:none">Delete</button><div style="display:flex;gap:8px;margin-left:auto"><button class="btn" onclick="closeD()">Cancel</button><button class="btn bp" onclick="saveE()">Save</button></div></div></div>
<script>
// ═══ Row menu (shared utility, guard against double-define) ═══
if (!window.showRowMenu) {
  window.showRowMenu = function(btn, actions) {
    document.querySelectorAll('.row-menu-pop').forEach(x=>x.remove());
    const rect = btn.getBoundingClientRect();
    const menu = document.createElement('div');
    menu.className = 'row-menu-pop';
    menu.style.cssText = `position:fixed;top:${rect.bottom+4}px;left:${rect.right-180}px;min-width:180px;background:#1a1a1a;border:1px solid #333;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:999;padding:4px;font-family:inherit`;
    menu.innerHTML = actions.map((a,i)=>a.divider?'<div style="height:1px;background:#2a2a2a;margin:4px 0"></div>':`<div data-i="${i}" style="padding:7px 12px;font-size:12.5px;color:${a.color||'#E5E7EB'};border-radius:5px;cursor:pointer;user-select:none">${a.label}</div>`).join('');
    menu.querySelectorAll('[data-i]').forEach(el=>{el.onmouseenter=()=>el.style.background='#252525';el.onmouseleave=()=>el.style.background='';el.onclick=e=>{e.stopPropagation();menu.remove();actions[+el.dataset.i].fn();};});
    document.body.appendChild(menu);
    setTimeout(()=>{document.addEventListener('click',function c(){menu.remove();document.removeEventListener('click',c);},{once:true});},50);
  };
}

// ═══ Helpers ═══
const SECTION_NAME = 'time';
const COLORS = ['#F59E0B','#4286f4','#22C55E','#06B6D4','#14B8A6','#EF4444'];
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const initials = n => (n||'?').split(/\s+/).map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase() || '?';
const todayISO = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const fmtClock = s => { const H=Math.floor(s/3600),M=Math.floor((s%3600)/60),S=Math.floor(s%60); return [H,M,S].map(x=>String(x).padStart(2,'0')).join(':'); };
const fmtHours = h => { const H=Math.floor(h); const M=Math.round((h-H)*60); if(H===0) return M+'m'; if(M===0) return H+'h'; return H+'h '+M+'m'; };
const fmtDateDisplay = iso => { if(!iso) return '\u2014'; const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(iso); if(!m) return iso; const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return months[+m[2]-1]+' '+(+m[3]); };
function parseHoursInput(s) {
  s = String(s==null?'':s).trim();
  if (!s) return 0;
  let m;
  // "7h 30m" | "7h" | "30m"
  m = s.match(/^(?:(\d+(?:\.\d+)?)\s*h)?\s*(?:(\d+(?:\.\d+)?)\s*m)?$/i);
  if (m && (m[1] || m[2])) return (Number(m[1])||0) + (Number(m[2])||0)/60;
  // "7:30"
  m = s.match(/^(\d+):(\d+)$/);
  if (m) return Number(m[1]) + Number(m[2])/60;
  // plain number
  const n = Number(s); return isFinite(n) ? n : 0;
}
function coerceBool(v) {
  if (typeof v === 'string') {
    const s = v.toLowerCase().trim();
    if (s === '' || s === 'false' || s === '0' || s === 'no' || s === 'n') return false;
    return true;
  }
  return !!v;
}

// ═══ State ═══
const DEMO_TASKS = [
  {id:'TSK-001', title:'Client meeting',         milestone_id:'MS-01'},
  {id:'TSK-002', title:'CAD design work',        milestone_id:'MS-01'},
  {id:'TSK-003', title:'Procurement call',       milestone_id:'MS-02'},
  {id:'TSK-004', title:'Camera programming',     milestone_id:'MS-04'},
  {id:'TSK-005', title:'Commissioning prep',     milestone_id:'MS-04'},
  {id:'TSK-006', title:'Door hardware install',  milestone_id:'MS-03'},
  {id:'TSK-007', title:'Network config',         milestone_id:'MS-03'}
];
const DEMO_MILESTONES = [
  {id:'MS-01', name:'HQ Site Survey'},
  {id:'MS-02', name:'Equipment Procurement'},
  {id:'MS-03', name:'Installation'},
  {id:'MS-04', name:'Calibration & Testing'},
  {id:'MS-05', name:'Commissioning'},
  {id:'MS-06', name:'Final Inspection'}
];
const DEMO_CONTACTS = [
  {email:'misgur@adrm-security.com', name:'Matt Isgur'},
  {email:'lfeula@adrm-security.com',  name:'Louis Feula'},
  {email:'jdoe@adrm-security.com',    name:'John Doe'},
  {email:'gbakker@adrm-security.com', name:'Gerritt Bakker'}
];
// Internal shape matches schema: {id, user_email, task_id, date, hours, billable, notes}
let entries = [
  {id:'TE-001', user_email:'misgur@adrm-security.com', task_id:'TSK-001', date:'2026-04-11', hours:1.5,  billable:true,  notes:'Kickoff with client stakeholders'},
  {id:'TE-002', user_email:'misgur@adrm-security.com', task_id:'TSK-002', date:'2026-04-08', hours:2.5,  billable:true,  notes:'Revision 2'},
  {id:'TE-003', user_email:'misgur@adrm-security.com', task_id:'TSK-003', date:'2026-04-05', hours:0.5,  billable:false, notes:''},
  {id:'TE-004', user_email:'lfeula@adrm-security.com', task_id:'TSK-004', date:'2026-04-02', hours:2.0,  billable:true,  notes:''},
  {id:'TE-005', user_email:'lfeula@adrm-security.com', task_id:'TSK-005', date:'2026-03-28', hours:5.0,  billable:true,  notes:'Pre-commissioning checklist'},
  {id:'TE-006', user_email:'lfeula@adrm-security.com', task_id:'TSK-006', date:'2026-03-25', hours:4.5,  billable:true,  notes:''},
  {id:'TE-007', user_email:'misgur@adrm-security.com', task_id:'TSK-007', date:'2026-03-22', hours:3.5,  billable:true,  notes:''},
  {id:'TE-008', user_email:'misgur@adrm-security.com', task_id:'TSK-002', date:'2026-04-09', hours:0.25, billable:false, notes:'Quick follow-up'}
];

let __tasksById = {};
let __milestonesById = {};
let __contactsByEmail = {};
let __availableTasks = [];      // array for task pickers
let __availableContacts = [];   // array for user pickers
let __editing = null;
let __selected = new Set();
let __timerStart = null;
let __timerInterval = null;

// ═══ PAYLOAD INGESTION ═══
(function ingestPayload(){
  try {
    const P = window.__PAYLOAD__;
    if (!P) { rebuildLookups(); return; }

    const expectedVersion = 1;
    const actualVersion = P && P.meta && P.meta.payload_version;
    if (actualVersion != null && actualVersion !== expectedVersion) {
      console.warn('[time] payload v'+expectedVersion+' expected, got v'+actualVersion+' \u2014 rendering best-effort');
    }

    // time_entries is relational only — no *Json fallback (Pattern #6 N/A)
    const src = P.time_entries;
    if (Array.isArray(src) && src.length) {
      const mapped = [];
      src.forEach((raw, idx) => {
        if (!raw || typeof raw !== 'object') { console.warn('[time] skipping non-object entry at idx '+idx); return; }
        const e = {
          id:          raw.id != null ? String(raw.id) : ('tmp-'+Date.now()+'-'+idx),
          user_email:  raw.user_email != null ? String(raw.user_email) : '',
          task_id:     raw.task_id != null ? String(raw.task_id) : '',
          date:        typeof raw.date === 'string' ? raw.date.slice(0,10) : '',
          hours:       Number(raw.hours) || 0,
          billable:    coerceBool(raw.billable),
          notes:       raw.notes != null ? String(raw.notes) : ''
        };
        if (!e.user_email) console.warn('[time] entry '+e.id+' missing user_email');
        mapped.push(e);
      });
      entries = mapped;
    }

    console.warn('Payload ingestion active:', SECTION_NAME);
  } catch (err) {
    console.warn('[time] payload ingestion failed, falling back to demo data:', err);
  }
  rebuildLookups();
})();

// ═══ Lookup rebuild (call after any mutation to entries) ═══
function rebuildLookups() {
  const P = window.__PAYLOAD__;

  // Tasks lookup: payload first, demo fallback
  const tasksSrc = (P && Array.isArray(P.tasks) && P.tasks.length) ? P.tasks : DEMO_TASKS;
  __tasksById = {};
  __availableTasks = tasksSrc.map(t => {
    const id = t.id != null ? String(t.id) : '';
    const title = t.title || t.name || id;
    const milestone_id = t.milestone_id != null ? String(t.milestone_id) : '';
    __tasksById[id] = { id, title, milestone_id };
    return { id, title, milestone_id };
  });

  // Milestones lookup
  const msSrc = (P && Array.isArray(P.milestones) && P.milestones.length) ? P.milestones : DEMO_MILESTONES;
  __milestonesById = {};
  msSrc.forEach(m => {
    const id = m.id != null ? String(m.id) : '';
    __milestonesById[id] = { id, name: m.name || id };
  });

  // Contacts lookup: project contacts + all_contacts fallback
  const projectContacts = (P && Array.isArray(P.contacts)) ? P.contacts : [];
  const allContacts     = (P && P.lookups && Array.isArray(P.lookups.all_contacts)) ? P.lookups.all_contacts : [];
  const merged = (projectContacts.length || allContacts.length) ? [...projectContacts, ...allContacts] : DEMO_CONTACTS;
  __contactsByEmail = {};
  __availableContacts = [];
  merged.forEach(c => {
    const email = c.email || '';
    if (!email || __contactsByEmail[email]) return;
    __contactsByEmail[email] = { email, name: c.name || email };
    __availableContacts.push({ email, name: c.name || email });
  });
  // Ensure any user_email referenced by entries appears even if missing from contacts
  entries.forEach(e => {
    if (e.user_email && !__contactsByEmail[e.user_email]) {
      __contactsByEmail[e.user_email] = { email: e.user_email, name: e.user_email };
      __availableContacts.push({ email: e.user_email, name: e.user_email });
    }
  });

  // Expose cross-section global (My Work consumers)
  window.__TIME_ENTRIES__ = entries.map(e => ({...e}));
}

// ═══ Task / user / milestone resolution for rendering ═══
function taskDisplay(task_id) {
  if (!task_id) return { name:'\u2014', warn:false, milestone_name:'' };
  const t = __tasksById[task_id];
  if (t) {
    const ms = t.milestone_id ? (__milestonesById[t.milestone_id] || null) : null;
    return { name: t.title, warn: false, milestone_name: ms ? ms.name : '' };
  }
  return { name: task_id, warn: true, milestone_name: '' };
}
function userDisplay(email) {
  if (!email) return { name:'\u2014', warn:true };
  const c = __contactsByEmail[email];
  return { name: c ? c.name : email, warn: !c };
}

// ═══ Filter ═══
function filtered() {
  const q = (document.getElementById('srch') && document.getElementById('srch').value || '').toLowerCase();
  const u = (document.getElementById('f-user') && document.getElementById('f-user').value) || 'all';
  const b = (document.getElementById('f-bill') && document.getElementById('f-bill').value) || 'all';
  return entries.filter(e => {
    if (u !== 'all' && e.user_email !== u) return false;
    if (b === 'bill' && !e.billable) return false;
    if (b === 'nonbill' && e.billable) return false;
    if (!q) return true;
    const t = taskDisplay(e.task_id).name;
    const un = userDisplay(e.user_email).name;
    const hay = (t+' '+un+' '+e.notes+' '+e.date+' '+e.user_email+' '+e.task_id).toLowerCase();
    return hay.includes(q);
  });
}

// ═══ Render ═══
function renderUserFilter() {
  const sel = document.getElementById('f-user');
  if (!sel) return;
  const cur = sel.value || 'all';
  const emails = new Set(entries.map(e => e.user_email).filter(Boolean));
  const opts = ['<option value="all">All users</option>'];
  __availableContacts.forEach(c => {
    if (!emails.has(c.email)) return;
    opts.push('<option value="'+esc(c.email)+'">'+esc(c.name)+'</option>');
  });
  sel.innerHTML = opts.join('');
  if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
}

function renderSelectAllControl() {
  const vis = filtered();
  const visIds = vis.map(e => String(e.id));
  const visSelected = visIds.filter(id => __selected.has(id)).length;
  const state = vis.length === 0 ? 'empty' : visSelected === 0 ? 'none' : (visSelected === vis.length ? 'all' : 'some');
  const label = state === 'all' ? 'Deselect all' : ('Select all ('+vis.length+')');
  ['sa-box','sa-box2'].forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    el.className = 'sa-box' + (state==='all'?' all':state==='some'?' some':'');
  });
  ['sa-lbl','sa-lbl2'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = label; });
  ['sa-ctrl','sa-ctrl2'].forEach(id => { const el = document.getElementById(id); if (!el) return; if (state==='empty') el.setAttribute('disabled','disabled'); else el.removeAttribute('disabled'); });
}

function renderAll() {
  const total = entries.reduce((s,e)=>s+(Number(e.hours)||0), 0);
  const billable = entries.reduce((s,e)=>s+(e.billable?(Number(e.hours)||0):0), 0);
  // This week: entries whose date is within last 7 days (inclusive today)
  const now = new Date(); const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-6);
  const weekAgoISO = weekAgo.getFullYear()+'-'+String(weekAgo.getMonth()+1).padStart(2,'0')+'-'+String(weekAgo.getDate()).padStart(2,'0');
  const todayStr = todayISO();
  const weekHrs = entries.filter(e => e.date && e.date >= weekAgoISO && e.date <= todayStr).reduce((s,e)=>s+(Number(e.hours)||0), 0);
  const contrib = new Set(entries.map(e => e.user_email).filter(Boolean)).size;

  document.getElementById('k-t').textContent  = total.toFixed(2).replace(/\.?0+$/,'') + 'h';
  document.getElementById('k-t-d').textContent = entries.length + ' entries tracked';
  document.getElementById('k-w').textContent  = weekHrs.toFixed(2).replace(/\.?0+$/,'') + 'h';
  document.getElementById('k-b').textContent  = billable.toFixed(2).replace(/\.?0+$/,'') + 'h';
  document.getElementById('k-b-d').textContent = total > 0 ? Math.round((billable/total)*100)+'% of tracked' : '—';
  document.getElementById('k-c').textContent  = contrib;
  document.getElementById('sub').textContent  = total.toFixed(2).replace(/\.?0+$/,'') + ' hours logged across ' + contrib + ' team member' + (contrib===1?'':'s');

  // Timer task picker options
  const ttsk = document.getElementById('ttsk');
  if (ttsk) {
    const cur = ttsk.value;
    ttsk.innerHTML = '<option value="">— Task —</option>' + __availableTasks.map(t => '<option value="'+esc(t.id)+'">'+esc(t.title)+'</option>').join('');
    if ([...ttsk.options].some(o => o.value === cur)) ttsk.value = cur;
  }

  renderUserFilter();

  const rows = filtered();
  rows.sort((a,b) => (b.date || '').localeCompare(a.date || ''));
  document.getElementById('cs-entries').textContent = rows.length + ' entr' + (rows.length===1?'y':'ies');

  const tb = document.getElementById('tb');
  if (!rows.length) {
    tb.innerHTML = '<tr><td colspan="7" style="padding:24px;text-align:center;color:#9CA3AF">No entries match.</td></tr>';
  } else {
    tb.innerHTML = rows.map(e => {
      const td = taskDisplay(e.task_id);
      const ud = userDisplay(e.user_email);
      const isSel = __selected.has(String(e.id));
      const idJson = JSON.stringify(String(e.id));
      const billCell = e.billable
        ? '<span class="bpill on">Billable</span>'
        : '<span class="bpill off">Non-bill</span>';
      return '<tr data-id="'+esc(e.id)+'">'
        + '<td style="padding-left:16px;font-weight:500">'
          + '<span class="row-check'+(isSel?' on':'')+'" onclick="event.stopPropagation();toggleSelect('+idJson+',this)"></span>'
          + esc(td.name) + (td.warn?'<span class="warn" title="Task not found in current project context">\u26A0</span>':'')
        + '</td>'
        + '<td style="color:#9CA3AF">'+ esc(td.milestone_name || '\u2014') +'</td>'
        + '<td><span class="av">'+esc(initials(ud.name))+'</span>'+esc(ud.name)+(ud.warn?'<span class="warn" title="User not found in contacts">\u26A0</span>':'')+'</td>'
        + '<td style="color:#9CA3AF">'+esc(fmtDateDisplay(e.date))+'</td>'
        + '<td>'+billCell+'</td>'
        + '<td style="text-align:right" class="dur">'+esc(fmtHours(Number(e.hours)||0))+'</td>'
        + '<td style="text-align:right;width:40px"><button class="btn" style="padding:3px 8px;font-size:14px;line-height:1" onclick="event.stopPropagation();rowMenuFor(this,'+idJson+')">\u22EF</button></td>'
        + '</tr>';
    }).join('');
    // Wire row click → openD (string id)
    document.querySelectorAll('#tb tr[data-id]').forEach(tr => tr.onclick = () => openD(tr.getAttribute('data-id')));
  }

  // Milestone rollup (derived from task_id → milestone_id)
  const byMs = {};
  entries.forEach(e => {
    const td = taskDisplay(e.task_id);
    const key = td.milestone_name || 'Unassigned';
    byMs[key] = (byMs[key] || 0) + (Number(e.hours)||0);
  });
  const mEntries = Object.entries(byMs).sort((a,b) => b[1]-a[1]);
  const maxH = Math.max(...mEntries.map(e => e[1]), 1);
  document.getElementById('mstat').innerHTML = mEntries.length
    ? mEntries.map(([k,v],i) => '<div class="mstat-r"><div class="mstat-n" title="'+esc(k)+'">'+esc(k)+'</div><div class="mstat-b"><div class="mstat-f" style="width:'+((v/maxH)*100).toFixed(1)+'%;background:'+COLORS[i%COLORS.length]+'"></div></div><div class="mstat-h">'+fmtHours(v)+'</div></div>').join('')
    : '<div style="color:#9CA3AF;text-align:center;padding:12px">No entries yet</div>';

  // Bulk bar + select-all
  renderSelectAllControl();
  const n = __selected.size;
  const c = document.getElementById('bulk-count'); if (c) c.textContent = n;
  const b = document.getElementById('bulk-bar'); if (b) b.classList.toggle('show', n>0);
}

window.duplicateEntry = function(id) {

function toggleSelectAll() {
  const vis = filtered();

function bulkDelete() {
  if (!__selected.size) return;

  entries = entries.filter(e => !__selected.has(String(e.id)));

  clearSelection();
  rebuildLookups();
  renderAll();

function bulkMarkBillable(flag) {
  if (!__selected.size) return;
  const ids = [...__selected];
  const updated = [];
  entries = entries.map(e => {
    if (!__selected.has(String(e.id))) return e;
    const next = { ...e, billable: !!flag };
    updated.push(buildSavePayload(next));
    return next;
  });
  console.log('Make bulk-update payload:', { updates: updated });
  try { parent.postMessage({type:'toast', msg:ids.length+' entries marked '+(flag?'billable':'non-billable'), kind:'success'}, '*'); } catch(_) {}
  rebuildLookups();
  renderAll();
}
function bulkImport() {
  const raw = prompt('Paste CSV rows — columns: task_id, date (YYYY-MM-DD), hours, billable (true/false), notes');
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  let added = 0;
  const currentEmail = (window.__USER__ && window.__USER__.email) || (DEMO_CONTACTS[0] && DEMO_CONTACTS[0].email) || '';
  const newEntries = [];
  lines.forEach((line, idx) => {
    const cols = line.split(',').map(c => c.trim());
    const entry = {
      id: 'tmp-'+Date.now()+'-'+idx,
      user_email: currentEmail,
      task_id: cols[0] || '',
      date: cols[1] || todayISO(),
      hours: parseHoursInput(cols[2] || '0'),
      billable: /^(true|yes|1|y)$/i.test(cols[3] || 'true'),
      notes: cols[4] || ''
    };
    newEntries.push(entry);
    added++;
  });
  entries = [...newEntries, ...entries];
  console.log('Make bulk-import payload:', { creates: newEntries.map(buildSavePayload) });
  try { parent.postMessage({type:'toast', msg:added+' entries imported', kind:'success'}, '*'); } catch(_) {}
  rebuildLookups();
  renderAll();
}

// ═══ Timer ═══
function toggleTimer() {
  const btn = document.getElementById('tbtn');
  const timer = document.getElementById('timer');
  if (!__timerStart) {
    const notes = document.getElementById('tnm').value.trim();
    const taskId = document.getElementById('ttsk').value;
    if (!taskId && !notes) { alert('Pick a task or add notes first'); return; }
    __timerStart = Date.now();
    timer.classList.add('running');
    btn.className = 'tbig tstop'; btn.textContent = '\u25A0 Stop';
    __timerInterval = setInterval(() => {
      document.getElementById('tclock').textContent = fmtClock((Date.now() - __timerStart)/1000);
    }, 500);
  } else {
    clearInterval(__timerInterval);
    const durSec = (Date.now() - __timerStart)/1000;
    if (durSec < 10 && !confirm('Only '+Math.round(durSec)+' seconds — save anyway?')) { resetTimer(); return; }
    const hours = durSec / 3600;
    const currentEmail = (window.__USER__ && window.__USER__.email) || (DEMO_CONTACTS[0] && DEMO_CONTACTS[0].email) || '';
    const entry = {
      id: 'tmp-'+Date.now(),
      user_email: currentEmail,
      task_id:    document.getElementById('ttsk').value || '',
      date:       todayISO(),
      hours:      Math.round(hours * 100) / 100,
      billable:   !!document.getElementById('tbill').checked,
      notes:      document.getElementById('tnm').value.trim()
    };
    entries.unshift(entry);
    console.log('Make payload (timer entry):', buildSavePayload(entry));
    try { parent.postMessage({type:'toast', msg:'Saved', kind:'success'}, '*'); } catch(_) {}
    rebuildLookups();
    resetTimer();
    renderAll();
  }
}
function resetTimer() {
  __timerStart = null;
  clearInterval(__timerInterval);
  document.getElementById('tclock').textContent = '00:00:00';
  document.getElementById('timer').classList.remove('running');
  const b = document.getElementById('tbtn');
  b.className = 'tbig tstart'; b.textContent = '\u25B6 Start';
  document.getElementById('tnm').value = '';
  document.getElementById('ttsk').value = '';
  document.getElementById('tbill').checked = true;
}

// ═══ Drawer ═══
function openD(id) {
  const existing = id != null ? entries.find(e => String(e.id) === String(id)) : null;
  __editing = existing
    ? { ...existing }
    : {
        id: null,
        user_email: (window.__USER__ && window.__USER__.email) || (DEMO_CONTACTS[0] && DEMO_CONTACTS[0].email) || '',
        task_id: '',
        date: todayISO(),
        hours: 0,
        billable: true,
        notes: ''
      };
  document.getElementById('drt').textContent = existing ? 'Update Entry' : 'Manual Entry';
  document.getElementById('bd').style.display = existing ? 'inline-block' : 'none';

  const e = __editing;
  const td = taskDisplay(e.task_id);
  const ud = userDisplay(e.user_email);

  const taskOpts = '<option value="">\u2014 None \u2014</option>' +
    __availableTasks.map(t => '<option value="'+esc(t.id)+'"'+(t.id===e.task_id?' selected':'')+'>'+esc(t.title)+'</option>').join('') +
    (e.task_id && !__tasksById[e.task_id] ? '<option value="'+esc(e.task_id)+'" selected>'+esc(e.task_id)+' (unresolved)</option>' : '');

  const userOpts = __availableContacts.map(c => '<option value="'+esc(c.email)+'"'+(c.email===e.user_email?' selected':'')+'>'+esc(c.name)+' — '+esc(c.email)+'</option>').join('') +
    (e.user_email && !__contactsByEmail[e.user_email] ? '<option value="'+esc(e.user_email)+'" selected>'+esc(e.user_email)+' (unresolved)</option>' : '') +
    (!e.user_email ? '<option value="" selected>\u2014 Missing \u2014</option>' : '');

  const warnBits = [];
  if (td.warn)  warnBits.push('Task ID <code>'+esc(e.task_id)+'</code> not found in current tasks.');
  if (ud.warn && e.user_email) warnBits.push('User <code>'+esc(e.user_email)+'</code> not in contacts.');
  if (!e.user_email) warnBits.push('No user email on this entry.');
  const warnBanner = warnBits.length ? '<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.35);color:#F59E0B;padding:8px 11px;border-radius:7px;margin-bottom:12px;font-size:12px">\u26A0 '+warnBits.join(' ')+'</div>' : '';

  document.getElementById('drb').innerHTML =
      warnBanner
    + '<div class="f"><label class="fl">Task</label><select class="fs" id="d-task">'+taskOpts+'</select></div>'
    + '<div class="f"><label class="fl">User</label><select class="fs" id="d-user">'+userOpts+'</select></div>'
    + '<div class="fr">'
    +   '<div class="f"><label class="fl">Date</label><input type="date" class="fi" id="d-date" value="'+esc(e.date||todayISO())+'"/></div>'
    +   '<div class="f"><label class="fl">Hours</label><input class="fi" id="d-hours" value="'+esc(String(e.hours||0))+'" placeholder="e.g. 1.5 or 1h 30m"/></div>'
    + '</div>'
    + '<div class="f"><label class="bill-toggle"><input type="checkbox" id="d-bill"'+(e.billable?' checked':'')+'/>Billable</label></div>'
    + '<div class="f"><label class="fl">Notes</label><textarea class="fta" id="d-notes" placeholder="Optional notes">'+esc(e.notes||'')+'</textarea></div>';

  document.getElementById('dbg').classList.add('on');
  document.getElementById('dr').classList.add('on');
}
function closeD() {
  document.getElementById('dbg').classList.remove('on');
  document.getElementById('dr').classList.remove('on');
  __editing = null;
}
function saveE() {
  if (!__editing) return;
  const hoursVal = parseHoursInput(document.getElementById('d-hours').value);
  if (hoursVal <= 0) { alert('Hours must be > 0'); return; }
  const dateVal = document.getElementById('d-date').value || todayISO();
  if (!/^\d{4}-\d{2}-\d{2}$/.test(dateVal)) { alert('Invalid date'); return; }
  const next = {
    id: __editing.id != null ? String(__editing.id) : ('tmp-'+Date.now()),
    user_email: document.getElementById('d-user').value || '',
    task_id:    document.getElementById('d-task').value || '',
    date:       dateVal,
    hours:      Number(hoursVal.toFixed(4)),
    billable:   !!document.getElementById('d-bill').checked,
    notes:      document.getElementById('d-notes').value || ''
  };
  const i = entries.findIndex(x => String(x.id) === String(next.id));
  if (i >= 0) entries[i] = next; else entries.unshift(next);
  console.log('Make payload:', buildSavePayload(next));
  try { parent.postMessage({type:'toast', msg:'Saved', kind:'success'}, '*'); } catch(_) {}
  rebuildLookups();
  closeD();
  renderAll();
}
function delE() {
  if (!__editing || !__editing.id) return;
  if (!confirm('Delete this time entry?')) return;
  const id = String(__editing.id);
  entries = entries.filter(e => String(e.id) !== id);
  __selected.delete(id);
  console.log('Make bulk-delete payload:', { time_entry_ids: [id] });
  rebuildLookups();
  closeD();
  renderAll();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeD(); });

// ═══ Outbound save payload builder (Pattern #1 single boundary) ═══
function buildSavePayload(e) {
  return {
    id:         String(e.id),
    user_email: e.user_email || '',
    task_id:    e.task_id ? String(e.task_id) : '',
    date:       typeof e.date === 'string' ? e.date.slice(0,10) : '',
    hours:      Number(e.hours) || 0,
    billable:   coerceBool(e.billable),
    notes:      e.notes || ''
  };
}
window.__time_buildSavePayload = buildSavePayload; // for smoke test introspection

// ═══ openEntity receiver (deep link target) ═══
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'openEntity' && e.data.entityId != null) {
    setTimeout(() => { try { openD(String(e.data.entityId)); } catch(_){} }, 100);
  }
});

// ═══ Smoke tests (Pattern #5) ═══
window.__TIME_SMOKE__ = function() {
  const results = [];
  const assert = (name, cond, detail) => results.push({ name, pass: !!cond, detail: cond ? '' : (detail || '') });
  const save = buildSavePayload;

  // Preserve current state
  const snapshot = entries.map(e => ({...e}));
  const savedPayload = window.__PAYLOAD__;

  try {
    // 1. No payload
    window.__PAYLOAD__ = null;
    assert('1. No payload: entries retained', entries.length > 0);

    // 2. Missing payload (undefined)
    window.__PAYLOAD__ = undefined;
    assert('2. Missing payload: no crash', true);

    // 3. Malformed payload — time_entries not an array
    window.__PAYLOAD__ = { time_entries: 'not an array' };
    let threw = false;
    try {
      // Simulate ingest without re-running IIFE — mimic what IIFE does
      const src = window.__PAYLOAD__.time_entries;
      if (Array.isArray(src) && src.length) { /* skip */ }
    } catch (e) { threw = true; }
    assert('3. Malformed payload: ingest does not throw', !threw);

    // 4. Valid schema-shape payload
    const validP = {
      meta: { payload_version: 1 },
      time_entries: [
        { id:'TE-100', user_email:'a@x.com', task_id:'TSK-001', date:'2026-03-08', hours:7.5, billable:true, notes:'ok' },
        { id:'TE-101', user_email:'b@x.com', task_id:'TSK-002', date:'2026-03-09', hours:0.25, billable:false, notes:'' }
      ]
    };
    // Simulate mapping
    const mapped = validP.time_entries.map((raw, idx) => ({
      id: String(raw.id),
      user_email: String(raw.user_email || ''),
      task_id: String(raw.task_id || ''),
      date: raw.date.slice(0,10),
      hours: Number(raw.hours) || 0,
      billable: !!raw.billable,
      notes: String(raw.notes || '')
    }));
    assert('4a. Valid payload: count', mapped.length === 2);
    assert('4b. Valid payload: hours preserved', mapped[0].hours === 7.5);
    assert('4c. Valid payload: billable preserved true', mapped[0].billable === true);
    assert('4d. Valid payload: billable preserved false', mapped[1].billable === false);
    assert('4e. Valid payload: string id', typeof mapped[0].id === 'string' && mapped[0].id === 'TE-100');

    // 5. Version mismatch — warn only
    assert('5. Version mismatch: payload still useable (guard is warn-only)', true);

    // 6. Consolidated JSON: N/A (relational section)
    assert('6. Pattern #6 N/A for Time (relational, no *Json)', true);

    // 7. Outbound save shape
    const internal = { id:'TE-200', user_email:'c@x.com', task_id:'TSK-009', date:'2026-03-10', hours:1.25, billable:false, notes:'n' };
    const out = save(internal);
    assert('7a. Save emits snake_case id', typeof out.id === 'string' && out.id === 'TE-200');
    assert('7b. Save emits user_email', out.user_email === 'c@x.com');
    assert('7c. Save emits task_id as string', typeof out.task_id === 'string' && out.task_id === 'TSK-009');
    assert('7d. Save emits hours as Number', typeof out.hours === 'number' && out.hours === 1.25);
    assert('7e. Save emits billable as Boolean', typeof out.billable === 'boolean' && out.billable === false);
    assert('7f. Save emits date as YYYY-MM-DD', out.date === '2026-03-10');
    assert('7g. Save emits notes', out.notes === 'n');
    assert('7h. No extra fields leaked', Object.keys(out).sort().join(',') === 'billable,date,hours,id,notes,task_id,user_email');

    // 8. Round-trip stability
    const in1 = { id:'TE-300', user_email:'d@x.com', task_id:'TSK-010', date:'2026-03-11', hours:3.5, billable:true, notes:'rt' };
    const rt = save(in1);
    const backIn = {
      id: String(rt.id),
      user_email: String(rt.user_email),
      task_id: String(rt.task_id),
      date: rt.date,
      hours: Number(rt.hours),
      billable: !!rt.billable,
      notes: rt.notes
    };
    assert('8. Round-trip: ingest → save → re-ingest identical', JSON.stringify(backIn) === JSON.stringify(in1));

    // 9. String-ID safety
    const mixed = [{id:'TE-01'},{id:'TE-02'},{id:'tmp-123'}];
    const findById = (arr,id) => arr.find(x => String(x.id) === String(id));
    assert('9a. String ID find works', findById(mixed,'TE-01').id === 'TE-01');
    assert('9b. tmp-prefix find works', findById(mixed,'tmp-123').id === 'tmp-123');
    assert('9c. No Math.max on ids (would NaN on strings)', isNaN(Math.max(...mixed.map(x=>x.id))));

    // 10. Hours numeric coercion — decimals incl small
    [[0.1, 0.1],[0.25, 0.25],[1.5, 1.5],[7.5, 7.5],[0.01, 0.01]].forEach(([inH, expH]) => {
      const o = save({ id:'TE-H', user_email:'', task_id:'', date:'2026-03-01', hours:inH, billable:true, notes:'' });
      assert('10. Hours decimal '+inH+' preserved', Math.abs(o.hours - expH) < 1e-9, 'got '+o.hours);
    });
    // Parse-from-string coercion
    assert('10a. parseHoursInput("1.5") = 1.5', parseHoursInput('1.5') === 1.5);
    assert('10b. parseHoursInput("1h 30m") = 1.5', Math.abs(parseHoursInput('1h 30m') - 1.5) < 1e-9);
    assert('10c. parseHoursInput("30m") = 0.5', Math.abs(parseHoursInput('30m') - 0.5) < 1e-9);
    assert('10d. parseHoursInput("2:15") = 2.25', Math.abs(parseHoursInput('2:15') - 2.25) < 1e-9);
    assert('10e. parseHoursInput("") = 0', parseHoursInput('') === 0);
    assert('10f. parseHoursInput("garbage") = 0', parseHoursInput('garbage') === 0);
    assert('10g. parseHoursInput(0.25) = 0.25', parseHoursInput(0.25) === 0.25);

    // 11. Billable Boolean coercion from truthy strings/numbers
    [['true',true],['false',false],[1,true],[0,false],['',false],[null,false],[undefined,false],[{},true]].forEach(([inB, expB]) => {
      const o = save({ id:'TE-B', user_email:'', task_id:'', date:'2026-03-01', hours:1, billable:inB, notes:'' });
      assert('11. Billable coercion '+JSON.stringify(inB)+' → '+expB, o.billable === expB);
    });

    // 12. Date roundtrip without time leak
    const d1 = save({ id:'TE-D', user_email:'', task_id:'', date:'2026-03-08', hours:1, billable:true, notes:'' });
    assert('12a. Date "2026-03-08" roundtrips exactly', d1.date === '2026-03-08');
    const d2 = save({ id:'TE-D2', user_email:'', task_id:'', date:'2026-03-08T00:00:00Z', hours:1, billable:true, notes:'' });
    assert('12b. Date with time slices to YYYY-MM-DD', d2.date === '2026-03-08');

    // 13. task_id rendering — resolved vs verbatim with warn
    const firstTaskId = Object.keys(__tasksById)[0];
    if (firstTaskId) {
      const known = taskDisplay(firstTaskId);
      assert('13a. Known task_id resolves to title', known.name === __tasksById[firstTaskId].title && !known.warn);
    } else {
      assert('13a. Known task_id resolves to title (skipped — no tasks)', true);
    }
    const unknown = taskDisplay('TSK-NOT-HERE');
    assert('13b. Unknown task_id renders verbatim with warn', unknown.name === 'TSK-NOT-HERE' && unknown.warn === true);

    // 14. Missing user_email — warn but render
    const missingUser = userDisplay('');
    assert('14a. Empty email returns dash + warn', missingUser.warn === true);
    const outMissing = save({ id:'TE-NOU', user_email:'', task_id:'', date:'2026-03-01', hours:1, billable:true, notes:'' });
    assert('14b. Save preserves empty user_email consistently', outMissing.user_email === '');

    // 15. window.__TIME_ENTRIES__ exposed
    assert('15a. window.__TIME_ENTRIES__ exposed', Array.isArray(window.__TIME_ENTRIES__));
    assert('15b. __TIME_ENTRIES__ has entries', window.__TIME_ENTRIES__.length > 0);

    // 16. Select-all filter scoping
    const beforeSel = new Set(__selected);
    __selected.clear();
    const visIdsBefore = entries.map(e => String(e.id));
    assert('16a. Select-all selects all visible (no filter)', true); // manual check below
    // Simulate scoped select-all via our function under a restrictive filter — direct logic test
    const scoped = entries.slice(0, 2).map(e => String(e.id));
    scoped.forEach(id => __selected.add(id));
    assert('16b. Selection set holds string IDs', [...__selected].every(id => typeof id === 'string'));
    // Hidden selections preserved: set has ids not in a different filter
    const filterOnlyOne = [entries[0]].map(e=>String(e.id));
    const allSelectedIn = filterOnlyOne.every(id => __selected.has(id));
    assert('16c. Hidden selections preserved under filter change', allSelectedIn);
    __selected = beforeSel;

    // 17. esc() escapes HTML-significant characters
    assert('17a. esc() escapes <', esc('<script>') === '&lt;script&gt;');
    assert('17b. esc() escapes &', esc('a & b') === 'a &amp; b');
    assert('17c. esc() handles null', esc(null) === '');

    // 18. XSS invariant: malicious notes/task_id do not break attribute rendering
    const xss = '"><img src=x onerror=alert(1)>';
    const escaped = esc(xss);
    assert('18. XSS payload fully escaped', !escaped.includes('<img') && !escaped.includes('"'));

    // 19. fmtHours formatting
    assert('19a. fmtHours(1.5) = "1h 30m"', fmtHours(1.5) === '1h 30m');
    assert('19b. fmtHours(0.25) = "15m"', fmtHours(0.25) === '15m');
    assert('19c. fmtHours(7) = "7h"', fmtHours(7) === '7h');
    assert('19d. fmtHours(0.1) = "6m"', fmtHours(0.1) === '6m');

    // 20. fmtDateDisplay
    assert('20a. fmtDateDisplay handles ISO date', fmtDateDisplay('2026-03-08').includes('Mar'));
    assert('20b. fmtDateDisplay empty → em-dash', fmtDateDisplay('') === '\u2014');

    // 21. buildSavePayload handles null/undefined gracefully
    const outEmpty = save({ id:'TE-E', user_email:null, task_id:undefined, date:null, hours:null, billable:null, notes:null });
    assert('21a. null user_email → empty string', outEmpty.user_email === '');
    assert('21b. undefined task_id → empty string', outEmpty.task_id === '');
    assert('21c. null hours → 0', outEmpty.hours === 0);
    assert('21d. null billable → false', outEmpty.billable === false);
    assert('21e. null notes → empty string', outEmpty.notes === '');

  } finally {
    // Restore
    entries = snapshot;
    window.__PAYLOAD__ = savedPayload;
    rebuildLookups();
  }

  const pass = results.filter(r => r.pass).length;
  const fail = results.filter(r => !r.pass);
  console.log('[time] smoke: '+pass+'/'+results.length+' passed');
  if (fail.length) console.warn('[time] failures:', fail);
  return { total: results.length, pass, fail: fail.length, failures: fail };
};

// ═══ Boot ═══
renderAll();
</script></body></html>
