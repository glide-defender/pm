<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>My Work</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#171717;color:#E5E7EB;font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;padding:20px}
.hd{margin-bottom:18px}
.ti{font-size:20px;font-weight:700;color:#fff}
.sb{font-size:12.5px;color:#9CA3AF;margin-top:4px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:#1f1f1f;border:1px solid #2a2a2a;border-left:3px solid;border-radius:8px;padding:12px 14px;cursor:pointer;transition:border-color .12s}
.kpi:hover{border-color:#3a3a3a}
.kl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#9CA3AF;margin-bottom:5px}
.kv{font-size:22px;font-weight:800}
.kc{font-size:11px;color:#9CA3AF;margin-top:3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#1f1f1f;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
.card.wide{grid-column:1 / -1}
.ch{padding:14px 16px;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center;gap:10px}
.ch-l{min-width:0;flex:1}
.ct{font-size:13px;font-weight:700}
.cs{font-size:11px;color:#9CA3AF;margin-top:2px}
.ch-a{font-size:11px;color:#9CA3AF;cursor:pointer;white-space:nowrap}
.ch-a:hover{color:#F59E0B}
.cbody{max-height:320px;overflow-y:auto}
.item{padding:10px 16px;border-bottom:1px solid #252525;display:flex;align-items:center;gap:10px;font-size:12.5px;cursor:pointer}
.item:last-child{border-bottom:none}
.item:hover{background:#252525}
.item.highlight{background:rgba(245,158,11,.12);border-left:2px solid #F59E0B}
.item-nm{flex:1;color:#E5E7EB;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.item-meta{font-size:10.5px;color:#6a6a6a;white-space:nowrap;flex-shrink:0}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;vertical-align:middle}
.empty{padding:24px;text-align:center;color:#9CA3AF;font-size:11.5px}
.banner{padding:12px 16px;background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(66,134,244,.06));border:1px solid #2a2a2a;border-radius:10px;margin-bottom:16px;font-size:13px}
.banner strong{color:#F59E0B}
.hrs-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#252525}
.hrs-cell{background:#1f1f1f;padding:16px;text-align:center}
.hrs-v{font-size:20px;font-weight:800;color:#F59E0B}
.hrs-l{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#9CA3AF;margin-top:4px}
.hrs-sub{font-size:11px;color:#6a6a6a;margin-top:2px}
</style></head><body>
<div class="hd">
  <div class="ti" id="greeting">Good afternoon</div>
  <div class="sb" id="subtitle">Here's what needs your attention today</div>
</div>
<div class="banner" id="banner"></div>
<div class="kpis" id="kpis"></div>
<div class="grid" id="cards"></div>

<script>
(function(){
  'use strict';
  const SECTION_NAME = 'mywork';

  // ─── XSS-safe interpolation (Pattern #3) ───
  const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // ─── Email comparator (case-insensitive, trim-safe) — Pattern #4 ───
  const normalizeEmail = e => String(e == null ? '' : e).toLowerCase().trim();
  const emailEq = (a, b) => {
    const na = normalizeEmail(a), nb = normalizeEmail(b);
    return na !== '' && na === nb;
  };

  // ─── Defensive array read ───
  const arr = v => Array.isArray(v) ? v : [];
  const pickArr = (primary, fallback) => {
    const p = arr(primary);
    if (p.length) return p;
    return arr(fallback);
  };

  // ═══ PAYLOAD INGESTION ═══
  // My Work is a cross-cut aggregation view — it owns no data of its own.
  // This IIFE runs version check + boot warning; data reads happen lazily
  // via accessor functions below so we always reflect the latest state of
  // globals populated by peer sections (which may ingest after we do).
  (function ingestPayload(){
    try {
      const P = window.__PAYLOAD__;
      if (!P) return; // no payload → fall through to DEMO_PAYLOAD seed below

      const expectedVersion = 1;
      const actualVersion = P?.meta?.payload_version;
      if (actualVersion != null && actualVersion !== expectedVersion) {
        console.warn(`[${SECTION_NAME}] payload v${expectedVersion} expected, got v${actualVersion} — rendering best-effort`);
      }

      // My Work doesn't overwrite a local state array; it reads cross-section
      // globals at render time. Nothing to map here — just flag boot.
      console.warn('Payload ingestion active:', SECTION_NAME);
    } catch (err) {
      console.warn(`[${SECTION_NAME}] payload ingestion failed, falling back to demo data:`, err);
    }
  })();

  // ═══ DEMO PAYLOAD SEED ═══
  // If no live payload AND peer-section globals are empty (e.g. running
  // this section standalone, or chat loaded My Work before any peers
  // ingested), seed a synthetic payload so the dashboard renders populated.
  // This matches the behavior of the original hardcoded-demo version.
  (function seedDemo(){
    if (window.__PAYLOAD__) return;
    const ME = 'amorgan@example.com';
    const OTHER = 'srivera@example.com';
    // Dates anchored relative to "now" so demo always looks current.
    const today = new Date();
    const iso = (d) => new Date(d).toISOString().slice(0,10);
    const isoFull = (d) => new Date(d).toISOString();
    const addDays = (n) => { const d = new Date(today); d.setDate(d.getDate()+n); return d; };
    const addHours = (n) => { const d = new Date(today); d.setHours(d.getHours()+n); return d; };

    window.__PAYLOAD__ = {
      loggedin_user_email: ME,
      loggedin_user_name:  'Alex Morgan',
      loggedin_user_role:  'PM',
      tasks: [
        { id:'TSK-101', title:'Commission access control at Door 3', assignee_email:ME, status:'In Progress', priority:'High',   end: iso(addDays(11)) },
        { id:'TSK-102', title:'Verify VLAN segmentation on IoT',      assignee_email:ME, status:'In Progress', priority:'Normal', end: iso(addDays(1)) },
        { id:'TSK-103', title:'Invoice for closeout',                 assignee_email:ME, status:'Not Started', priority:'Normal', end: iso(addDays(44)) },
        { id:'TSK-104', title:'Speak to client about service contract', assignee_email:ME, status:'In Progress', priority:'High', end: iso(addDays(-6)) },
        { id:'TSK-105', title:'Submit shop drawings rev 3',           assignee_email:OTHER, status:'In Progress', priority:'Normal', end: iso(addDays(3)) }
      ],
      riskTrackerJson: [
        { id:'RK-01', title:'Network delayed going live',    owner_email:ME, status:'Open',       likelihood:'High',   impact:'High', score:16 },
        { id:'RK-02', title:'Procurement delay on cameras',  owner_email:ME, status:'Mitigating', likelihood:'Medium', impact:'Medium', score:9 }
      ],
      punchListJson: [
        { id:'PL-01', title:'Door 3 strike aligned wrong',  assignee_email:ME, status:'Open',        severity:'Medium', due: iso(addDays(-3)) },
        { id:'PL-02', title:'Cable tray gap at IDF-2',      assignee_email:ME, status:'In Progress', severity:'Low',    due: iso(addDays(-1)) },
        { id:'PL-03', title:'Missing cover plate B-204',    assignee_email:ME, status:'Open',        severity:'Low',    due: iso(addDays(5)) },
        { id:'PL-04', title:'Reader LED wiring reversed',   assignee_email:ME, status:'Open',        severity:'Medium', due: iso(addDays(8)) }
      ],
      observationsJson: [
        { id:'OB-01', text:'Conduit run above ceiling not supported per spec', observed_by:ME, status:'Open',      severity:'Medium', observed_at: iso(addDays(-2)) },
        { id:'OB-02', text:'Camera 7 has glare from overhead light',           observed_by:ME, status:'In Review', severity:'Low',    observed_at: iso(addDays(-5)) }
      ],
      rfiJson: [
        { id:'RFI-01', question:'Confirm panel location in IDF-2',          asked_by:ME, status:'Open',     asked_at: iso(addDays(-4)) },
        { id:'RFI-02', question:'Which card format for retrofit readers?',  asked_by:ME, status:'Answered', asked_at: iso(addDays(-8)) }
      ],
      meetings: [
        { id:'MTG-01', title:'Weekly OAC',            datetime: isoFull(addHours(4)),   attendees:[ME,'client@acme.com'] },
        { id:'MTG-02', title:'Commissioning walk-through', datetime: isoFull(addDays(1)), attendees:[ME, OTHER] },
        { id:'MTG-03', title:'Close-out review',      datetime: isoFull(addDays(3)),    attendees:[ME,'client@acme.com'] }
      ],
      time_entries: [
        { id:'TE-01', user_email:ME, task_id:'TSK-101', date: iso(today), hours:1.5, billable:true,  notes:'Client meeting' },
        { id:'TE-02', user_email:ME, task_id:'TSK-102', date: iso(today), hours:0.5, billable:true,  notes:'CAD design work' },
        { id:'TE-03', user_email:ME, task_id:'TSK-104', date: iso(today), hours:0.5, billable:false, notes:'Procurement call' },
        { id:'TE-04', user_email:ME, task_id:'TSK-101', date: iso(addDays(-1)), hours:3.0, billable:true, notes:'Install supervision' },
        { id:'TE-05', user_email:ME, task_id:'TSK-102', date: iso(addDays(-2)), hours:2.0, billable:true, notes:'Network config' }
      ],
      deployment_items: [
        { id:'DI-01', asset_tag:'CR-LOBBY-01', location:'Lobby North',
          steps_snapshot:[{id:'S1',order:1},{id:'S2',order:2},{id:'S3',order:3},{id:'S4',order:4}],
          responsesJson:[
            { step_id:'S1', status:'Complete', by:ME, at: isoFull(addDays(-5)) },
            { step_id:'S2', status:'Complete', by:ME, at: isoFull(addDays(-4)) },
            { step_id:'S3', status:'In Progress', by:ME }
          ] },
        { id:'DI-02', asset_tag:'CR-LOBBY-02', location:'Lobby South',
          steps_snapshot:[{id:'S1',order:1},{id:'S2',order:2},{id:'S3',order:3},{id:'S4',order:4}],
          responsesJson:[
            { step_id:'S1', status:'Complete', by:ME, at: isoFull(addDays(-3)) }
          ] }
      ],
      activity: [
        { id:'A-01', entity:'task', entity_id:'TSK-101', type:'comment', actor_email:OTHER, actor_name:'Sam Rivera', at: isoFull(addHours(-2)), text:'@Matt see your email from today' },
        { id:'A-02', entity:'task', entity_id:'TSK-102', type:'comment', actor_email:'jchen@example.com', actor_name:'Jordan Chen', at: isoFull(addDays(-1)), text:'@Alex Morgan codes sent' },
        { id:'A-03', entity:'risk', entity_id:'RK-01', type:'status_change', actor_email:OTHER, actor_name:'Sam Rivera', at: isoFull(addDays(-1)) },
        { id:'A-04', entity:'punch', entity_id:'PL-01', type:'update', actor_email:OTHER, actor_name:'Sam Rivera', at: isoFull(addDays(-2)) }
      ],
      attachments: {
        'observation:OB-01': [
          { id:'ATT-01', filename:'conduit_ceiling.jpg', uploaded_at: isoFull(addDays(-2)), uploaded_by:ME }
        ],
        'task:TSK-101': [
          { id:'ATT-02', filename:'door3_commissioning_checklist.pdf', uploaded_at: isoFull(addDays(-3)), uploaded_by:ME }
        ],
        'punch:PL-01': [
          { id:'ATT-03', filename:'door3_strike.jpg', uploaded_at: isoFull(addDays(-4)), uploaded_by:ME }
        ]
      },
      contacts: [
        { id:'CON-01', name:'Alex Morgan',    email:ME,    company:'Northwind Security', role:'PM',        is_internal:true },
        { id:'CON-02', name:'Sam Rivera',   email:OTHER, company:'Northwind Security', role:'Sr Tech',   is_internal:true },
        { id:'CON-03', name:'Jordan Chen',   email:'jchen@example.com', company:'Northwind Security', role:'Lead Tech', is_internal:true }
      ]
    };
    console.warn('[' + SECTION_NAME + '] using demo payload seed (no live payload detected)');
  })();

  // ─── Session accessors (fall through to demo so standalone view works) ───
  function currentUserEmail() {
    return normalizeEmail(
      window.__USER__?.email
      || window.__PAYLOAD__?.loggedin_user_email
      || window.__PAYLOAD__?.project?.pm_email
      || 'amorgan@example.com'
    );
  }
  function currentUserName() {
    const raw = window.__USER__?.name
      || window.__PAYLOAD__?.loggedin_user_name
      || '';
    if (raw) return String(raw);
    // Derive first name from email as last resort
    const em = currentUserEmail();
    const local = em.split('@')[0] || '';
    if (!local) return 'there';
    // misgur → Matt (contact resolve if possible)
    const contacts = getContacts();
    const byEmail = contacts.find(c => emailEq(c?.email, em));
    if (byEmail?.name) return String(byEmail.name).split(' ')[0];
    return local.charAt(0).toUpperCase() + local.slice(1);
  }

  // ─── Cross-section global accessors (defensive — each may be absent if
  //     the owning section hasn't ingested yet, or chat ran out of order) ───
  function getTasks()           { return arr(window.__PAYLOAD__?.tasks); }
  function getMilestones()      { return pickArr(window.__MILESTONES__,             window.__PAYLOAD__?.milestones); }
  function getPunch()           { return pickArr(window.__PAYLOAD__?.punch_list,    window.__PAYLOAD__?.punchListJson); }
  function getObservations()    { return pickArr(window.__PAYLOAD__?.observations,  window.__PAYLOAD__?.observationsJson); }
  function getRisks()           { return pickArr(window.__PAYLOAD__?.risks,         window.__PAYLOAD__?.riskTrackerJson); }
  function getRfi()              { return pickArr(window.__PAYLOAD__?.rfi,          window.__PAYLOAD__?.rfiJson); }
  function getMaterials()       { return pickArr(window.__PAYLOAD__?.materials,     window.__PAYLOAD__?.materialTrackerJson); }
  function getMeetings()        { return arr(window.__PAYLOAD__?.meetings); }
  function getTimeEntries()     { return pickArr(window.__TIME_ENTRIES__,           window.__PAYLOAD__?.time_entries); }
  function getFiles()           { return pickArr(window.__FILES__,                  window.__PAYLOAD__?.files); }
  function getActivity()        { return pickArr(window.__ACTIVITY__,               window.__PAYLOAD__?.activity); }
  function getDeployedAssets()  { return pickArr(window.__DEPLOYED_ASSETS__,        window.__PAYLOAD__?.deployed_assets); }
  function getDeploymentItems() { return pickArr(window.__DEPLOYMENT_ITEMS__,       window.__PAYLOAD__?.deployment_items); }
  function getAttachments()     { return window.__ATTACHMENTS__ || window.__PAYLOAD__?.attachments || {}; }
  function getContacts()        { return pickArr(window.__CONTACTS__,               window.__PAYLOAD__?.contacts); }

  // ─── Per-domain filters (owned / assigned to current user) ───
  const CLOSED_TASK   = new Set(['Done','Closed','Cancelled']);
  const CLOSED_RISK   = new Set(['Closed']);
  const CLOSED_PUNCH  = new Set(['Closed']);
  const CLOSED_OBS    = new Set(['Resolved','Dismissed']);
  const CLOSED_RFI    = new Set(['Closed']);
  const CLOSED_MS     = new Set(['Complete']);

  function myTasks(email, opts) {
    const includeClosed = opts && opts.includeClosed;
    return getTasks().filter(t => emailEq(t?.assignee_email, email) && (includeClosed || !CLOSED_TASK.has(t?.status)));
  }
  function myMilestones(email) {
    return getMilestones().filter(m => emailEq(m?.owner_email, email) && !CLOSED_MS.has(m?.status));
  }
  function myRisks(email) {
    return getRisks().filter(r => emailEq(r?.owner_email, email) && !CLOSED_RISK.has(r?.status));
  }
  function myPunch(email) {
    return getPunch().filter(p => emailEq(p?.assignee_email, email) && !CLOSED_PUNCH.has(p?.status));
  }
  function myObservations(email) {
    return getObservations().filter(o => emailEq(o?.observed_by, email) && !CLOSED_OBS.has(o?.status));
  }
  function myRfi(email) {
    return getRfi().filter(r => emailEq(r?.asked_by, email) && !CLOSED_RFI.has(r?.status));
  }
  function myMeetings(email, nowMs) {
    const now = typeof nowMs === 'number' ? nowMs : Date.now();
    const cutoff = now - 3600000; // include meetings that started within last hour
    return getMeetings().filter(m => {
      const atts = arr(m?.attendees);
      if (!atts.some(a => emailEq(a, email))) return false;
      const dt = m?.datetime ? new Date(m.datetime).getTime() : NaN;
      if (!isFinite(dt)) return false;
      return dt >= cutoff;
    }).sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
  }
  function myDeploymentItems(email) {
    return getDeploymentItems().filter(di => {
      const responses = arr(di?.responsesJson);
      return responses.some(r => emailEq(r?.by, email));
    });
  }

  // ─── Time math ───
  function isSameLocalDay(d1, d2) {
    try {
      const a = new Date(d1), b = new Date(d2);
      if (isNaN(a) || isNaN(b)) return false;
      return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    } catch(_) { return false; }
  }
  function startOfWeek(d) {
    const x = new Date(d);
    x.setHours(0,0,0,0);
    const dow = x.getDay(); // Sun=0 ... Sat=6
    x.setDate(x.getDate() - dow);
    return x;
  }
  function todayHours(email, nowArg) {
    const today = nowArg ? new Date(nowArg) : new Date();
    return getTimeEntries()
      .filter(e => emailEq(e?.user_email, email))
      .filter(e => e?.date && isSameLocalDay(e.date, today))
      .reduce((s, e) => s + (Number(e?.hours) || 0), 0);
  }
  function weekHours(email, nowArg) {
    const now = nowArg ? new Date(nowArg) : new Date();
    const sow = startOfWeek(now).getTime();
    const eow = sow + 7 * 86400000;
    const entries = getTimeEntries()
      .filter(e => emailEq(e?.user_email, email))
      .filter(e => {
        const t = e?.date ? new Date(e.date).getTime() : NaN;
        return isFinite(t) && t >= sow && t < eow;
      });
    const total = entries.reduce((s, e) => s + (Number(e?.hours) || 0), 0);
    const billable = entries.filter(e => e?.billable).reduce((s, e) => s + (Number(e?.hours) || 0), 0);
    return { total: +total.toFixed(2), billable: +billable.toFixed(2), nonBillable: +(total - billable).toFixed(2), count: entries.length, entries };
  }

  // ─── Cross-entity attachment / activity resolution ───
  function buildMyEntityKeys(email) {
    const keys = new Set();
    myTasks(email, {includeClosed:true}).forEach(t => t?.id != null && keys.add('task:' + String(t.id)));
    myPunch(email).forEach(p => p?.id != null && keys.add('punch:' + String(p.id)));
    myRisks(email).forEach(r => r?.id != null && keys.add('risk:' + String(r.id)));
    myObservations(email).forEach(o => o?.id != null && keys.add('observation:' + String(o.id)));
    myRfi(email).forEach(r => r?.id != null && keys.add('rfi:' + String(r.id)));
    return keys;
  }
  function attachmentsForMyItems(email) {
    const attachments = getAttachments();
    const myKeys = buildMyEntityKeys(email);
    const out = [];
    Object.keys(attachments || {}).forEach(key => {
      if (myKeys.has(key)) {
        arr(attachments[key]).forEach(a => {
          if (a) out.push({ ...a, entityKey: key });
        });
      }
    });
    return out.sort((a, b) => {
      const at = a?.uploaded_at ? new Date(a.uploaded_at).getTime() : 0;
      const bt = b?.uploaded_at ? new Date(b.uploaded_at).getTime() : 0;
      return bt - at;
    });
  }
  function activityForMyItems(email, limit) {
    const events = getActivity();
    const myKeys = buildMyEntityKeys(email);
    const out = events.filter(ev => {
      const ent = ev?.entity;
      const eid = ev?.entity_id;
      if (!ent || eid == null) return false;
      return myKeys.has(`${String(ent).toLowerCase()}:${String(eid)}`);
    });
    out.sort((a, b) => {
      const at = a?.at ? new Date(a.at).getTime() : 0;
      const bt = b?.at ? new Date(b.at).getTime() : 0;
      return bt - at;
    });
    return out.slice(0, typeof limit === 'number' ? limit : 10);
  }

  // ─── Deep-link navigation (Pattern: postMessage to shell) ───
  // My Work is read-only aggregation — editing happens in the owning
  // section. Clicks navigate with a string entityId so the owning section
  // can pre-select / scroll-to / open-drawer.
  function navigate(section, entityId, filter) {
    try {
      const msg = { type: 'navigate', section };
      if (entityId != null) msg.entityId = String(entityId);
      if (filter) msg.filter = filter;
      parent.postMessage(msg, '*');
    } catch(_) {}
  }
  // Expose for inline onclick + smoke tests
  window.__myworkNavigate = navigate;

  // ─── Status / priority dots (🔴🟡🟢 convention, handoff rule) ───
  function statusDot(status) {
    const s = String(status || '').toLowerCase();
    if (!s) return '#6a6a6a';
    if (/(overdue|high|critical|urgent|blocked|at risk|identified)/.test(s)) return '#EF4444';
    if (/(mitigating|monitoring|medium|in progress|partial|ordered|open|in review)/.test(s)) return '#F59E0B';
    if (/(complete|done|closed|resolved|received|installed|answered|ready for review)/.test(s)) return '#22C55E';
    return '#6a6a6a';
  }
  function priorityDot(p) {
    const pp = String(p || '').toLowerCase();
    if (['high','critical','urgent'].includes(pp)) return '#EF4444';
    if (['normal','medium'].includes(pp)) return '#F59E0B';
    return '#22C55E';
  }
  function severityDot(sev) {
    const s = String(sev || '').toLowerCase();
    if (['high','critical'].includes(s)) return '#EF4444';
    if (['medium'].includes(s)) return '#F59E0B';
    return '#22C55E';
  }

  // ─── Date helpers ───
  function fmtDate(d) {
    if (!d) return '';
    try {
      const x = new Date(d);
      if (isNaN(x)) return '';
      return x.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } catch(_) { return ''; }
  }
  function fmtDateTime(d) {
    if (!d) return '';
    try {
      const x = new Date(d);
      if (isNaN(x)) return '';
      return x.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    } catch(_) { return ''; }
  }
  function fmtRel(d) {
    if (!d) return '';
    try {
      const x = new Date(d);
      if (isNaN(x)) return '';
      const diffMs = Date.now() - x.getTime();
      const diffMin = Math.round(diffMs / 60000);
      if (diffMin < 1 && diffMin > -1) return 'just now';
      if (diffMin < 60 && diffMin > 0) return diffMin + 'm ago';
      const diffH = Math.round(diffMin / 60);
      if (diffH < 24 && diffH > 0) return diffH + 'h ago';
      const diffD = Math.round(diffH / 24);
      if (diffD < 7 && diffD > 0) return diffD + 'd ago';
      return fmtDate(d);
    } catch(_) { return ''; }
  }
  function isOverdue(dueDate, status, nowArg) {
    if (!dueDate) return false;
    if (CLOSED_TASK.has(status) || CLOSED_PUNCH.has(status) || CLOSED_OBS.has(status)) return false;
    try {
      const d = new Date(dueDate);
      if (isNaN(d)) return false;
      const today = nowArg ? new Date(nowArg) : new Date();
      today.setHours(0, 0, 0, 0);
      return d < today;
    } catch(_) { return false; }
  }
  function isThisWeek(dueDate, nowArg) {
    if (!dueDate) return false;
    try {
      const d = new Date(dueDate);
      if (isNaN(d)) return false;
      const now = nowArg ? new Date(nowArg) : new Date();
      const sow = startOfWeek(now).getTime();
      const eow = sow + 7 * 86400000;
      const t = d.getTime();
      return t >= sow && t < eow;
    } catch(_) { return false; }
  }

  // ─── Banner copy ───
  function buildBannerCopy(email) {
    const tasks = myTasks(email);
    const weekTasks = tasks.filter(t => isThisWeek(t?.end || t?.due));
    const overduePunch = myPunch(email).filter(p => isOverdue(p?.due, p?.status));
    const highRisks = myRisks(email).filter(r => (Number(r?.score)||0) >= 12 || String(r?.impact).toLowerCase() === 'high');

    const parts = [];
    if (weekTasks.length) parts.push(`<strong>${weekTasks.length} task${weekTasks.length===1?'':'s'} due this week</strong>`);
    if (highRisks.length) parts.push(`<strong>${highRisks.length} high-priority risk${highRisks.length===1?'':'s'}</strong>`);
    if (overduePunch.length) parts.push(`<strong>${overduePunch.length} overdue punch item${overduePunch.length===1?'':'s'}</strong>`);

    if (!parts.length) return `You're all caught up. No urgent items need your attention right now.`;

    const intro = 'You have ';
    const list = parts.length === 1 ? parts[0]
                : parts.length === 2 ? parts.join(' and ')
                : parts.slice(0, -1).join(', ') + ', and ' + parts[parts.length - 1];
    let suggest = '';
    if (highRisks.length) suggest = ' Focus suggestion: tackle the risk first.';
    else if (overduePunch.length) suggest = ' Focus suggestion: close out the overdue punch.';
    else if (weekTasks.length) suggest = ' Focus suggestion: knock out this week\'s tasks.';
    return intro + list + '.' + suggest;
