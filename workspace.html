<script>

// ═══════ PROGRESS ENGINE (industry-standard, duration-weighted) ═══════
window.computeProgress = function(P) {
  // P = { phases:[{id,name,milestones:[{id,name,durationDays,actionItems:[{id,name,percent,durationDays}], userPercent}]}], trackers:{deployment:{pct}, materials:{pct}, punch:{pct}, observations:{pct}, risks:{pct}, rfi:{pct}} }
  const wavg = (items, valFn, wFn) => {
    let sw = 0, swv = 0;
    items.forEach(i => {
      const w = Math.max(wFn(i) || 0, 0.001);
      sw += w;
      swv += w * (valFn(i) || 0);
    });
    return sw > 0 ? swv / sw : 0;
  };
  // Milestone % from action items (duration-weighted); fallback to userPercent if no items
  const msPct = m => {
    if (m.actionItems && m.actionItems.length > 0) {
      return wavg(m.actionItems, a => a.percent || 0, a => a.durationDays || 1);
    }
    return m.userPercent != null ? m.userPercent : 0;
  };
  // Phase % from milestones (duration-weighted)
  const phPct = p => wavg(p.milestones || [], m => msPct(m), m => m.durationDays || 1);
  // Schedule work = phases duration-weighted
  const scheduleWork = wavg(P.phases || [], p => phPct(p), p => (p.milestones || []).reduce((s,m)=>s+(m.durationDays||1),0));
  // Tracker components (0-100 each, null = not applicable)
  const T = P.trackers || {};
  const comps = [
    { key: 'schedule', label: 'Schedule Work', pct: scheduleWork, weight: 60 },
    { key: 'deployment', label: 'Deployment', pct: T.deployment, weight: 12 },
    { key: 'materials', label: 'Materials', pct: T.materials, weight: 10 },
    { key: 'punch', label: 'Punch List', pct: T.punch, weight: 7 },
    { key: 'observations', label: 'Observations', pct: T.observations, weight: 5 },
    { key: 'risks', label: 'Risks', pct: T.risks, weight: 3 },
    { key: 'rfi', label: 'RFIs', pct: T.rfi, weight: 3 }
  ];
  // Redistribute weights of N/A trackers proportionally
  const active = comps.filter(c => c.pct != null);
  const totalWeight = active.reduce((s,c) => s + c.weight, 0);
  active.forEach(c => c.adjWeight = totalWeight > 0 ? (c.weight / totalWeight) * 100 : 0);
  const composite = active.reduce((s,c) => s + c.pct * (c.adjWeight/100), 0);
  return {
    overall: Math.round(composite),
    scheduleWork: Math.round(scheduleWork),
    components: comps,
    milestonePcts: (P.phases || []).flatMap(p => (p.milestones || []).map(m => ({id: m.id, pct: msPct(m), derived: (m.actionItems||[]).length > 0}))),
    phasePcts: (P.phases || []).map(p => ({id: p.id, pct: phPct(p)}))
  };
};

// Mock project for shell (same data echoed in section-actions for consistency)
window.__PROJECT__ = {
  phases: [
    {id:'p1', name:'Phase 1', milestones:[
      {id:1, name:'Initial Site Survey', durationDays:5, actionItems:[{id:1, name:'Speak to client about service contract', percent:82, durationDays:3}]}
    ]},

window.__renderPaletteResults = function(q) {
  const host = document.getElementById('cmd-results');
  if (!host) return;

    type:'section', label: b.querySelector('.nl').textContent, key: b.dataset.k, icon: '→'
  }));

    { type:'action', label:'New Milestone', icon:'+', fn:()=>window.__gotoAndCreate('schedule') },

    { type:'action', label:'New Risk', icon:'+', fn:()=>window.__gotoAndCreate('risks') },
    { type:'action', label:'New RFI', icon:'+', fn:()=>window.__gotoAndCreate('rfi') },
    { type:'action', label:'New Meeting', icon:'+', fn:()=>window.__gotoAndCreate('meetings') },
    { type:'action', label:'New Material', icon:'+', fn:()=>window.__gotoAndCreate('materials') },
    { type:'action', label:'New Line Item', icon:'+', fn:()=>window.__gotoAndCreate('finance') },
    { type:'action', label:'New Contact', icon:'+', fn:()=>window.__gotoAndCreate('contacts') }
  ];
  let results = q ? [...navItems, ...actions].filter(r => r.label.toLowerCase().includes(q)).slice(0, 10) : navItems.slice(0, 8);
  window.__paletteResults = results;
  window.__paletteIdx = 0;
  if (!results.length) { host.innerHTML = '<div style="padding:12px;color:#9CA3AF;font-size:12px;text-align:center">No matches</div>'; host.style.display='block'; return; }
  host.innerHTML = results.map((r,i)=>`<div data-i="${i}" style="padding:7px 10px;border-radius:5px;display:flex;align-items:center;gap:8px;cursor:pointer;${i===0?'background:#252525':''}"><span style="width:14px;color:#9CA3AF;font-size:11px;font-weight:700">${r.icon}</span><div style="flex:1"><div style="font-size:12px;color:#fff;font-weight:500">${r.label}</div><div style="font-size:9.5px;color:#6a6a6a">${r.type==='action'?'Create':'Go to'}</div></div></div>`).join('');
  host.style.display = 'block';
  host.querySelectorAll('[data-i]').forEach(el=>{
    el.onmouseenter=()=>{window.__paletteIdx=+el.dataset.i;window.__paintPaletteSel();};
    el.onmousedown=(e)=>{e.preventDefault();window.__runPaletteItem(+el.dataset.i);};
  });
};
window.__paintPaletteSel = function(){const host=document.getElementById('cmd-results');if(!host)return;host.querySelectorAll('[data-i]').forEach((el,i)=>{el.style.background=i===window.__paletteIdx?'#252525':'';});};
window.__runPaletteItem = function(i) {
  const r = window.__paletteResults[i]; if (!r) return;
  window.__closePalette();
  if (r.type==='section') show(r.key, r.label);
  else if (r.fn) r.fn();
};
window.__closePalette = function(){const h=document.getElementById('cmd-results');if(h)h.style.display='none';const i=document.getElementById('cmd-in');if(i){i.value='';i.blur();}};
window.__gotoAndCreate = function(sectionKey) {
  const btn = document.querySelector(`.nb[data-k="${sectionKey}"]`);
  if (btn) btn.click();
  setTimeout(()=>{try{document.querySelector('#mc iframe')?.contentDocument?.querySelector('.btn.bp')?.click();}catch(e){}}, 400);
};
document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); const inp=document.getElementById('cmd-in'); if(inp){inp.focus();inp.select();} return; }
  const host = document.getElementById('cmd-results');
  if (host && host.style.display === 'block') {
    if (e.key === 'Escape') { e.preventDefault(); window.__closePalette(); }
    else if (e.key === 'Enter') { e.preventDefault(); window.__runPaletteItem(window.__paletteIdx); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); window.__paletteIdx = Math.min((window.__paletteResults||[]).length-1, window.__paletteIdx+1); window.__paintPaletteSel(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); window.__paletteIdx = Math.max(0, window.__paletteIdx-1); window.__paintPaletteSel(); }
  }
});

})();

(function(){
  const HKEY = 'defender.agent.history.v1';
  const PKEY = 'defender.agent.project.v1';
  const MAX_HISTORY = 10; // 5 user + 5 assistant turns
  const MAX_CHARS = 800;
  const LOAD_PHASES = [
    { at: 3000, text: 'thinking…' },
    { at: 5000, text: 'checking project data…' },
    { at: 8000, text: 'drafting response…' }
  ];

  // --- State ---
  let pendingAction = null;     // { action_id, action, cardEl }
  let isLoading = false;
  let lastUserMessage = null;   // for retry

  // --- Agent context (read from window.__AGENT_CONTEXT__ if Glide injected it, else mock) ---
  function getCtx(){
    return window.__AGENT_CONTEXT__ || {
      project_id: 'PRJ-DEMO',
      project_name: 'Riverdale Campus Security Refresh',
      project_status: 'In Progress',
      progress_overall: 63,
      open_counts: { tasks:12, punch:4, rfi:1, risks:3, observations:2 },
      milestones_summary: [],
      team: []
    };
  }

  // --- sessionStorage memory ---
  function getHistory(){
    try { return JSON.parse(sessionStorage.getItem(HKEY) || '[]'); }
    catch(e){ return []; }
  }
  function setHistory(h){
    try { sessionStorage.setItem(HKEY, JSON.stringify(h.slice(-MAX_HISTORY))); } catch(e){}
  }
  function pushHistory(entry){
    const h = getHistory();
    h.push(entry);
    setHistory(h);
  }
  function clearHistory(){
    try { sessionStorage.removeItem(HKEY); } catch(e){}
  }
  function checkProjectSwitch(){
    const ctx = getCtx();
    const stored = sessionStorage.getItem(PKEY);
    if (stored && stored !== ctx.project_id) {
      clearHistory();
    }
    sessionStorage.setItem(PKEY, ctx.project_id);
  }

  // --- DOM helpers ---
  const ml = () => document.getElementById('agent-messages');
  const inp = () => document.getElementById('agent-input');
  const sendBtn = () => document.getElementById('agent-send');
  const panel = () => document.getElementById('agent-panel');
  const toggle = () => document.getElementById('agent-toggle');

  function scrollToBottom(){
    const m = ml();
    requestAnimationFrame(() => { m.scrollTop = m.scrollHeight; });
  }

  // --- Rendering ---
  function renderMessage(role, content){
    const el = document.createElement('div');
    el.className = role === 'user' ? 'agmu' : 'agma';
    el.textContent = content;
    ml().appendChild(el);
    scrollToBottom();
    return el;
  }

  function renderSystemNotice(text, opts){
    opts = opts || {};
    const el = document.createElement('div');
    el.className = 'agsys';
    el.textContent = text;
    if (opts.retry) {
      const btn = document.createElement('button');
      btn.className = 'agrt';

      btn.onclick = () => {
        el.remove();
        if (lastUserMessage) sendMessage(lastUserMessage, true);
      };
      el.appendChild(btn);
    }
    ml().appendChild(el);
    scrollToBottom();
    return el;
  }

  function renderLoadingDots(){

    ml().appendChild(el);
    scrollToBottom();
    // Rotating subtext
    const txt = el.querySelector('#agent-load-text');
    const timers = LOAD_PHASES.map(p => setTimeout(() => { if (txt) txt.textContent = p.text; }, p.at));
    el._timers = timers;
    return el;
  }

  function clearLoading(el){
    if (!el) return;
    if (el._timers) el._timers.forEach(clearTimeout);
    el.remove();
  }

  function renderConfirmCard(action, action_id){
    const card = document.createElement('div');
    card.className = 'agcc';
    const rows = Object.entries(action.input || {})
      .map(([k,v]) => `<div class="k">${k}</div><div class="v">${escapeHtml(typeof v === 'string' ? v : JSON.stringify(v))}</div>`)
      .join('');

      <div class="agccb">${rows}</div>

        <button class="btn" data-act="cancel">Cancel</button>
        <button class="btn bp" data-act="confirm">Confirm</button>
      </div>`;
    card.querySelector('[data-act="cancel"]').onclick = () => handleCancel(card);
    card.querySelector('[data-act="confirm"]').onclick = () => handleConfirm(card);
    ml().appendChild(card);
    pendingAction = { action_id, action, cardEl: card };
    scrollToBottom();
    return card;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // --- Confirm / cancel handlers (Phase 1C: wired to agent.execute) ---
  async function handleConfirm(card){
    if (!pendingAction) return;
    const { action_id, action } = pendingAction;
    card.classList.add('disabled');
    // Show loading dots inside the card footer
    const footer = card.querySelector('.agccf');
    if (footer) footer.innerHTML = '<div class="agldd" style="padding:4px 0"><span></span><span></span><span></span></div>';

    const resp = await callAgentExecute(action_id, action);
    card.remove();
    pendingAction = null;

    if (resp.kind === 'executed') {
      renderSystemNotice(resp.summary);
      pushHistory({ role:'assistant', content:resp.summary });
      // Store entity ref for future turns (Phase 2 uses this)
      if (resp.entity) window.__lastAgentEntity = resp.entity;
    } else if (resp.kind === 'error') {
      renderSystemNotice(resp.text);
    }
  }
  function handleCancel(card){
    card.remove();
    renderSystemNotice('Action cancelled.');
    pendingAction = null;
  }

  // --- Replay existing history into the message list ---
  function hydrateMessages(){
    ml().innerHTML = '';
    const h = getHistory();
    h.forEach(m => renderMessage(m.role, m.content));

  // --- Webhook URLs (placeholder — Matt fills in real Make URLs) ---

  function mockChatResponse(text){
    const lower = text.toLowerCase();

    if (lower.includes('create') && lower.includes('task') || lower.includes('add a task') || lower.includes('make a task')) {
      const title = text.replace(/create\s+(a\s+)?task\s*(to\s+)?/i, '').replace(/add\s+(a\s+)?task\s*(to\s+)?/i, '').trim() || 'New task from agent';
      const ctx = getCtx();
      const assignee = ctx.team && ctx.team[0] ? ctx.team[0].email : 'unassigned@example.com';
      return {
        kind: 'pending_action',
        preamble: "I'll create this task — confirm to proceed.",
        action: {
          tool: 'create_task',
          input: { title: title, assignee_email: assignee, priority: 'Medium', project_id: ctx.project_id }
        },
        action_id: 'act_mock_' + Date.now().toString(36)
      };
    }
    // Detect observation intent
    if (lower.includes('observation') || lower.includes('observe') || lower.includes('noticed')) {
      return {
        kind: 'pending_action',
        preamble: "I'll log this observation.",
        action: { tool: 'add_observation', input: { summary: text.slice(0, 80), severity: 'Info' } },
        action_id: 'act_mock_' + Date.now().toString(36)
      };
    }
    // Detect risk intent
    if (lower.includes('risk') || lower.includes('flag')) {
      return {
        kind: 'pending_action',
        preamble: "I'll flag this risk — confirm to proceed.",
        action: { tool: 'flag_risk', input: { title: text.slice(0, 80), likelihood: 'Medium', impact: 'Medium' } },
        action_id: 'act_mock_' + Date.now().toString(36)
      };
    }
    // Detect activity log intent
    if (lower.includes('log') || lower.includes('update') && lower.includes('activity')) {
      return {
        kind: 'pending_action',
        action: { tool: 'log_activity', input: { message: text, category: 'Update' } },
        action_id: 'act_mock_' + Date.now().toString(36)
      };
    }
    // Default: plain reply
    const ctx = getCtx();
    return {
      kind: 'reply',
      text: `You have ${ctx.open_counts.tasks} open tasks, ${ctx.open_counts.risks} open risks, ${ctx.open_counts.punch} punch items, and ${ctx.open_counts.rfi} open RFI. Project is ${ctx.progress_overall}% complete. How can I help?`
    };
  }

  function mockExecuteResponse(action){
    const idMap = { create_task:'T', add_observation:'OBS', flag_risk:'RSK', log_activity:'ACT' };
    const prefix = idMap[action.tool] || 'X';
    const id = prefix + '-' + String(Math.floor(Math.random()*9000)+1000);
    const label = action.input.title || action.input.summary || action.input.message || 'item';
    return {
      kind: 'executed',
      summary: (action.tool === 'create_task' ? 'Created task' : action.tool === 'add_observation' ? 'Added observation' : action.tool === 'flag_risk' ? 'Flagged risk' : 'Logged activity') + ' #' + id + ': ' + label,
      entity: { type: action.tool.replace('create_','').replace('add_','').replace('flag_','').replace('log_',''), id: id }
    };
  }

  // --- callAgentChat: POST to agent.chat webhook (or mock) ---
  async function callAgentChat(userMessage){
    const ctx = getCtx();
    const history = getHistory();
    const body = {
      user_email: window.__USER__?.email || 'amorgan@example.com',
      user_name: window.__USER__?.name || 'Alex Morgan',
      project_id: ctx.project_id,
      agent_context: ctx,
      message_history: history.slice(-MAX_HISTORY)
    };

    if (MOCK_MODE) {
      // Simulate network delay
      await new Promise(r => setTimeout(r, 600 + Math.random() * 800));
      return mockChatResponse(userMessage);
    }

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 30000);
    try {
      const res = await fetch(WEBHOOK_CHAT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: ctrl.signal
      });
      clearTimeout(timer);
      if (res.status === 403) {
        const data = await res.json().catch(() => ({}));
        if (data.code === 'USER_UNKNOWN') return { kind:'error', text:"Your account isn't recognized.", code:'USER_UNKNOWN' };
        if (data.code === 'PROJECT_FORBIDDEN') return { kind:'error', text:"You don't have access to this project.", code:'PROJECT_FORBIDDEN' };
        return { kind:'error', text:'Access denied.', code:'FORBIDDEN' };
      }
      if (res.status >= 500) return { kind:'error', text:'Something went wrong on the server.', code:'SERVER_ERROR', _retry:true };
      if (!res.ok) return { kind:'error', text:'Request was rejected. See console.', code:'CLIENT_ERROR' };
      const data = await res.json();
      if (!data.kind) return { kind:'error', text:'Got an unexpected reply from the agent.', code:'BAD_RESPONSE', _retry:true };
      return data;
    } catch(e) {
      clearTimeout(timer);
      if (e.name === 'AbortError') return { kind:'error', text:'Agent is taking too long. Try again?', code:'TIMEOUT', _retry:true };
      return { kind:'error', text:"Couldn't reach agent. Check your connection.", code:'NETWORK', _retry:true };
    }
  }

  // --- callAgentExecute: POST to agent.execute webhook (or mock) ---
  async function callAgentExecute(action_id, action){
    const ctx = getCtx();
    const body = {
      user_email: window.__USER__?.email || 'amorgan@example.com',
      project_id: ctx.project_id,
      action_id: action_id,
      action: action
    };

    if (MOCK_MODE) {
      await new Promise(r => setTimeout(r, 400 + Math.random() * 600));
      return mockExecuteResponse(action);
    }

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 30000);
    try {
      const res = await fetch(WEBHOOK_EXECUTE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: ctrl.signal
      });
      clearTimeout(timer);
      if (res.status === 403) {
        const data = await res.json().catch(() => ({}));
        if (data.code === 'USER_UNKNOWN') return { kind:'error', text:"Your account isn't recognized.", code:'USER_UNKNOWN' };
        if (data.code === 'PROJECT_FORBIDDEN') return { kind:'error', text:"You don't have access to this project.", code:'PROJECT_FORBIDDEN' };
        return { kind:'error', text:'Access denied.', code:'FORBIDDEN' };
      }
      if (res.status >= 500) return { kind:'error', text:'Something went wrong on the server.', code:'SERVER_ERROR' };
      if (!res.ok) return { kind:'error', text:'Request was rejected. See console.', code:'CLIENT_ERROR' };
      const data = await res.json();
      if (!data.kind) return { kind:'error', text:'Got an unexpected reply from the agent.', code:'BAD_RESPONSE' };
      return data;
    } catch(e) {
      clearTimeout(timer);
      if (e.name === 'AbortError') return { kind:'error', text:'Agent is taking too long. Try again?', code:'TIMEOUT' };
      return { kind:'error', text:"Couldn't reach agent. Check your connection.", code:'NETWORK' };
    }
  }

  // --- Send message (Phase 1B: wired to callAgentChat) ---
  async function sendMessage(text, isRetry){
    if (!text.trim() || isLoading) return;
    if (!isRetry) {
      renderMessage('user', text);
      pushHistory({ role:'user', content:text });
      inp().value = '';
      autoGrow();
      updateCharCount();
    }
    lastUserMessage = text;
    setLoading(true);
    const dotsEl = renderLoadingDots();

    const resp = await callAgentChat(text);
    clearLoading(dotsEl);
    setLoading(false);

    if (resp.kind === 'reply') {
      renderMessage('assistant', resp.text);
      pushHistory({ role:'assistant', content:resp.text });
    } else if (resp.kind === 'pending_action') {
      if (resp.preamble) {
        renderMessage('assistant', resp.preamble);
        pushHistory({ role:'assistant', content:resp.preamble });
      }
      renderConfirmCard(resp.action, resp.action_id);
    } else if (resp.kind === 'error') {
      const canRetry = resp._retry || resp.code === 'TIMEOUT' || resp.code === 'NETWORK' || resp.code === 'SERVER_ERROR' || resp.code === 'BAD_RESPONSE';
      renderSystemNotice(resp.text, { retry: canRetry });
    }
  }

  function setLoading(on){
    isLoading = on;
    inp().disabled = on;
    sendBtn().disabled = on;
  }

  // --- Input handlers ---
  function autoGrow(){
    const el = inp();
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
  function updateCharCount(){
    const el = inp();
    const cc = document.getElementById('agent-charcount');
    const n = el.value.length;
    if (n > MAX_CHARS) {
      cc.style.display = 'block';
      cc.textContent = n + ' / ' + MAX_CHARS;
      cc.style.color = n > MAX_CHARS ? '#EF4444' : '#6a6a6a';
    } else {
      cc.style.display = 'none';
    }
  }

  // --- Public API ---
  window.__toggleAgent = function(){
    const p = panel(), t = toggle();
    const open = p.classList.toggle('open');
    t.classList.toggle('open', open);
    p.setAttribute('aria-hidden', open ? 'false' : 'true');
    if (open) {
      checkProjectSwitch();
      const ctx = getCtx();
      document.getElementById('agent-project-name').textContent = ctx.project_name || '—';
      hydrateMessages();
      setTimeout(() => inp().focus(), 200);
    }
  };

  window.__clearAgent = function(){
    clearHistory();
    pendingAction = null;
    ml().innerHTML = '';
    renderSystemNotice('Conversation cleared.');
  };

  window.__sendAgent = function(){
    sendMessage(inp().value);
  };

  // --- Wire input events ---
  document.addEventListener('DOMContentLoaded', function(){
    const i = inp();
    if (!i) return;
    i.addEventListener('input', () => { autoGrow(); updateCharCount(); });
    i.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(i.value);
      }
    });
  });
  // Fallback in case DOMContentLoaded already fired
  if (document.readyState !== 'loading') {
    const i = inp();
    if (i) {
      i.addEventListener('input', () => { autoGrow(); updateCharCount(); });
      i.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(i.value);
        }
      });
    }
  }
})();
</script><div id="toast-host" style="position:fixed;bottom:20px;right:20px;z-index:998;display:flex;flex-direction:column;gap:8px;pointer-events:none"></div></body></html>
