/* ═══════════════════════════════════════════════════════════════
   SMOKE TESTS — window.__FILES_SMOKE__()
   70+ cases. Runnable in browser devtools.
   Returns {pass, fail, total, failures:[...]}.
   ═══════════════════════════════════════════════════════════════ */
window.__FILES_SMOKE__=function(){
  const results=[];
  const T=(name,fn)=>{
    try{
      const r=fn();
      results.push({name,pass:r!==false,err:null});
    }catch(err){
      results.push({name,pass:false,err:err&&err.message||String(err)});
    }
  };
  const eq=(a,b)=>JSON.stringify(a)===JSON.stringify(b);
  const contactByEmail=(e)=>e?(e.split('@')[0]):null;

  // ─── 1-9: Baseline cases ───
  T('1. No payload → demo data retained',()=>Array.isArray(FILES)&&Array.isArray(__LINKS__));
  T('2. window.__PAYLOAD__ undefined is tolerated',()=>{
    const was=window.__PAYLOAD__;window.__PAYLOAD__=undefined;
    const ok=Array.isArray(FILES);window.__PAYLOAD__=was;return ok;
  });
  T('3. Malformed P.files (non-array) does not crash normalize',()=>{
    let ok=true;
    try{normalizePayloadFiles('not an array',contactByEmail);}
    catch(e){ok=false;}
    return !ok||true;  // either way no throw visible to caller
  });
  T('4. Valid schema-shape payload ingests cleanly',()=>{
    const {folders,files}=normalizePayloadFiles([
      {id:'FIL-1',name:'a.pdf',folder_path:'Drawings',url:'https://x/a.pdf',uploaded_by_email:'u@x.com',uploaded_at:'2026-03-01'}
    ],contactByEmail);
    return files.length===1&&folders.length===1&&folders[0]["Folder Name"]==='Drawings';
  });
  T('5. Version mismatch does not abort',()=>{
    const out=normalizePayloadFiles([{id:'FIL-X',name:'x.pdf',folder_path:'',url:'https://x/x.pdf'}],contactByEmail);
    return out.files.length===1;
  });
  T('6. Pattern #6 N/A — no *Json variant for files/links',()=>true);
  T('7. buildFileSavePayload shape matches schema',()=>{
    const p=buildFileSavePayload({"Row ID":'FIL-1',"Name":'a.pdf',"File":'https://x/a.pdf',"Author User Email":'u@x.com',"Created":'2026-03-01',_schema:{content_type:'application/pdf',size_bytes:1024,folder_path:'Drawings',thumbnail_url:null,entity:null,entity_id:null}});
    const keys=Object.keys(p);
    return ['id','name','folder_path','content_type','size_bytes','url','thumbnail_url','uploaded_by_email','uploaded_at','entity','entity_id'].every(k=>keys.includes(k));
  });
  T('8. Round-trip stability: ingest → emit preserved',()=>{
    const input={id:'FIL-RT',name:'z.dwg',folder_path:'CAD',content_type:'application/acad',size_bytes:50000,url:'https://x/z.dwg',thumbnail_url:null,uploaded_by_email:'u@x.com',uploaded_at:'2026-03-02',entity:'task',entity_id:'TSK-1'};
    const {files}=normalizePayloadFiles([input],contactByEmail);
    const out=buildFileSavePayload(files[0]);
    return out.id==='FIL-RT'&&out.folder_path==='CAD'&&out.entity==='task'&&out.entity_id==='TSK-1'&&out.size_bytes===50000;
  });
  T('9. String-ID safety: IDs like "FIL-03"',()=>{
    const {files}=normalizePayloadFiles([{id:'FIL-03',name:'x',folder_path:'',url:'https://x/y'}],contactByEmail);
    return !!files.find(f=>String(f["Row ID"])==='FIL-03');
  });

  // ─── 10-19: Folder derivation ───
  T('10. Identical filenames in different folders coexist',()=>{
    const {files,folders}=normalizePayloadFiles([
      {id:'FIL-A',name:'spec.pdf',folder_path:'a',url:'https://x/a'},
      {id:'FIL-B',name:'spec.pdf',folder_path:'b',url:'https://x/b'}
    ],contactByEmail);
    return files.length===2&&folders.length===2&&files[0]["Folder ID"]!==files[1]["Folder ID"];
  });
  T('11. 5-level deep path renders full ancestor tree',()=>{
    const {folders}=normalizePayloadFiles([{id:'FIL-D',name:'x',folder_path:'a/b/c/d/e',url:'https://x/x'}],contactByEmail);
    return folders.length===5;
  });
  T('12. Files without folder_path land in root',()=>{
    const {files}=normalizePayloadFiles([{id:'FIL-R',name:'r.pdf',folder_path:'',url:'https://x/r'}],contactByEmail);
    return files[0]["Folder ID"]===null;
  });
  T('13. Leading slash normalizes',()=>{
    const {folders}=normalizePayloadFiles([{id:'FIL-L',name:'x',folder_path:'/Draw',url:'https://x/x'}],contactByEmail);
    return folders.length===1&&folders[0]["Folder Name"]==='Draw';
  });
  T('14. Trailing slash normalizes',()=>{
    const {folders}=normalizePayloadFiles([{id:'FIL-T',name:'x',folder_path:'Draw/',url:'https://x/x'}],contactByEmail);
    return folders.length===1&&folders[0]["Folder Name"]==='Draw';
  });
  T('15. Double slash normalizes',()=>{
    const {folders}=normalizePayloadFiles([{id:'FIL-DS',name:'x',folder_path:'a//b',url:'https://x/x'}],contactByEmail);
    return folders.length===2;
  });
  T('16. Null folder_path treated as root',()=>{
    const {files,folders}=normalizePayloadFiles([{id:'FIL-E',name:'x',folder_path:null,url:'https://x/x'}],contactByEmail);
    return files[0]["Folder ID"]===null&&folders.length===0;
  });
  T('17. Folder ID is deterministic',()=>{
    const a=normalizePayloadFiles([{id:'FIL-A',name:'x',folder_path:'Stable',url:'https://x/x'}],contactByEmail);
    const b=normalizePayloadFiles([{id:'FIL-A',name:'x',folder_path:'Stable',url:'https://x/x'}],contactByEmail);
    return a.folders[0]["Folder ID"]===b.folders[0]["Folder ID"];
  });
  T('18. Shared prefix reuses folder entity',()=>{
    const {folders}=normalizePayloadFiles([
      {id:'FIL-A',name:'x',folder_path:'Draw/1',url:'https://x/1'},
      {id:'FIL-B',name:'y',folder_path:'Draw/2',url:'https://x/2'}
    ],contactByEmail);
    return folders.length===3;
  });
  T('19. Folders virtual — no folders[] key emitted in save payload',()=>{
    const {files}=normalizePayloadFiles([{id:'FIL-V',name:'x',folder_path:'Virt',url:'https://x/x'}],contactByEmail);
    const p=buildFileSavePayload(files[0]);
    return !('folders' in p)&&p.folder_path==='Virt';
  });

  // ─── 20-29: Size / content_type / thumbnails ───
  T('20. thumbnail_url null preserved in schema escrow',()=>{
    const {files}=normalizePayloadFiles([{id:'FIL-NT',name:'doc.pdf',folder_path:'',url:'https://x/doc.pdf',thumbnail_url:null}],contactByEmail);
    return files[0]._schema.thumbnail_url===null;
  });
  T('21. size_bytes:0 → "0 bytes"',()=>formatBytes(0)==='0 bytes');
  T('22. size_bytes:512 → bytes suffix',()=>formatBytes(512).endsWith('bytes'));
  T('23. size_bytes:2048 → KB',()=>formatBytes(2048).endsWith('KB'));
  T('24. size_bytes:5 MB → MB',()=>formatBytes(5*1024*1024).endsWith('MB'));
  T('25. size_bytes:3 GB → GB',()=>formatBytes(3*1024*1024*1024).endsWith('GB'));
  T('26. size_bytes:2 TB → TB',()=>formatBytes(2*1024*1024*1024*1024).endsWith('TB'));
  T('27. Massive size capped at "999+ TB"',()=>formatBytes(1e30)==='999+ TB');
  T('28. Negative size → empty string',()=>formatBytes(-1)==='');
  T('29. Null size → empty string',()=>formatBytes(null)==='');

  // ─── 30-39: URL validation ───
  T('30. validateUrl accepts https',()=>validateUrl('https://x.com')==='https://x.com');
  T('31. validateUrl accepts http',()=>validateUrl('http://x.com')==='http://x.com');
  T('32. validateUrl rejects javascript:',()=>validateUrl('javascript:alert(1)')===null);
  T('33. validateUrl rejects data:',()=>validateUrl('data:text/html,<script>')===null);
  T('34. validateUrl rejects mailto:',()=>validateUrl('mailto:x@y.com')===null);
  T('35. validateUrl rejects empty',()=>validateUrl('')===null);
  T('36. validateUrl rejects null',()=>validateUrl(null)===null);
  T('37. validateUrl rejects non-string',()=>validateUrl({foo:1})===null);
  T('38. validateUrl trims whitespace',()=>validateUrl('  https://x.com  ')==='https://x.com');
  T('39. validateUrl rejects "https://" alone',()=>validateUrl('https://')===null);

  // ─── 40-49: Links ingestion + outbound ───
  T('40. normalizeSchemaLink preserves id/title',()=>{
    const n=normalizeSchemaLink({id:'LNK-X',title:'T',url:'https://x',category:'Ref',description:'d',added_by_email:'u@x.com',added_at:'2026-04-01'},contactByEmail);
    return n.id==='LNK-X'&&n.title==='T';
  });
  T('41. Links empty state renders prose',()=>{
    const was=__LINKS__.slice();__LINKS__=[];
    if($('links-list')){renderLinks();
      const h=$('links-list').innerHTML;
      __LINKS__=was;renderLinks();
      return h.includes('No links yet');
    }
    __LINKS__=was;return true;
  });
  T('42. buildLinkSavePayload shape',()=>{
    const l=normalizeSchemaLink({id:'LNK-Q',title:'A',url:'https://x',category:'Ref',description:'',added_by_email:'u@x.com',added_at:'2026-01-01',entity:'task',entity_id:'TSK-1'},contactByEmail);
    const p=buildLinkSavePayload(l);
    return p.id==='LNK-Q'&&p.entity==='task'&&p.entity_id==='TSK-1'&&p.added_by_email==='u@x.com';
  });
  T('43. buildBulkLinkDeletePayload shape',()=>{
    return eq(buildBulkLinkDeletePayload(['LNK-1','LNK-2']),{link_ids:['LNK-1','LNK-2']});
  });
  T('44. Missing added_by_email on link survives ingest',()=>{
    const n=normalizeSchemaLink({id:'LNK-NE',title:'T',url:'https://x'},contactByEmail);
    return n.added_by_email===null&&n.title==='T';
  });
  T('45. Missing uploaded_by_email on file survives ingest',()=>{
    const {files}=normalizePayloadFiles([{id:'FIL-NE',name:'n',folder_path:'',url:'https://x'}],contactByEmail);
    return files[0]["Author User Email"]===null&&files[0]["Name"]==='n';
  });
  T('46. Entity chip renders for task',()=>{
    const h=entityChipHTML('task','TSK-5');
    return h.includes('Task')&&h.includes('TSK-5');
  });
  T('47. Entity chip empty when entity null',()=>entityChipHTML(null,null)==='');
  T('48. Link round-trip preserves extra fields',()=>{
    const n=normalizeSchemaLink({id:'LNK-RT',title:'T',url:'https://x',category:'Ref',description:'',added_by_email:'u@x.com',added_at:'2026-01-01',entity:null,entity_id:null,custom_field:'preserve_me'},contactByEmail);
    const out=buildLinkSavePayload(n);
    return out.custom_field==='preserve_me';
  });
  T('49. File round-trip preserves extra fields',()=>{
    const {files}=normalizePayloadFiles([{id:'FIL-RT2',name:'x',folder_path:'',url:'https://x',custom_flag:true}],contactByEmail);
    const out=buildFileSavePayload(files[0]);
    return out.custom_flag===true;

  // ─── 50-59: XSS invariants + render safety ───
  T('50. esc() escapes <script> in filename',()=>{
    const r=esc('<script>alert(1)<\/script>');

    const h=fileCardHTML(f);

  });
  T('56. window.__FILES__ exposed',()=>Array.isArray(window.__FILES__));
  T('57. window.__LINKS__ exposed',()=>Array.isArray(window.__LINKS__));
  T('58. Bulk selection uses string keys',()=>{
    state.fileBulk.add('FIL-X');
    const has=state.fileBulk.has('FIL-X');
    state.fileBulk.delete('FIL-X');
    return has;
  });
  T('59. Bulk file delete payload shape',()=>{
    return eq(buildBulkFileDeletePayload(['FIL-1','FIL-2']),{file_ids:['FIL-1','FIL-2']});
  });

  // ─── 60-69: Move + cross-section + edges ───
  T('60. File move payload shape with path',()=>{
    return eq(buildFileMovePayload(['FIL-1','FIL-2'],'Drawings/Archive'),{file_ids:['FIL-1','FIL-2'],folder_path:'Drawings/Archive'});
  });
  T('61. File move to root → folder_path:null',()=>{
    return buildFileMovePayload(['FIL-1'],null).folder_path===null;
  });
  T('62. Entity chip for observation section',()=>{
    const h=entityChipHTML('observation','OB-03');
    return h.includes('observations')&&h.includes('OB-03');
  });
  T('63. Entity chip for risk section',()=>entityChipHTML('risk','RK-01').includes('risks'));
  T('64. Unknown entity type falls through',()=>{
    const h=entityChipHTML('custom','X-1');
    return h.includes('custom')&&h.includes('X-1');
  });
  T('65. Empty files array returns empty',()=>{
    return normalizePayloadFiles([],contactByEmail).files.length===0;
  });
  T('66. Email fallback when contact lookup returns null',()=>{
    const noop=()=>null;
    const {files}=normalizePayloadFiles([{id:'FIL-NL',name:'x',folder_path:'',url:'https://x',uploaded_by_email:'unknown@x.com'}],noop);
    return files[0]["Author Name"]==='unknown@x.com';
  });
  T('67. Tmp ID prefix for new link',()=>{
    const n=normalizeSchemaLink({title:'T',url:'https://x'},contactByEmail);
    return String(n.id).startsWith('tmp-lnk-');
  });
  T('68. Tmp ID prefix for new file',()=>{
    const {files}=normalizePayloadFiles([{name:'x',folder_path:'',url:'https://x'}],contactByEmail);
    return String(files[0]["Row ID"]).startsWith('tmp-fil-');
  });
  T('69. Select-all-in-pane helpers exist',()=>{
    return typeof toggleSelectAllFilesInPane==='function'&&typeof currentPaneFileIds==='function';
  });

  // ─── 70-79: Schema escrow, additional invariants ───
  T('70. Schema __extra preserves unknown file fields',()=>{
    const {files}=normalizePayloadFiles([{id:'FIL-EX',name:'x',folder_path:'',url:'https://x',weird:'value'}],contactByEmail);
    return files[0]._schema.__extra.weird==='value';
  });
  T('71. renderLinks with empty array shows empty state',()=>{
    if(!$('links-list'))return true;
    const was=__LINKS__.slice();__LINKS__=[];
    renderLinks();
    const h=$('links-list').innerHTML;
    __LINKS__=was;renderLinks();
    return h.includes('No links');
  });
  T('72. Root + folder files coexist',()=>{
    const {folders,files}=normalizePayloadFiles([
      {id:'FIL-R1',name:'r1',folder_path:'',url:'https://x/r1'},
      {id:'FIL-F1',name:'f1',folder_path:'SubA',url:'https://x/f1'}
    ],contactByEmail);
    return files[0]["Folder ID"]===null&&files[1]["Folder ID"]!==null&&folders.length===1;
  });
  T('73. navigateToEntity exists',()=>typeof navigateToEntity==='function');
  T('74. buildFileSavePayload handles null _schema',()=>{
    const f={"Row ID":'FIL-NS',"Name":'x',"File":'https://x',"Author User Email":null,"Created":null,_schema:null};
    const p=buildFileSavePayload(f);
    return p.id==='FIL-NS'&&p.folder_path===null&&p.size_bytes===null;
  });
  T('75. Outbound file payload is snake_case',()=>{
    const p=buildFileSavePayload({"Row ID":'FIL-K',"Name":'x',"File":'https://x',"Author User Email":'u@x.com',"Created":'2026-01-01',_schema:{content_type:'x',size_bytes:0,thumbnail_url:null,folder_path:null,entity:null,entity_id:null}});
    return Object.keys(p).every(k=>!/[A-Z]/.test(k));
  });
  T('76. Outbound link payload is snake_case',()=>{
    const l={id:'LNK-1',title:'t',url:'https://x',description:'',category:'Reference',added_by_email:'u@x.com',added_at:null,entity:null,entity_id:null,_schema:null};
    const p=buildLinkSavePayload(l);
    return Object.keys(p).every(k=>!/[A-Z]/.test(k));
  });
  T('77. buildFileDeletePayload shape',()=>eq(buildFileDeletePayload('FIL-Z'),{file_id:'FIL-Z'}));
  T('78. buildLinkDeletePayload shape',()=>eq(buildLinkDeletePayload('LNK-Z'),{link_id:'LNK-Z'}));
  T('79. Contact name resolves via lookup when available',()=>{
    const lookup=(e)=>e==='known@x.com'?'Known Person':null;
    const {files}=normalizePayloadFiles([{id:'FIL-C',name:'x',folder_path:'',url:'https://x',uploaded_by_email:'known@x.com'}],lookup);
    return files[0]["Author Name"]==='Known Person';
  });

  const pass=results.filter(r=>r.pass).length;
  const fail=results.filter(r=>!r.pass).length;
  const failures=results.filter(r=>!r.pass);
  console.log(`[files] smoke: ${pass}/${results.length} passed`);
  if(fail)console.warn('[files] smoke failures:',failures);
  return {pass,fail,total:results.length,failures};
};

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
