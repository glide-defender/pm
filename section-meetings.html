<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Meetings</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#171717;color:#E5E7EB;font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;padding:20px}
.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.ti{font-size:18px;font-weight:700;color:#fff}.sb{font-size:12px;color:#9CA3AF;margin-top:3px}
.ctr{display:flex;gap:8px;align-items:center}
.srch{background:#1f1f1f;border:1px solid #303030;border-radius:6px;padding:7px 11px;color:#E5E7EB;font-size:12.5px;outline:none;width:220px;font-family:inherit}
.btn{padding:7px 14px;border-radius:6px;font-size:12.5px;font-weight:600;border:1px solid #303030;background:#1f1f1f;color:#E5E7EB;cursor:pointer;font-family:inherit}.bp{background:#3c4756;color:#fff;border-color:#4a5666}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.kpi{background:#1f1f1f;border:1px solid #2a2a2a;border-left:3px solid;border-radius:8px;padding:12px 14px}
.kl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#9CA3AF;margin-bottom:5px}.kv{font-size:22px;font-weight:800}.kc{font-size:11px;color:#9CA3AF;margin-top:3px}
.mcard{background:#1f1f1f;border:1px solid #2a2a2a;border-radius:10px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color .12s}
.mcard:hover{border-color:#3a3a3a;background:#232323}
.mhead{display:flex;align-items:flex-start;gap:14px;margin-bottom:8px}
.mdate{background:#252525;border-radius:7px;padding:6px 8px;text-align:center;min-width:48px;flex-shrink:0}
.mdate-m{font-size:9px;font-weight:700;color:#F59E0B;text-transform:uppercase;letter-spacing:.5px}
.mdate-d{font-size:17px;font-weight:800;color:#fff;line-height:1;margin-top:2px}
.mdate-y{font-size:9px;color:#6a6a6a;margin-top:2px}
.mbody{flex:1;min-width:0}
.mtitle{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.mmeta{font-size:11.5px;color:#9CA3AF}
.mattend{display:flex;gap:4px;margin-top:8px}
.av{width:24px;height:24px;border-radius:50%;color:#fff;font-weight:700;font-size:10px;display:flex;align-items:center;justify-content:center;margin-left:-4px;border:2px solid #1f1f1f}
.av:first-child{margin-left:0}
.mcontent{margin-top:10px;padding-top:10px;border-top:1px solid #2a2a2a;font-size:12px;color:#9CA3AF;line-height:1.55;max-height:50px;overflow:hidden;position:relative}
.mcontent::after{content:'';position:absolute;bottom:0;left:0;right:0;height:20px;background:linear-gradient(transparent,#1f1f1f)}
.mstats{display:flex;gap:14px;margin-top:10px;font-size:11px;color:#6a6a6a}
.mstat{display:flex;align-items:center;gap:5px}
.dbg{position:fixed;inset:0;background:rgba(10,10,10,.7);z-index:100;display:none}.dbg.on{display:block}
.dr{position:fixed;top:0;right:0;bottom:0;width:min(600px,92vw);background:#1a1a1a;border-left:1px solid #303030;z-index:101;display:none;flex-direction:column}.dr.on{display:flex}
.drh{padding:18px 22px;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between}.drt{font-size:16px;font-weight:700}.drx{width:28px;height:28px;border-radius:6px;border:1px solid #303030;background:#252525;color:#9CA3AF;cursor:pointer;font-size:15px}
.drb{flex:1;overflow-y:auto;padding:20px 22px}.drf{padding:14px 22px;border-top:1px solid #2a2a2a;background:#191919;display:flex;gap:8px}
.f{margin-bottom:14px}.fl{display:block;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#9CA3AF;margin-bottom:6px}
.fi,.fs,.ft{width:100%;background:#161616;border:1px solid #303030;border-radius:7px;padding:9px 11px;color:#E5E7EB;font-size:13px;font-family:inherit;outline:none}.ft{resize:vertical;min-height:90px}.tbtn{padding:6px 10px;border-radius:5px;border:1px solid #303030;background:transparent;color:#EF4444;cursor:pointer;font-size:12px;font-weight:600}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.bulk-bar{display:none;position:sticky;bottom:0;left:0;right:0;background:#1a1a1a;border-top:2px solid #F59E0B;padding:10px 18px;z-index:10;font-size:12.5px;align-items:center;gap:12px;box-shadow:0 -8px 20px rgba(0,0,0,.5);margin:0 -20px -20px}
.bulk-bar.show{display:flex}
.bulk-count{background:#F59E0B;color:#111;padding:3px 10px;border-radius:12px;font-weight:700;font-size:11.5px}
.row-check{display:inline-flex;width:16px;height:16px;border:1.5px solid #4a4a4a;border-radius:3px;background:#181818;cursor:pointer;flex-shrink:0;align-items:center;justify-content:center;margin-right:8px;vertical-align:middle}
.row-check.on{background:#F59E0B;border-color:#F59E0B}
.row-check.on::after{content:"✓";color:#111;font-size:11px;font-weight:900}
</style></head><body>
<div class="hd"><div><div class="ti">Meetings</div><div class="sb" id="sub">—</div></div>
<div class="ctr"><input class="srch" id="srch" placeholder="Search meetings…"/><button class="btn" onclick="bulkImport()">Import</button><button class="btn bp" onclick="openD(null)">+ Meeting</button></div></div>
<div class="kpis">
<div class="kpi" style="border-left-color:#F59E0B"><div class="kl">Total</div><div class="kv" style="color:#F59E0B" id="k-t">—</div><div class="kc">meetings logged</div></div>
<div class="kpi" style="border-left-color:#4286f4"><div class="kl">Last 30 days</div><div class="kv" style="color:#4286f4" id="k-r">—</div><div class="kc">recent activity</div></div>
<div class="kpi" style="border-left-color:#22C55E"><div class="kl">Decisions</div><div class="kv" style="color:#22C55E" id="k-d">—</div><div class="kc">captured</div></div>
</div>
<div id="list"></div>
<div class="bulk-bar" id="bulk-bar"><span class="bulk-count" id="bulk-count">0</span><span>selected</span><div style="flex:1"></div><button class="btn" onclick="bulkStatus('Closed')">Mark Closed</button><button class="btn" onclick="bulkDelete()" style="color:#EF4444">Delete</button><button class="btn" onclick="clearSelection()">Cancel</button></div><div class="dbg" id="dbg" onclick="closeD()"></div>
<div class="dr" id="dr"><div class="drh"><div><div class="drt" id="drt">New Meeting</div></div><button class="drx" onclick="closeD()">×</button></div><div class="drb" id="drb"></div><div class="drf"><button class="tbtn" id="bd" onclick="delM()" style="display:none">Delete</button><div style="display:flex;gap:8px;margin-left:auto"><button class="btn" onclick="closeD()">Cancel</button><button class="btn bp" onclick="saveM()">Save</button></div></div></div>
<script>

window.showRowMenu = function(btn, actions) {
  document.querySelectorAll('.row-menu-pop').forEach(x=>x.remove());
  const rect = btn.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.className = 'row-menu-pop';
  menu.style.cssText = `position:fixed;top:${rect.bottom+4}px;left:${rect.right-180}px;min-width:180px;background:#1a1a1a;border:1px solid #333;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:999;padding:4px;font-family:inherit`;
  menu.innerHTML = actions.map((a,i)=>a.divider?'<div style="height:1px;background:#2a2a2a;margin:4px 0"></div>':`<div data-i="${i}" style="padding:7px 12px;font-size:12.5px;color:${a.color||'#E5E7EB'};border-radius:5px;cursor:pointer;user-select:none">${a.label}</div>`).join('');
  menu.querySelectorAll('[data-i]').forEach(el=>{el.onmouseenter=()=>el.style.background='#252525';el.onmouseleave=()=>el.style.background='';el.onclick=e=>{e.stopPropagation();menu.remove();actions[+el.dataset.i].fn();};});
  document.body.appendChild(menu);
  setTimeout(()=>{document.addEventListener('click',function c(){menu.remove();document.removeEventListener('click',c);},{once:true});},50);
};

// ═══════════════════════════════════════════════════════════════
// SHARED WORKSPACE UTILITIES — inject into every section
// Production: these read from window.__TYPES__, __STATUSES__, __COMMENTS__, etc. populated by Glide
// Demo: seeded defaults so everything renders
// ═══════════════════════════════════════════════════════════════

// ═══════ STATUS DOT CONVENTION (system-wide) ═══════
// 🔴 red = critical / open / blocked / overdue
// 🟡 amber = warning / in progress / partial
// 🟢 green = healthy / closed / complete / on time
window.healthDot = function(status) {
  const s = (status||'').toLowerCase();
  if (/open|blocked|overdue|critical|late|fail/.test(s)) return '🔴';
  if (/progress|partial|warn|review|pending|draft/.test(s)) return '🟡';
  if (/closed|complete|paid|done|healthy|ok|on time/.test(s)) return '🟢';
  return '⚪';
};
window.healthColor = function(status) {
  const s = (status||'').toLowerCase();
  if (/open|blocked|overdue|critical|late|fail/.test(s)) return '#EF4444';
  if (/progress|partial|warn|review|pending|draft/.test(s)) return '#F59E0B';
  if (/closed|complete|paid|done|healthy|ok|on time/.test(s)) return '#22C55E';
  return '#6a6a6a';
};

window.__STATUSES__ = window.__STATUSES__ || {
  project: ['Planning','In Progress','On Hold','Completed','Cancelled'],
  task: ['Open','In Progress','Blocked','Closed'],
  risk: ['Open','Mitigating','Accepted','Closed'],
  punch: ['Open','In Progress','Closed'],
  observation: ['Open','Under Review','Closed'],
  rfi: ['Open','In Progress','Closed'],
  milestone: ['Not Started','In Progress','Completed']
};
window.__TYPES__ = window.__TYPES__ || ['Install','Service','Assessment','Upgrade','Decommission','Maintenance'];
window.__CONTACTS__ = window.__CONTACTS__ || ['Alex Morgan','Sam Rivera','John Doe','Taylor Brooks','Jennifer Doe'];
// Per-entity comments — keyed by `entityType:entityId`
window.__COMMENTS__ = window.__COMMENTS__ || {};
// Per-entity attachments — same keying
window.__ATTACHMENTS__ = window.__ATTACHMENTS__ || {};

// Reusable comment thread component

window.attachmentsWidget = function(entityType, entityId) {
  const key = entityType + ':' + entityId;
  const list = (window.__ATTACHMENTS__[key]||[]);
  const rows = list.length ? list.map((a,i) => `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#181818;border:1px solid #262626;border-radius:6px;margin-bottom:4px"><span style="font-size:14px">${a.ext==='pdf'?'📄':a.ext==='jpg'||a.ext==='png'?'🖼️':'📎'}</span><span style="flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</span><span style="font-size:10.5px;color:#6a6a6a">${a.size||''}</span><button class="btn" style="padding:3px 8px;font-size:11px" onclick="window.__removeAttach('${key}',${i})">×</button></div>`).join('') : '<div style="padding:8px 0;color:#6a6a6a;font-size:11.5px;font-style:italic">No attachments</div>';
  return `<div style="margin-top:14px;padding-top:12px;border-top:1px solid #2a2a2a"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#9CA3AF">Attachments (${list.length})</div><button class="btn" style="padding:5px 10px;font-size:11px" onclick="window.__addAttach('${entityType}',${JSON.stringify(entityId)})">+ Attach file</button></div>${rows}</div>`;
};
window.__addAttach = function(et, id) {
  const name = prompt('File name (demo — real version opens file picker):', 'photo.jpg');
  if (!name) return;
  const ext = (name.split('.').pop()||'').toLowerCase();
  const key = et + ':' + id;
  (window.__ATTACHMENTS__[key] = window.__ATTACHMENTS__[key] || []).push({ name, ext, size: '0.8 MB', by: 'Alex Morgan', at: new Date().toISOString() });
  console.log('Make payload (attach):', { entityType: et, entityId: id, name });try{parent.postMessage({type:'toast',msg:'Saved',kind:'success'},'*');}catch(e){}
  // Trigger redraw - re-open the drawer if possible
  const widget = document.querySelector('[onclick*="__addAttach"]')?.closest('div').parentElement;
  if (widget) widget.outerHTML = window.attachmentsWidget(et, id);
};
window.__removeAttach = function(key, idx) {
  if (!confirm('Remove this attachment?')) return;
  window.__ATTACHMENTS__[key].splice(idx, 1);
  const [et, id] = key.split(':');
  const widget = document.querySelector(`[onclick*="__addAttach(\\'${et}\\',${JSON.stringify(id.includes(',')?id:+id||id)}"]`)?.closest('div').parentElement;
  if (widget) widget.outerHTML = window.attachmentsWidget(et, id.includes(',')?id:+id||id);
};


// ═══ @-mention autocomplete ═══
window.__CONTACTS__ = window.__CONTACTS__ || ['Alex Morgan','Sam Rivera','John Doe','Taylor Brooks','Jennifer Doe'];
window.__wireMention = function(inputId, hostId) {
  const inp = document.getElementById(inputId);
  if (!inp || inp.dataset.mwired) return;
  inp.dataset.mwired = '1';
  let dropdown = null;
  function closeDrop(){ if(dropdown){dropdown.remove();dropdown=null;} }
  inp.addEventListener('input', e=>{
    const v = e.target.value;
    const pos = e.target.selectionStart;
    const before = v.slice(0, pos);
    const m = before.match(/@([a-zA-Z ]*)$/);
    closeDrop();
    if (!m) return;
    const q = m[1].toLowerCase();
    const matches = window.__CONTACTS__.filter(c => c.toLowerCase().includes(q)).slice(0,5);
    if (!matches.length) return;
    dropdown = document.createElement('div');
    dropdown.style.cssText = 'position:absolute;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:7px;box-shadow:0 8px 20px rgba(0,0,0,.5);padding:3px;z-index:200;min-width:180px';
    const r = inp.getBoundingClientRect();
    dropdown.style.left = r.left+'px';
    dropdown.style.top = (r.top-5-matches.length*30)+'px';
    dropdown.innerHTML = matches.map((c,i)=>`<div data-c="${c}" style="padding:6px 10px;font-size:12px;border-radius:4px;cursor:pointer${i===0?';background:#252525':''}">${c}</div>`).join('');
    document.body.appendChild(dropdown);
    dropdown.querySelectorAll('[data-c]').forEach(el=>{
      el.onmousedown=ev=>{
        ev.preventDefault();
        const c = el.dataset.c;
        const newVal = v.slice(0, pos - m[0].length) + '@' + c + ' ' + v.slice(pos);
        inp.value = newVal;
        inp.focus();
        closeDrop();
      };
    });
  });
  inp.addEventListener('blur', ()=>setTimeout(closeDrop,150));
};


window.originLink = function(entity) {
  if (!entity?.originFrom) return '';
  const label = entity.originFrom==='punch'?'Punch Item':entity.originFrom==='observation'?'Observation':entity.originFrom==='rfi'?'RFI':entity.originFrom==='meeting'?'Meeting':'Source';
  return `<div style="margin-bottom:14px;padding:8px 12px;background:rgba(66,134,244,.08);border:1px solid rgba(66,134,244,.2);border-left:2px solid #4286f4;border-radius:6px;font-size:11.5px;color:#9ec2f4">↳ Converted from ${label} #${entity.originId}</div>`;
};


// ═══ Auto-wire mentions on any comment input added to DOM ═══
(function(){
  const obs = new MutationObserver(muts=>{
    muts.forEach(m=>m.addedNodes.forEach(n=>{
      if (n.nodeType!==1) return;
      const inputs = n.querySelectorAll ? n.querySelectorAll('input[id^="cw-in-"]') : [];
      inputs.forEach(inp=>window.__wireMention(inp.id,''));
      if (n.id && n.id.startsWith('cw-in-')) window.__wireMention(n.id,'');
    }));
  });
  obs.observe(document.body, { childList:true, subtree:true });
})();

window.commentsWidget = function(entityType, entityId) {
  const key = entityType + ':' + entityId;
  const list = window.__COMMENTS__[key] || [];
  const renderList = list.length
    ? list.map(c => `<div style="padding:8px 0;border-bottom:1px solid #252525;font-size:12px"><div style="display:flex;gap:6px;align-items:baseline"><strong style="color:#E5E7EB">${c.who}</strong><span style="color:#6a6a6a;font-size:10.5px">${new Date(c.at).toLocaleDateString('en-US',{month:'short',day:'numeric'})} ${new Date(c.at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div><div style="color:#9CA3AF;margin-top:2px;line-height:1.5">${c.txt.replace(/@(\w+(?:\s\w+)?)/g,'<span style="color:#60a5fa;font-weight:600">@$1</span>')}</div></div>`).join('')
    : '<div style="padding:10px 0;color:#6a6a6a;font-size:11.5px;font-style:italic">No comments yet</div>';
  return `<div style="margin-top:16px;padding-top:14px;border-top:1px solid #2a2a2a"><div style="font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#9CA3AF;margin-bottom:8px">Comments (${list.length})</div><div id="cw-list-${entityId}">${renderList}</div><div style="display:flex;gap:6px;margin-top:10px"><input class="fi" id="cw-in-${entityId}" placeholder="Add a comment… (use @ to mention)" style="flex:1"/><button class="btn bp" onmouseenter="window.__wireMention('cw-in-'+arguments[0].target?.id||'','')" onclick="__postComment('${entityType}',${JSON.stringify(entityId)})">Post</button></div></div>`;
};
window.__postComment = function(entityType, entityId) {
  const key = entityType + ':' + entityId;
  const inp = document.getElementById('cw-in-'+entityId);
  const txt = inp.value.trim();
  if (!txt) return;
  (window.__COMMENTS__[key] = window.__COMMENTS__[key] || []).push({ who: 'Alex Morgan', txt, at: new Date().toISOString() });
  console.log('Make payload (comment):', { entityType, entityId, txt });try{parent.postMessage({type:'toast',msg:'Saved',kind:'success'},'*');}catch(e){}
  inp.value = '';
  // Re-render just the comments list in place
  const host = inp.closest('div').parentElement;
  host.outerHTML = window.commentsWidget(entityType, entityId);
};

Object.assign(window.__COMMENTS__, {
  'material:2': [{who:'Alex Morgan',txt:'Vendor confirmed 10 more units shipping Friday.',at:'2026-04-10T11:20'}],
  'milestone:3': [{who:'Sam Rivera',txt:'Running behind — procurement delays. @Alex Morgan see your email from today.',at:'2026-04-09T16:00'}],
  'meeting:3': [{who:'Taylor Brooks',txt:'Can we lock acceptance criteria for cameras specifically? Need in writing.',at:'2026-04-06T09:30'}],
  'finance:2': [{who:'Alex Morgan',txt:'PO approved by client — waiting on signed contract back.',at:'2026-04-07T13:15'}]
});

const COLORS=['#4286f4','#22C55E','#F59E0B','#8B5CF6','#06B6D4','#EF4444','#EC4899'];
const who=n=>COLORS[n.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%COLORS.length];
const init=n=>(n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
let meetings=[
{id:1,title:'Project Kickoff',date:'2025-12-01T10:00',attendees:['Alex Morgan','John Doe','Jennifer Doe','Taylor Brooks'],agenda:'Review scope, timeline, and team roles',notes:'Agreed on 4-phase approach. John Doe confirmed as project owner. Budget approved at $183K. Target completion Q2 2026.',decisions:['4-phase project structure','John Doe is project owner','Budget: $183K']},
{id:2,title:'Weekly Sync — Week 6',date:'2026-02-05T14:00',attendees:['Alex Morgan','Sam Rivera','John Doe'],agenda:'Installation progress, procurement delays',notes:'Procurement delayed 30 days on cameras. Louis reports door contacts installed Floor 1-2. Decision made to proceed with Phase 2 while waiting on cameras.',decisions:['Proceed Phase 2 in parallel','Escalate procurement delay to vendor']},
{id:3,title:'Commissioning Kickoff',date:'2026-04-05T09:00',attendees:['Alex Morgan','Sam Rivera','John Doe','Taylor Brooks'],agenda:'Commissioning plan, acceptance criteria',notes:'Defined acceptance criteria for all 27 deployed assets. Louis owns site commissioning; Gerritt owns QA sign-off. Target start: April 20.',decisions:['Louis owns site commissioning','Gerritt owns QA sign-off','Commissioning starts April 20']}
];
let editing=null;
function filtered(){const q=document.getElementById('srch').value.toLowerCase();return !q?meetings:meetings.filter(m=>JSON.stringify(m).toLowerCase().includes(q));}
function renderAll(){
const recent=new Date();recent.setDate(recent.getDate()-30);
document.getElementById('k-t').textContent=meetings.length;
document.getElementById('k-r').textContent=meetings.filter(m=>new Date(m.date)>=recent).length;
document.getElementById('k-d').textContent=meetings.reduce((s,m)=>s+(m.decisions?.length||0),0);
document.getElementById('sub').textContent=meetings.length+' meetings · '+meetings.reduce((s,m)=>s+m.attendees.length,0)+' participant instances';
const rows=filtered().sort((a,b)=>new Date(b.date)-new Date(a.date));
document.getElementById('list').innerHTML=rows.length?rows.map(m=>{const d=new Date(m.date);const mn=d.toLocaleDateString('en-US',{month:'short'});const dy=d.getDate();const yr=d.getFullYear();const tm=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return`<div class="mcard" data-id="${m.id}" style="position:relative"><button class="btn" style="position:absolute;top:10px;right:10px;padding:3px 8px;font-size:14px;line-height:1;z-index:5" onclick="event.stopPropagation();showRowMenu(this,[{label:'Update',fn:()=>openD(${m.id})},{label:'Duplicate',fn:()=>{const c={...meetings.find(x=>x.id===${m.id}),id:Math.max(0,...meetings.map(x=>x.id))+1,title:'Copy of '+meetings.find(x=>x.id===${m.id}).title};meetings.unshift(c);renderAll();}},{divider:true},{label:'Delete',color:'#EF4444',fn:()=>{if(confirm('Delete?')){meetings=meetings.filter(x=>x.id!==${m.id});renderAll();}}}])">⋯</button><div class="mhead"><div class="mdate"><div class="mdate-m">${mn}</div><div class="mdate-d">${dy}</div><div class="mdate-y">${yr}</div></div><div class="mbody"><div class="mtitle">${m.title}</div><div class="mmeta">${tm} · ${m.attendees.length} attendees</div><div class="mattend">${m.attendees.slice(0,6).map(a=>`<span class="av" style="background:${who(a)}" title="${a}">${init(a)}</span>`).join('')}${m.attendees.length>6?`<span class="av" style="background:#252525">+${m.attendees.length-6}</span>`:''}</div></div></div>${m.notes?`<div class="mcontent">${m.notes}</div>`:''}<div class="mstats"><div class="mstat">📋 ${m.agenda?'Agenda':'No agenda'}</div><div class="mstat">✓ ${m.decisions?.length||0} decisions</div></div></div>`;}).join(''):'<div style="padding:40px;text-align:center;color:#9CA3AF;background:#1f1f1f;border:1px solid #2a2a2a;border-radius:10px">No meetings match.</div>';
document.querySelectorAll('.mcard[data-id]').forEach(el=>el.onclick=()=>openD(+el.dataset.id));
}

// ═══ BULK ACTIONS ═══
let __selected = new Set();
function toggleSelect(id, el){if(__selected.has(id)){__selected.delete(id);el?.classList.remove('on');}else{__selected.add(id);el?.classList.add('on');}const n=__selected.size;const c=document.getElementById('bulk-count');if(c)c.textContent=n;const b=document.getElementById('bulk-bar');if(b)b.classList.toggle('show',n>0);}
function clearSelection(){__selected.clear();document.querySelectorAll('.row-check.on').forEach(c=>c.classList.remove('on'));const b=document.getElementById('bulk-bar');if(b)b.classList.remove('show');const c=document.getElementById('bulk-count');if(c)c.textContent=0;}
function bulkStatus(s){if(!__selected.size)return;meetings.forEach(i=>{if(__selected.has(i.id))i.status=s;});console.log('Bulk status:',s,[...__selected]);try{parent.postMessage({type:'toast',msg:`${__selected.size} items updated`,kind:'success'},'*');}catch(e){}clearSelection();renderAll();}
function bulkDelete(){if(!confirm(`Delete ${__selected.size} items?`))return;const n=__selected.size;meetings=meetings.filter(m=>!__selected.has(m.id));try{parent.postMessage({type:'toast',msg:`${n} items deleted`,kind:'success'},'*');}catch(e){}clearSelection();renderAll();}
function bulkImport(){const rows=prompt('Paste rows (one meeting per line):');if(!rows)return;const lines=rows.split('\n').filter(l=>l.trim());let added=0;const src=meetings;lines.forEach(line=>{const newId=Math.max(0,...src.map(x=>x.id||0))+1+added;src.push({id:newId,title:line,date:new Date().toISOString(),attendees:[],agenda:'',notes:'',decisions:[]});added++;});try{parent.postMessage({type:'toast',msg:`${added} meetings imported`,kind:'success'},'*');}catch(e){}renderAll();}

document.getElementById('srch').oninput=renderAll;
function openD(id){editing=id?{...meetings.find(m=>m.id===id)}:{id:null,title:'',date:new Date().toISOString().slice(0,16),attendees:[],agenda:'',notes:'',decisions:[]};
document.getElementById('drt').textContent=id?'Update Meeting':'New Meeting';
document.getElementById('bd').style.display=id?'inline-block':'none';
const m=editing;
document.getElementById('drb').innerHTML=`<div class="f"><label class="fl">Title</label><input class="fi" id="d-ti" value="${m.title}" placeholder="e.g. Weekly Sync"/></div><div class="fr"><div class="f"><label class="fl">Date & Time</label><input type="datetime-local" class="fi" id="d-dt" value="${m.date.slice(0,16)}"/></div><div class="f"><label class="fl">Attendees</label><input class="fi" id="d-at" value="${m.attendees.join(', ')}" placeholder="Comma-separated names"/></div></div><div class="f"><label class="fl">Agenda</label><input class="fi" id="d-ag" value="${m.agenda}" placeholder="What was discussed?"/></div><div class="f"><label class="fl">Notes</label><textarea class="ft" id="d-nt">${m.notes}</textarea></div><div class="f"><label class="fl">Decisions (one per line)</label><textarea class="ft" id="d-de" placeholder="Key decisions made">${m.decisions?.join('\n')||''}</textarea></div>${m.decisions&&m.decisions.length?`<div style="margin-top:-8px;margin-bottom:14px;padding:10px 12px;background:#181818;border:1px solid #2a2a2a;border-radius:6px"><div style="font-size:10.5px;color:#9CA3AF;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Convert decisions to Tasks</div>${m.decisions.map((d,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px"><span style="flex:1;color:#E5E7EB">${d}</span><button class="btn" style="padding:4px 9px;font-size:11px" onclick="convertDec(${i})">→ Task</button></div>`).join('')}</div>`:''}${editing.id?window.commentsWidget('meeting',editing.id):''}${editing.id?window.attachmentsWidget('meeting',editing.id):''}`;
document.getElementById('dbg').classList.add('on');document.getElementById('dr').classList.add('on');}
function closeD(){document.getElementById('dbg').classList.remove('on');document.getElementById('dr').classList.remove('on');}
function saveM(){const m={id:editing.id||Math.max(0,...meetings.map(x=>x.id))+1,title:document.getElementById('d-ti').value.trim(),date:document.getElementById('d-dt').value,attendees:document.getElementById('d-at').value.split(',').map(s=>s.trim()).filter(Boolean),agenda:document.getElementById('d-ag').value,notes:document.getElementById('d-nt').value,decisions:document.getElementById('d-de').value.split('\n').map(s=>s.trim()).filter(Boolean)};if(!m.title){alert('Title required');return;}const i=meetings.findIndex(x=>x.id===m.id);if(i>=0)meetings[i]=m;else meetings.push(m);console.log('Make payload:',m);try{parent.postMessage({type:'toast',msg:'Saved',kind:'success'},'*');}catch(e){}closeD();renderAll();}
function delM(){if(!editing?.id)return;if(!confirm('Delete this meeting?'))return;meetings=meetings.filter(m=>m.id!==editing.id);closeD();renderAll();}

function convertDec(idx){
if(!editing?.decisions||!editing.decisions[idx])return;
const decText=editing.decisions[idx];
if(!confirm('Create a Task from this decision?\n\n"'+decText+'"'))return;
const task={name:decText,status:'Open',percent:0,durationDays:1,originFrom:'meeting',originId:editing.id};
console.log('Make payload (meeting decision → task):',task);try{parent.postMessage({type:'toast',msg:'Saved',kind:'success'},'*');}catch(e){}
alert('✓ Task created: "'+decText+'"');
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeD();});

// ═══ openEntity receiver (deep link target) ═══
window.addEventListener('message', e => {
  if (e.data?.type === 'openEntity' && e.data.entityId != null) {
    setTimeout(()=>{ try { openD(e.data.entityId); } catch(_){} }, 100);
  }
});

renderAll();
</script></body></html>
