<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Meetings</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#171717;color:#E5E7EB;font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;padding:20px}

.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.kpi{background:#1f1f1f;border:1px solid #2a2a2a;border-left:3px solid;border-radius:8px;padding:12px 14px}

.mcard:hover{border-color:#3a3a3a;background:#232323}

.mhead{display:flex;align-items:flex-start;gap:14px;margin-bottom:8px}

.mdate-m{font-size:9px;font-weight:700;color:#F59E0B;text-transform:uppercase;letter-spacing:.5px}

.mmeta{font-size:11.5px;color:#9CA3AF}

.mstats{display:flex;gap:14px;margin-top:10px;font-size:11px;color:#6a6a6a;flex-wrap:wrap}

.dbg{position:fixed;inset:0;background:rgba(10,10,10,.7);z-index:100;display:none}.dbg.on{display:block}
.dr{position:fixed;top:0;right:0;bottom:0;width:min(820px,96vw);background:#1a1a1a;border-left:1px solid #303030;z-index:101;display:none;flex-direction:column}.dr.on{display:flex}

.drf{padding:12px 22px;border-top:1px solid #2a2a2a;background:#191919;display:flex;gap:8px;align-items:center}

.f{margin-bottom:14px}.fl{display:block;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#9CA3AF;margin-bottom:6px}

.ai-panel{padding:18px 22px}

</style></head><body>

<script>

window.showRowMenu = function(btn, actions) {
  document.querySelectorAll('.row-menu-pop').forEach(x=>x.remove());
  const rect = btn.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.className = 'row-menu-pop';
  menu.style.cssText = `position:fixed;top:${rect.bottom+4}px;left:${rect.right-180}px;min-width:180px;background:#1a1a1a;border:1px solid #333;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:999;padding:4px;font-family:inherit`;
  menu.innerHTML = actions.map((a,i)=>a.divider?'<div style="height:1px;background:#2a2a2a;margin:4px 0"></div>':`<div data-i="${i}" style="padding:7px 12px;font-size:12.5px;color:${a.color||'#E5E7EB'};border-radius:5px;cursor:pointer;user-select:none">${a.label}</div>`).join('');
  menu.querySelectorAll('[data-i]').forEach(el=>{el.onmouseenter=()=>el.style.background='#252525';el.onmouseleave=()=>el.style.background='';el.onclick=e=>{e.stopPropagation();menu.remove();actions[+el.dataset.i].fn();};});
  document.body.appendChild(menu);
  setTimeout(()=>{document.addEventListener('click',function c(){menu.remove();document.removeEventListener('click',c);},{once:true});},50);
};

window.healthDot = function(status){const s=(status||'').toLowerCase();if(/open|blocked|overdue|critical|late|fail/.test(s))return'🔴';if(/progress|partial|warn|review|pending|draft/.test(s))return'🟡';if(/closed|complete|paid|done|healthy|ok|on time/.test(s))return'🟢';return'⚪';};
window.__STATUSES__ = window.__STATUSES__ || { task:['Not Started','In Progress','Blocked','Done'] };
window.__CONTACTS__ = window.__CONTACTS__ || ['Matt Isgur','Louis Feula','John Doe','Gerritt Bakker','Jennifer Doe'];
window.__COMMENTS__ = window.__COMMENTS__ || {};
window.__ATTACHMENTS__ = window.__ATTACHMENTS__ || {};

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const __USER__ = window.__USER__ || {
  email: window.__PAYLOAD__?.loggedin_user_email || 'misgur@adrm-security.com',
  name:  window.__PAYLOAD__?.loggedin_user_name  || 'Matt Isgur',
  role:  window.__PAYLOAD__?.loggedin_user_role  || 'PM'
};
window.__USER__ = __USER__;

const __contactByEmail = {};
(function buildContactLookup(){
  try {
    const P = window.__PAYLOAD__;
    const proj = Array.isArray(P?.contacts) ? P.contacts : [];
    const all  = Array.isArray(P?.lookups?.all_contacts) ? P.lookups.all_contacts : [];
    [...proj, ...all].forEach(c => {
      if (c && c.email) {
        const key = String(c.email).toLowerCase();
        if (!__contactByEmail[key]) __contactByEmail[key] = { name: String(c.name||c.email), email: c.email };
      }
    });
  } catch(_){}
})();
if (!Object.keys(__contactByEmail).length) {
  [
    {name:'Matt Isgur',email:'misgur@adrm-security.com'},
    {name:'Louis Feula',email:'lfeula@adrm-security.com'},
    {name:'John Doe',email:'jdoe@acme.com'},
    {name:'Gerritt Bakker',email:'gbakker@adrm-security.com'},
    {name:'Jennifer Doe',email:'jennifer@acme.com'}
  ].forEach(c => { __contactByEmail[c.email.toLowerCase()] = c; });
}
function resolveName(email){
  const e = String(email||'').toLowerCase();
  if (!e) return { name:'', email:'', warn:true };
  const hit = __contactByEmail[e];
  if (hit) return { name:hit.name, email, warn:false };
  return { name:email, email, warn:true };

function makeBlock(type, props={}){
  const base = { id: props.id || `tmp-bl-${Date.now()}-${Math.floor(Math.random()*9999)}`, type };
  switch(type){
    case 'heading':   return { ...base, text: props.text||'', level: +props.level||1 };
    case 'paragraph': return { ...base, text: props.text||'' };
    case 'bullet':    return { ...base, text: props.text||'' };
    case 'number':    return { ...base, text: props.text||'' };
    case 'check':     return { ...base, text: props.text||'', done: !!props.done };
    case 'code':      return { ...base, text: props.text||'', lang: props.lang||'' };
    case 'quote':     return { ...base, text: props.text||'' };
    case 'divider':   return { ...base };
    case 'callout':   return { ...base, text: props.text||'', tone: props.tone||'info' };
    default:          return { ...base, type:'paragraph', text: props.text||'' };
  }
}

function ingestLane(sl){
  const rawBlocks = Array.isArray(sl?.blocks) ? sl.blocks : [];
  const blocks = rawBlocks.filter(b=>b&&typeof b==='object').map(b => {
    const type = ['heading','paragraph','bullet','number','check','code','quote','divider','callout'].includes(b?.type) ? b.type : 'paragraph';
    return makeBlock(type, { id: b?.id, text: b?.text, level: b?.level, done: b?.done, lang: b?.lang, tone: b?.tone });
  });
  return {
    id: String(sl?.id ?? `tmp-mn-${Date.now()}`),
    meeting_id: String(sl?.meeting_id ?? ''),
    user_email: String(sl?.user_email ?? '').toLowerCase(),
    blocks: blocks.length ? blocks : [makeBlock('paragraph',{text:''})],
    updated_at: String(sl?.updated_at ?? new Date().toISOString()),
    updated_by: String(sl?.updated_by ?? sl?.user_email ?? '')
  };
}
function buildLanePayload(lane){
  return {
    id: String(lane.id),
    meeting_id: String(lane.meeting_id),
    user_email: String(lane.user_email),
    blocks: (lane.blocks||[]).map(b => {
      const out = { id: String(b.id), type: b.type };
      if (b.type !== 'divider') out.text = String(b.text||'');
      if (b.type === 'heading') out.level = +b.level || 1;
      if (b.type === 'check') out.done = !!b.done;
      if (b.type === 'code') out.lang = String(b.lang||'');
      if (b.type === 'callout') out.tone = String(b.tone||'info');
      return out;
    }),
    updated_at: String(lane.updated_at),
    updated_by: String(lane.updated_by||lane.user_email)
  };
}

function getAllLanes(meetingId){

function isBlockEmpty(b){
  if (!b) return true;
  if (b.type === 'divider') return false;
  if (b.type === 'check')   return !(b.text||'').trim();
  return !(b.text||'').trim();

function laneSourceHash(meetingId){
  const lanes = getAllLanes(meetingId);
  const sig = lanes.map(l => `${l.user_email}|${l.updated_at}`).sort().join('#');
  let h = 5381;
  for (let i=0;i<sig.length;i++) h = ((h << 5) + h + sig.charCodeAt(i)) | 0;
  return String(h);
}
function blockToMd(b){
  switch(b.type){
    case 'heading':   return '#'.repeat(Math.min(3,Math.max(1,+b.level||1))) + ' ' + (b.text||'');
    case 'paragraph': return (b.text||'');
    case 'bullet':    return '- ' + (b.text||'');
    case 'number':    return '1. ' + (b.text||'');
    case 'check':     return '- [' + (b.done?'x':' ') + '] ' + (b.text||'');
    case 'code':      return '```' + (b.lang||'') + '\n' + (b.text||'') + '\n```';
    case 'quote':     return '> ' + (b.text||'');
    case 'divider':   return '---';
    case 'callout':   return '> **' + (b.tone==='warn'?'⚠':b.tone==='success'?'✓':'ℹ') + '** ' + (b.text||'');
    default: return '';
  }
}
function laneToMd(lane){ return (lane.blocks||[]).map(blockToMd).filter(s=>s||s==='---').join('\n\n'); }
function stubDedup(meetingId){
  const lanes = getAllLanes(meetingId);
  if (!lanes.length) return '_No notes yet from any participant._';
  const seen = new Map();
  lanes.forEach(lane => {
    const name = resolveName(lane.user_email).name;
    lane.blocks.forEach(b => {
      if (isBlockEmpty(b) || b.type==='divider') return;
      const md = blockToMd(b).trim();
      if (!md) return;
      const key = md.toLowerCase().replace(/\s+/g,' ').trim();
      if (!seen.has(key)) seen.set(key, { md, contributors: new Set() });
      seen.get(key).contributors.add(name);
    });
  });
  return [...seen.values()].map(({md, contributors}) => {
    const tag = contributors.size > 1 ? ` *(${[...contributors].join(', ')})*` : '';
    return md + tag;
  }).join('\n\n');
}
function stubSummary(meetingId){
  const lanes = getAllLanes(meetingId);
  if (!lanes.length) return '_No notes yet from any participant._';
  const actions = [], decisions = [], headings = [];
  lanes.forEach(lane => {
    lane.blocks.forEach(b => {
      if (isBlockEmpty(b)) return;
      const t = (b.text||'').trim();
      if (b.type === 'heading') headings.push(t);
      if (b.type === 'check') actions.push({ text:t, done:b.done, who:resolveName(lane.user_email).name });
      if (/^(decision|decided)[:\s]/i.test(t)) decisions.push({ text:t.replace(/^(decision|decided)[:\s]+/i,''), who:resolveName(lane.user_email).name });
    });
  });
  const lines = ['_Placeholder summary — Phase 2 will replace this with Claude-generated output._', ''];
  if (headings.length) { lines.push('### Topics covered'); headings.slice(0,8).forEach(h => lines.push(`- ${h}`)); lines.push(''); }
  if (decisions.length) { lines.push('### Decisions'); decisions.forEach(d => lines.push(`- ${d.text} *(${d.who})*`)); lines.push(''); }
  if (actions.length) { lines.push('### Action items'); actions.forEach(a => lines.push(`- ${a.done?'[x]':'[ ]'} ${a.text} *(${a.who})*`)); lines.push(''); }
  if (lines.length <= 2) lines.push('_Notes exist but no headings, decisions, or action items detected. Add structure for a richer summary._');
  return lines.join('\n');
}
function regenerateAI(meetingId, kind){
  const mid = String(meetingId);
  aiByMeeting[mid] = aiByMeeting[mid] || {};
  aiByMeeting[mid][kind] = aiByMeeting[mid][kind] || {};
  aiByMeeting[mid][kind].loading = true;
  if (currentTab === kind && editing && String(editing.id) === mid) renderTabContent();
  console.log(`Make payload (meeting_ai_regenerate): { meeting_id: "${mid}", kind: "${kind}" }`);
  setTimeout(() => {
    const md = kind === 'dedup' ? stubDedup(mid) : stubSummary(mid);
    aiByMeeting[mid][kind] = {
      markdown: md, generated_at: new Date().toISOString(),
      source_hash: laneSourceHash(mid), stale: false, loading: false
    };
    if (currentTab === kind && editing && String(editing.id) === mid) renderTabContent();
  }, 400);
}
function isAIStale(meetingId, kind){
  const out = aiByMeeting[meetingId]?.[kind];
  if (!out || out.loading) return false;
  return out.source_hash !== laneSourceHash(meetingId);
}

  const recent = new Date(); recent.setDate(recent.getDate()-30);
  document.getElementById('k-t').textContent = meetings.length;
  document.getElementById('k-r').textContent = meetings.filter(m => { const d=new Date(m.datetime); return !isNaN(d)&&d>=recent; }).length;
  document.getElementById('k-d').textContent = meetings.reduce((s,m)=>s+(m.decisions?.length||0),0);
  document.getElementById('sub').textContent = meetings.length + ' meetings · ' + meetings.reduce((s,m)=>s+(m.attendees?.length||0),0) + ' participant instances';

  const rows = filtered().slice().sort((a,b)=>new Date(b.datetime||0)-new Date(a.datetime||0));
  const host = document.getElementById('list');
  if (!rows.length) {
    host.innerHTML = '<div style="padding:40px;text-align:center;color:#9CA3AF;background:#1f1f1f;border:1px solid #2a2a2a;border-radius:10px">No meetings match.</div>';
    updateSelectAllState();
    return;
  }

  host.innerHTML = rows.map(m => {
    const d = new Date(m.datetime);
    const valid = !isNaN(d.getTime());
    const mn = valid ? d.toLocaleDateString('en-US',{month:'short'}) : '—';
    const dy = valid ? d.getDate() : '?';
    const yr = valid ? d.getFullYear() : '';
    const tm = valid ? d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—';
    const attList = (m.attendees||[]).slice(0,6).map(email => {
      const r = resolveName(email);
      const cls = r.warn ? 'av warn' : 'av';
      const bg = r.warn ? '' : `background:${who(r.name)}`;
      const title = r.warn ? `${esc(email)} (not in contacts)` : esc(r.name);
      return `<span class="${cls}" style="${bg}" title="${title}">${r.warn ? '⚠' : esc(init(r.name))}</span>`;
    }).join('');
    const overflow = (m.attendees?.length||0) > 6 ? `<span class="av" style="background:#252525">+${m.attendees.length-6}</span>` : '';
    const laneCount = Object.keys(notesByMeeting[m.id]||{}).filter(ue => (notesByMeeting[m.id][ue].blocks||[]).some(b=>!isBlockEmpty(b))).length;
    const selected = __selected.has(String(m.id));
    const idJson = JSON.stringify(String(m.id));
    return `<div class="mcard${selected?' sel':''}" data-id="${esc(m.id)}">
      <span class="mcheck row-check${selected?' on':''}" onclick="event.stopPropagation();toggleSelect(${idJson},this)"></span>
      <button class="btn" style="position:absolute;top:10px;right:10px;padding:3px 8px;font-size:14px;line-height:1;z-index:5" onclick='event.stopPropagation();showRowMenu(this,[{label:"Update",fn:()=>openD(${idJson})},{label:"Duplicate",fn:()=>duplicateMeeting(${idJson})},{divider:true},{label:"Delete",color:"#EF4444",fn:()=>deleteMeeting(${idJson})}])'>⋯</button>
      <div class="mhead"><div class="mdate"><div class="mdate-m">${esc(mn)}</div><div class="mdate-d">${esc(dy)}</div><div class="mdate-y">${esc(yr)}</div></div>
        <div class="mbody"><div class="mtitle">${esc(m.title||'(untitled)')}</div>
          <div class="mmeta">${esc(tm)} · ${m.duration_min||0} min · ${m.attendees?.length||0} attendees</div>
          <div class="mattend">${attList}${overflow}</div></div></div>
      <div class="mstats">
        <div class="mstat">📋 ${m.agenda?'Agenda':'No agenda'}</div>
        <div class="mstat">✓ ${m.decisions?.length||0} decisions</div>
        ${laneCount>0?`<div class="mstat"><span class="mnotes-pill">✎ ${laneCount} ${laneCount===1?'note':'notes'}</span></div>`:''}
        ${(m.decisions||[]).some(d=>d.action_task_id)?`<div class="mstat" style="color:#9ec2f4">↗ ${(m.decisions||[]).filter(d=>d.action_task_id).length} task${(m.decisions||[]).filter(d=>d.action_task_id).length===1?'':'s'}</div>`:''}
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.mcard[data-id]').forEach(el => {
    el.onclick = (e) => {
      if (e.target.closest('.mcheck') || e.target.closest('button')) return;
      openD(el.dataset.id);
    };
  });
  updateSelectAllState();
}

function duplicateMeeting(id){
  const src = meetings.find(x=>String(x.id)===String(id));
  if (!src) return;
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = `tmp-${Date.now()}`;
  copy.title = 'Copy of ' + copy.title;
  copy.decisions = (copy.decisions||[]).map((d,i)=>({ id:`tmp-dec-${Date.now()}-${i}`, text:d.text, action_task_id:null }));
  copy.__datetimeDirty = false;
  meetings.unshift(copy);
  try{parent.postMessage({type:'toast',msg:'Duplicated',kind:'success'},'*');}catch(e){}
  renderAll();
}
function deleteMeeting(id){
  if (!confirm('Delete this meeting?')) return;
  meetings = meetings.filter(x=>String(x.id)!==String(id));
  delete notesByMeeting[String(id)];
  delete aiByMeeting[String(id)];
  __selected.delete(String(id));
  console.log('Make payload (meeting_delete):', { id:String(id) });
  try{parent.postMessage({type:'toast',msg:'Deleted',kind:'success'},'*');}catch(e){}
  renderAll();
}

let __selected = new Set();
function toggleSelect(id, el){
  const key = String(id);
  if (__selected.has(key)) { __selected.delete(key); el?.classList.remove('on'); el?.closest('.mcard')?.classList.remove('sel'); }
  else { __selected.add(key); el?.classList.add('on'); el?.closest('.mcard')?.classList.add('sel'); }
  updateBulkBar();
}
function updateBulkBar(){
  const n = __selected.size;
  const c = document.getElementById('bulk-count'); if(c) c.textContent = n;
  const b = document.getElementById('bulk-bar'); if(b) b.classList.toggle('show', n>0);
  updateSelectAllState();
}
function clearSelection(){
  __selected.clear();
  document.querySelectorAll('.row-check.on').forEach(c=>c.classList.remove('on'));
  document.querySelectorAll('.mcard.sel').forEach(c=>c.classList.remove('sel'));
  updateBulkBar();
}
function toggleSelectAllVisible(){
  const visIds = filtered().map(m=>String(m.id));
  const allSelected = visIds.length>0 && visIds.every(id=>__selected.has(id));
  if (allSelected) visIds.forEach(id=>__selected.delete(id));
  else visIds.forEach(id=>__selected.add(id));
  document.querySelectorAll('.mcard[data-id]').forEach(card=>{
    const id = card.dataset.id;
    const chk = card.querySelector('.row-check');
    if (chk) chk.classList.toggle('on', __selected.has(id));
    card.classList.toggle('sel', __selected.has(id));
  });
  updateBulkBar();
}
function updateSelectAllState(){
  const visIds = filtered().map(m=>String(m.id));
  const selVisCount = visIds.filter(id=>__selected.has(id)).length;
  let state, label;
  if (visIds.length===0) { state='empty'; label='Select all'; }
  else if (selVisCount===0) { state='none'; label=`Select all (${visIds.length})`; }
  else if (selVisCount===visIds.length) { state='all'; label='Deselect all'; }
  else { state='mixed'; label=`Select all (${visIds.length})`; }
  ['selall-hdr','selall-bar'].forEach(hostId=>{
    const host = document.getElementById(hostId);
    if (!host) return;
    const chk = host.querySelector('.row-check');
    const lbl = document.getElementById(hostId+'-lbl');
    if (chk) { chk.classList.remove('on','mixed'); if (state==='all') chk.classList.add('on'); if (state==='mixed') chk.classList.add('mixed'); }
    if (lbl) lbl.textContent = label;
    host.style.opacity = state==='empty' ? '.5' : '1';
    host.style.pointerEvents = state==='empty' ? 'none' : 'auto';
  });
}
function bulkDelete(){
  if (!__selected.size) return;
  const n = __selected.size;
  if (!confirm(`Delete ${n} meeting${n===1?'':'s'}?`)) return;
  const meeting_ids = [...__selected].map(id=>String(id));
  meeting_ids.forEach(id=>{ delete notesByMeeting[id]; delete aiByMeeting[id]; });
  meetings = meetings.filter(m=>!__selected.has(String(m.id)));
  console.log('Make payload (meetings_bulk_delete):', { meeting_ids });
  try{parent.postMessage({type:'toast',msg:`${n} deleted`,kind:'success'},'*');}catch(e){}
  clearSelection(); renderAll();
}
function bulkImport(){
  const rows = prompt('Paste titles — one meeting per line:');
  if (!rows) return;
  const lines = rows.split('\n').filter(l=>l.trim());
  let added=0;
  lines.forEach((line,i)=>{
    meetings.push(ingestMeeting({ id:`tmp-${Date.now()}-${i}`, title:line.trim(), datetime:new Date().toISOString(), duration_min:60, attendees:[], agenda:'', notes:'', decisions:[] }, i));
    added++;
  });
  try{parent.postMessage({type:'toast',msg:`${added} imported`,kind:'success'},'*');}catch(e){}
  renderAll();
}
document.getElementById('srch').oninput = renderAll;

function openD(id){
  if (id != null) {
    const src = meetings.find(m=>String(m.id)===String(id));
    if (!src) return;
    editing = JSON.parse(JSON.stringify(src));
    editing.__datetimeDirty = false;
    migrateLegacyNotesIfNeeded(editing);
    currentTab = 'mynotes';
  } else {
    editing = ingestMeeting({ id:null, title:'', datetime:new Date().toISOString(), duration_min:60, attendees:[], agenda:'', notes:'', decisions:[] }, 0);
    editing.id = `tmp-${Date.now()}`;
    currentTab = 'details';
  }
  document.getElementById('drt').textContent = id ? 'Update Meeting' : 'New Meeting';
  document.getElementById('bd').style.display = id ? 'inline-block' : 'none';
  renderDrawerHeader();
  renderTabs();
  renderTabContent();
  document.getElementById('dbg').classList.add('on');
  document.getElementById('dr').classList.add('on');
}
function closeD(){
  Object.values(__saveTimers).forEach(t=>clearTimeout(t));
  document.getElementById('dbg').classList.remove('on');
  document.getElementById('dr').classList.remove('on');
  editing = null;
  closeSlashMenu();
}
function renderDrawerHeader(){
  const m = editing; if (!m) return;
  const sub = document.getElementById('drt-sub');
  const d = new Date(m.datetime);
  const valid = !isNaN(d.getTime());
  const when = valid ? d.toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const titleTxt = m.title?.trim() ? esc(m.title) : '<em style="color:#6a6a6a">Untitled meeting</em>';
  document.getElementById('drt').innerHTML = titleTxt;
  sub.innerHTML = `<span>${esc(when)}</span><span>·</span><span>${m.duration_min||0} min</span><span>·</span><span>${m.attendees?.length||0} attendees</span>`;
}
function renderTabs(){
  const m = editing; if (!m) return;
  const isNew = !meetings.some(x=>String(x.id)===String(m.id));
  const laneCount = Object.keys(notesByMeeting[m.id]||{}).filter(ue=>(notesByMeeting[m.id][ue].blocks||[]).some(b=>!isBlockEmpty(b))).length;
  const dedupStale = aiByMeeting[m.id]?.dedup && isAIStale(m.id,'dedup');
  const summStale  = aiByMeeting[m.id]?.summary && isAIStale(m.id,'summary');
  const tabs = [
    { key:'details', label:'Details', icon:'ⓘ' },
    { key:'mynotes', label:'My Notes', icon:'✎', disabled:isNew },
    { key:'allnotes', label:'All Notes', icon:'👥', count:laneCount, disabled:isNew },
    { key:'dedup', label:'De-duped', icon:'⚡', disabled:isNew, stale:dedupStale },
    { key:'summary', label:'Summary', icon:'✨', disabled:isNew, stale:summStale }
  ];
  document.getElementById('drawer-tabs').innerHTML = tabs.map(t => {
    const cls = ['tab', currentTab===t.key?'on':'', t.disabled?'disabled':''].filter(Boolean).join(' ');
    const count = t.count!=null ? `<span class="tab-count">${t.count}</span>` : '';
    const stale = t.stale ? `<span class="tab-stale">•</span>` : '';
    const attr = t.disabled ? `title="Save the meeting first to enable notes"` : `onclick="switchTab('${t.key}')"`;
    return `<div class="${cls}" ${attr}>${t.icon} ${t.label}${count}${stale}</div>`;
  }).join('');
}
function switchTab(key){
  if (currentTab === 'details') captureDrawerScalars();
  currentTab = key;
  renderTabs();
  renderTabContent();
}
function renderTabContent(){
  const m = editing; if (!m) return;
  const host = document.getElementById('drb');
  document.getElementById('saveDetailsBtn').style.display = currentTab === 'details' ? 'inline-block' : 'none';
  switch(currentTab){
    case 'details':  host.innerHTML = renderDetailsPanel(m); break;
    case 'mynotes':  host.innerHTML = renderMyNotesPanel(m); wireMyNotesPanel(); break;
    case 'allnotes': host.innerHTML = renderAllNotesPanel(m); break;
    case 'dedup':    host.innerHTML = renderAIPanel(m, 'dedup'); break;
    case 'summary':  host.innerHTML = renderAIPanel(m, 'summary'); break;
  }
}

function renderDetailsPanel(m){
  const localDt = isoToLocalInput(m.datetime);
  const attChips = (m.attendees||[]).map((email,i)=>{
    const r = resolveName(email);
    const cls = r.warn ? 'atchip warn' : 'atchip';
    const disp = r.warn ? `⚠ ${esc(email)}` : `${esc(r.name)} <span style="color:#6a6a6a;font-size:10.5px">· ${esc(email)}</span>`;

  const decRows = (m.decisions||[]).map((d,i)=>{
    const conv = d.action_task_id ? `<span class="decpill" onclick="gotoTask(${JSON.stringify(d.action_task_id)})">↗ Task ${esc(d.action_task_id)}</span>` : `<button class="btn sm" onclick="convertDec(${i})">→ Create Task</button>`;
    return `<div class="decrow"><textarea class="dtxt" data-i="${i}" oninput="updateDecText(${i},this.value)" rows="1">${esc(d.text)}</textarea>${conv}<button class="btn sm" style="color:#EF4444" onclick="removeDec(${i})">×</button></div>`;

    <div class="f"><label class="fl">Attendees (${(m.attendees||[]).length})</label><div style="margin-bottom:6px">${attChips||'<span style="color:#6a6a6a;font-size:11.5px;font-style:italic">No attendees yet</span>'}</div><div style="display:flex;gap:6px"><input class="fi" id="d-at-new" placeholder="email@example.com" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();addAttendee();}"/><button class="btn" onclick="addAttendee()">+ Add</button></div></div>
    <div class="f"><label class="fl">Agenda <span style="color:#6a6a6a;font-weight:normal;text-transform:none;letter-spacing:0">(pre-meeting topics)</span></label><input class="fi" id="d-ag" value="${esc(m.agenda)}"/></div>
    <div class="f"><label class="fl">Decisions</label><div id="dec-list">${decRows||'<div style="color:#6a6a6a;font-size:11.5px;font-style:italic;padding:4px 0">No decisions yet</div>'}</div><button class="btn sm" style="margin-top:6px" onclick="addDec()">+ Add decision</button></div>

function addAttendee(){
  const inp = document.getElementById('d-at-new');
  const raw = (inp?.value||'').trim(); if (!raw) return;
  captureDrawerScalars();
  editing.attendees = editing.attendees || [];
  editing.attendees.push(raw);
  renderTabContent();
}
function removeAttendee(i){ captureDrawerScalars(); editing.attendees.splice(i,1); renderTabContent(); }
function addDec(){ captureDrawerScalars(); editing.decisions = editing.decisions||[]; editing.decisions.push({ id:`tmp-dec-${Date.now()}-${editing.decisions.length}`, text:'', action_task_id:null }); renderTabContent(); }
function removeDec(i){ captureDrawerScalars(); editing.decisions.splice(i,1); renderTabContent(); }
function updateDecText(i,val){ if (editing?.decisions?.[i]) editing.decisions[i].text = val; }
function captureDrawerScalars(){
  const ti = document.getElementById('d-ti'); if (ti) editing.title = ti.value;
  const dt = document.getElementById('d-dt');
  if (dt) {
    if (editing.__datetimeDirty || dt.value !== isoToLocalInput(editing.datetime)) {
      editing.__datetimeDirty = true;
      editing.datetime = dt.value;
    }
  }
  const dm = document.getElementById('d-dm'); if (dm) editing.duration_min = +dm.value || 0;
  const ag = document.getElementById('d-ag'); if (ag) editing.agenda = ag.value;
}
function saveM(){
  captureDrawerScalars();
  if (!editing.title?.trim()) { alert('Title required'); return; }
  const finalDatetime = editing.__datetimeDirty ? localInputToIso(editing.datetime) : editing.datetime;
  const toStore = { ...editing, datetime:finalDatetime, __datetimeDirty:false };
  const idx = meetings.findIndex(x=>String(x.id)===String(editing.id));
  if (idx>=0) meetings[idx] = toStore;
  else meetings.push(toStore);
  editing = toStore;
  console.log('Make payload (meeting_save):', buildSavePayload(toStore));
  try{parent.postMessage({type:'toast',msg:'Saved',kind:'success'},'*');}catch(e){}
  renderDrawerHeader(); renderTabs(); renderAll();
}
function delM(){
  if (!editing?.id) return;
  if (!confirm('Delete this meeting?')) return;
  const id = editing.id;
  meetings = meetings.filter(m=>String(m.id)!==String(id));
  delete notesByMeeting[String(id)]; delete aiByMeeting[String(id)];
  __selected.delete(String(id));
  console.log('Make payload (meeting_delete):', { id:String(id) });
  try{parent.postMessage({type:'toast',msg:'Deleted',kind:'success'},'*');}catch(e){}
  closeD(); renderAll();
}

function convertDec(idx){
  if (!editing?.decisions?.[idx]) return;
  const dec = editing.decisions[idx];
  if (dec.action_task_id) { alert('Already converted to Task ' + dec.action_task_id); return; }
  if (!dec.text?.trim()) { alert('Decision text is empty.'); return; }
  if (!confirm('Create a Task from this decision?\n\n"' + dec.text + '"')) return;
  const newTaskId = `tmp-task-${Date.now()}`;
  const task = { id:newTaskId, title:dec.text, status:'Not Started', percent_complete:0, duration_days:1, originFrom:'meeting', originId:dec.id };
  console.log('Make payload (task_save from meeting decision):', task);
  dec.action_task_id = newTaskId;
  const live = meetings.find(m=>String(m.id)===String(editing.id));
  if (live) {
    const ld = (live.decisions||[]).find(d=>String(d.id)===String(dec.id));
    if (ld) ld.action_task_id = newTaskId;
  }
  try{parent.postMessage({type:'toast',msg:'Task created',kind:'success'},'*');}catch(e){}
  renderTabContent(); renderAll();
}
function gotoTask(taskId){ try{parent.postMessage({type:'navigate',section:'actions',entityId:String(taskId)},'*');}catch(e){} }

function renderAIPanel(m, kind){
  const out = aiByMeeting[m.id]?.[kind];
  const laneCount = Object.keys(notesByMeeting[m.id]||{}).filter(ue=>(notesByMeeting[m.id][ue].blocks||[]).some(b=>!isBlockEmpty(b))).length;
  if (laneCount === 0) return `<div class="ai-panel"><div class="notes-empty">No notes yet to ${kind==='dedup'?'de-duplicate':'summarize'}.<div class="notes-empty-hint">Ask participants to add notes, then come back.</div></div></div>`;
  const stale = out && isAIStale(m.id, kind);
  const header = `<div class="ai-header">
    <div class="ai-header-meta">
      ${out?.loading ? '<span>Generating<span class="ai-loading-dots"></span></span>'
        : out ? `<span>Generated ${esc(formatRel(out.generated_at))}</span>${stale?'<span class="ai-stale-pill">⚠ STALE — 1+ LANE EDITED SINCE</span>':'<span class="ai-fresh-pill">✓ UP TO DATE</span>'}`
        : '<span style="color:#6a6a6a">Not yet generated</span>'}
    </div>
    <button class="btn sm bp" onclick="regenerateAI('${esc(m.id)}','${kind}')">${out ? '↻ Regenerate' : 'Generate now'}</button>
  </div>`;
  const placeholder = `<div class="ai-placeholder"><strong>Phase 1 placeholder.</strong> ${kind==='dedup' ? 'Union of all lanes with literal duplicates removed and contributor attribution in <em>italics</em>.' : 'Extracts headings, decisions ("Decision:" prefixed) and checklists from all lanes.'} Phase 2 swaps this for Claude output via Make.</div>`;

  else if (out?.markdown) body = `<div class="ai-output">${mdToHtml(out.markdown)}</div>`;
  else body = '<div class="notes-empty">Click "Generate now" to build the ' + (kind==='dedup'?'de-duplicated':'summary') + ' view.</div>';

function mdToHtml(md){
  if (!md) return '';
  const esc2 = s => String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const lines = md.split('\n');
  const out = [];
  let inList = null, inCode = false, codeBuf = [];
  const flushList = () => { if (inList) { out.push('</'+inList+'>'); inList = null; } };
  for (let i=0;i<lines.length;i++){
    const line = lines[i];
    if (inCode) {
      if (/^```/.test(line)) { out.push('<pre><code>'+esc2(codeBuf.join('\n'))+'</code></pre>'); codeBuf = []; inCode = false; }
      else codeBuf.push(line);
      continue;
    }
    if (/^```/.test(line)) { flushList(); inCode = true; continue; }
    if (/^#{1,3}\s/.test(line)) { flushList(); const h = line.match(/^(#+)\s*(.*)$/); out.push(`<h${h[1].length}>${inline(esc2(h[2]))}</h${h[1].length}>`); continue; }
    if (/^---+\s*$/.test(line)) { flushList(); out.push('<hr style="border:none;border-top:1px solid #2a2a2a;margin:10px 0"/>'); continue; }
    if (/^>\s/.test(line)) { flushList(); out.push(`<blockquote>${inline(esc2(line.replace(/^>\s/,'')))}</blockquote>`); continue; }
    let mch;
    if ((mch = line.match(/^-\s\[([ xX])\]\s(.*)$/))) {
      if (inList !== 'ul') { flushList(); out.push('<ul>'); inList = 'ul'; }
      out.push(`<li>${mch[1].toLowerCase()==='x'?'☑':'☐'} ${inline(esc2(mch[2]))}</li>`); continue;
    }
    if (/^-\s/.test(line)) {
      if (inList !== 'ul') { flushList(); out.push('<ul>'); inList = 'ul'; }
      out.push(`<li>${inline(esc2(line.replace(/^-\s/,'')))}</li>`); continue;
    }
    if (/^\d+\.\s/.test(line)) {
      if (inList !== 'ol') { flushList(); out.push('<ol>'); inList = 'ol'; }
      out.push(`<li>${inline(esc2(line.replace(/^\d+\.\s/,'')))}</li>`); continue;
    }
    if (!line.trim()) { flushList(); continue; }
    flushList();
    out.push(`<p>${inline(esc2(line))}</p>`);
  }
  flushList();
  if (inCode && codeBuf.length) out.push('<pre><code>'+esc2(codeBuf.join('\n'))+'</code></pre>');
  return out.join('');
  function inline(s){
    return s
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`([^`]+)`/g,'<code>$1</code>');
  }
}

// ─── BLOCK EDITOR ───
function renderBlocks(lane, host, readonly){

function renderBlockReadonly(b){

    const nb = makeBlock(newType, {});

function caretAtStart(el){

// ─── UNDO / REDO ───
const __undoStacks = {};   // laneId → array of {blocks, label}

  const snap = stack.pop();
  (__redoStacks[lane.id] = __redoStacks[lane.id] || []).push({ blocks: JSON.parse(JSON.stringify(lane.blocks)), label: snap.label });
  lane.blocks = JSON.parse(JSON.stringify(snap.blocks));
  if (!lane.blocks.length) lane.blocks.push(makeBlock('paragraph',{}));
  lane.updated_at = new Date().toISOString();
  lane.updated_by = __USER__.email;
  scheduleLaneSave(lane);
  renderBlocks(lane, document.getElementById('blk-host'), false);
  renderTabs();

}

  const snap = stack.pop();
  (__undoStacks[lane.id] = __undoStacks[lane.id] || []).push({ blocks: JSON.parse(JSON.stringify(lane.blocks)), label: snap.label });
  lane.blocks = JSON.parse(JSON.stringify(snap.blocks));
  if (!lane.blocks.length) lane.blocks.push(makeBlock('paragraph',{}));

// ─── DRAG & DROP (reorder blocks) ───
let __dragBlockId = null;
function onBlockDragStart(e, lane, blkEl){

function formatRel(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString();
}

  run('md_empty', () => mdToHtml('') === '');

  // ── BULK ──
  run('bulk_string_ids', () => { clearSelection(); toggleSelect('MTG-01', null); const ok = __selected.has('MTG-01'); clearSelection(); return ok; });
  run('bulk_clear', () => { toggleSelect('MTG-01', null); clearSelection(); return __selected.size === 0; });

  // ── XSS in blocks ──
  run('block_xss_text', () => {
    const l = ingestLane({id:'N',meeting_id:'X',user_email:'x@y.z',blocks:[{id:'b',type:'paragraph',text:'<img src=x onerror=alert(1)>'}]});
    const inner = renderBlockReadonly(l.blocks[0]);
    return !inner.includes('<img src=x') && inner.includes('&lt;img');
  });

  // ── DRAWER ──
  run('drawer_open_close', () => {
    openD('MTG-01');
    const open = document.getElementById('dr').classList.contains('on');
    closeD();
    return open && !document.getElementById('dr').classList.contains('on');
  });
  run('drawer_new_default_details', () => { openD(null); const ok = currentTab === 'details'; closeD(); return ok; });
  run('drawer_existing_default_mynotes', () => { openD('MTG-01'); const ok = currentTab === 'mynotes'; closeD(); return ok; });
  run('drawer_new_disables_notes_tabs', () => {
    openD(null);
    const html = document.getElementById('drawer-tabs').innerHTML;
    const ok = (html.match(/class="tab[^"]*disabled/g)||[]).length >= 4;
    closeD();
    return ok;
  });
  run('drawer_switch_to_mynotes', () => {
    openD('MTG-01');
    switchTab('mynotes');
    const ok = currentTab === 'mynotes' && !!document.getElementById('blk-host');
    closeD();
    return ok;
  });
  run('drawer_allnotes_renders_lanes', () => {
    openD('MTG-03');
    switchTab('allnotes');
    const html = document.getElementById('drb').innerHTML;
    const ok = html.includes('notes-lane-header') && (html.match(/notes-lane-name/g)||[]).length >= 2;
    closeD();
    return ok;
  });
  run('drawer_dedup_empty_state', () => {
    openD('MTG-01');
    switchTab('dedup');
    const ok = document.getElementById('drb').innerHTML.includes('No notes yet');
    closeD();
    return ok;
  });
  run('save_details_persists', () => {
    openD(null);
    editing.title = 'Smoke';
    document.getElementById('d-ti').value = 'Smoke';
    saveM();
    const ok = meetings.some(m => m.title === 'Smoke');
    restore();
    return ok;
  });

  // ── FILTER ──
  run('filter_title', () => {
    const srch = document.getElementById('srch'); srch.value = 'Kickoff';
    const ok = filtered().every(m => JSON.stringify(m).toLowerCase().includes('kickoff'));
    srch.value = '';
    return ok;
  });
  run('filter_note_text', () => {
    const srch = document.getElementById('srch'); srch.value = 'alignment';
    const ok = filtered().some(m => m.id === 'MTG-03');
    srch.value = '';
    return ok;
  });

  // ── AUTOSAVE TIMERS ──
  run('schedule_lane_save_debounces', () => {
    const lane = ensureLane('MTG-03', __USER__.email);
    scheduleLaneSave(lane); scheduleLaneSave(lane);
    return __saveTimers[lane.id] != null;
  });
  run('schedule_ai_regen_debounces', () => {
    scheduleAIRegen('MTG-03'); scheduleAIRegen('MTG-03');
    return __regenTimers['MTG-03'] != null;
  });

  // ── UNDO / REDO ──
  run('undo_pop_restores_snapshot', () => {
    const lane = ensureLane('MTG-UNDO', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{text:'A'})];
    snapshotLane(lane, 'before');
    lane.blocks.push(makeBlock('paragraph',{text:'B'}));
    const before = lane.blocks.length;
    openD(null); editing.id = 'MTG-UNDO'; currentTab='mynotes';
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    const ok = undoLane(lane) === true && lane.blocks.length === 1 && lane.blocks[0].text === 'A';
    document.body.removeChild(host); closeD(); delete notesByMeeting['MTG-UNDO'];
    return ok && before === 2;
  });
  run('undo_empty_stack_returns_false', () => {
    const lane = ensureLane('MTG-U2', __USER__.email);
    delete __undoStacks[lane.id];
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    const ok = undoLane(lane) === false;
    document.body.removeChild(host); delete notesByMeeting['MTG-U2'];
    return ok;
  });
  run('redo_restores_undone', () => {
    const lane = ensureLane('MTG-U3', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{text:'X'})];
    snapshotLane(lane, 'before');
    lane.blocks.push(makeBlock('paragraph',{text:'Y'}));
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    undoLane(lane);
    const afterUndo = lane.blocks.length;
    redoLane(lane);
    const ok = afterUndo === 1 && lane.blocks.length === 2 && lane.blocks[1].text === 'Y';
    document.body.removeChild(host); delete notesByMeeting['MTG-U3'];
    return ok;
  });
  run('new_snapshot_clears_redo', () => {
    const lane = ensureLane('MTG-U4', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{text:'A'})];
    snapshotLane(lane,'s1'); lane.blocks.push(makeBlock('paragraph',{text:'B'}));
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    undoLane(lane);
    snapshotLane(lane,'s2'); // should clear redo
    const ok = (__redoStacks[lane.id]||[]).length === 0;
    document.body.removeChild(host); delete notesByMeeting['MTG-U4'];
    return ok;
  });
  run('undo_cap_respected', () => {
    const lane = ensureLane('MTG-U5', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{})];
    for (let i=0;i<60;i++) snapshotLane(lane, 'n'+i);
    const ok = __undoStacks[lane.id].length === 50;
    delete notesByMeeting['MTG-U5']; delete __undoStacks[lane.id]; delete __redoStacks[lane.id];
    return ok;
  });
  run('undo_deep_copies_blocks', () => {
    const lane = ensureLane('MTG-U6', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{text:'orig'})];
    snapshotLane(lane, 's');
    lane.blocks[0].text = 'mutated';
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    undoLane(lane);
    const ok = lane.blocks[0].text === 'orig';
    document.body.removeChild(host); delete notesByMeeting['MTG-U6'];
    return ok;
  });
  run('undo_structural_flag_after_undo', () => {
    const lane = ensureLane('MTG-U7', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{text:'A'})];
    snapshotLane(lane,'s');
    lane.blocks.push(makeBlock('paragraph',{text:'B'}));
    __lastOpKind = 'text'; // simulate typing
    // undoLane itself doesn't flip __lastOpKind, but touchLaneStructural does before snapshot
    // Here we just verify the stack machinery, not the flag flip
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    const ok = undoLane(lane) === true;
    document.body.removeChild(host); delete notesByMeeting['MTG-U7'];
    return ok;
  });

  // ── REORDER ──
  run('reorder_before_earlier_block', () => {
    const lane = ensureLane('MTG-R1', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{id:'b1',text:'A'}), makeBlock('paragraph',{id:'b2',text:'B'}), makeBlock('paragraph',{id:'b3',text:'C'})];
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    openD(null); editing.id = 'MTG-R1'; currentTab='mynotes';
    reorderBlock(lane, 'b3', 'b1', 'before');
    const ok = lane.blocks.map(b=>b.text).join(',') === 'C,A,B';
    closeD(); document.body.removeChild(host); delete notesByMeeting['MTG-R1'];
    return ok;
  });
  run('reorder_after_later_block', () => {
    const lane = ensureLane('MTG-R2', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{id:'b1',text:'A'}), makeBlock('paragraph',{id:'b2',text:'B'}), makeBlock('paragraph',{id:'b3',text:'C'})];
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    openD(null); editing.id = 'MTG-R2'; currentTab='mynotes';
    reorderBlock(lane, 'b1', 'b3', 'after');
    const ok = lane.blocks.map(b=>b.text).join(',') === 'B,C,A';
    closeD(); document.body.removeChild(host); delete notesByMeeting['MTG-R2'];
    return ok;
  });
  run('reorder_same_id_noop', () => {
    const lane = ensureLane('MTG-R3', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{id:'b1',text:'A'}), makeBlock('paragraph',{id:'b2',text:'B'})];
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    openD(null); editing.id = 'MTG-R3'; currentTab='mynotes';
    const before = lane.blocks.map(b=>b.text).join(',');
    onBlockDrop({preventDefault:()=>{},clientY:0,dataTransfer:{}}, lane, { dataset:{blockId:'b1'}, getBoundingClientRect:()=>({top:0,height:20}), classList:{remove:()=>{}} });
    const ok = lane.blocks.map(b=>b.text).join(',') === before;
    closeD(); document.body.removeChild(host); delete notesByMeeting['MTG-R3'];
    return ok;
  });
  run('reorder_snapshots_for_undo', () => {
    const lane = ensureLane('MTG-R4', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{id:'b1',text:'A'}), makeBlock('paragraph',{id:'b2',text:'B'})];
    delete __undoStacks[lane.id];
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    openD(null); editing.id = 'MTG-R4'; currentTab='mynotes';
    reorderBlock(lane, 'b1', 'b2', 'after');
    const snapCount = (__undoStacks[lane.id]||[]).length;
    closeD(); document.body.removeChild(host); delete notesByMeeting['MTG-R4'];
    return snapCount === 1;
  });
  run('reorder_undo_restores_order', () => {
    const lane = ensureLane('MTG-R5', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{id:'b1',text:'A'}), makeBlock('paragraph',{id:'b2',text:'B'}), makeBlock('paragraph',{id:'b3',text:'C'})];
    delete __undoStacks[lane.id]; delete __redoStacks[lane.id];
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    openD(null); editing.id = 'MTG-R5'; currentTab='mynotes';
    reorderBlock(lane, 'b3', 'b1', 'before'); // C,A,B
    undoLane(lane);
    const ok = lane.blocks.map(b=>b.text).join(',') === 'A,B,C';
    closeD(); document.body.removeChild(host); delete notesByMeeting['MTG-R5'];
    return ok;
  });
  run('reorder_unknown_src_noop', () => {
    const lane = ensureLane('MTG-R6', __USER__.email);
    lane.blocks = [makeBlock('paragraph',{id:'b1',text:'A'}), makeBlock('paragraph',{id:'b2',text:'B'})];
    const host = document.createElement('div'); host.id='blk-host'; document.body.appendChild(host);
    openD(null); editing.id = 'MTG-R6'; currentTab='mynotes';
    const before = lane.blocks.map(b=>b.text).join(',');
    reorderBlock(lane, 'nonexistent', 'b2', 'before');
    const ok = lane.blocks.map(b=>b.text).join(',') === before;
    closeD(); document.body.removeChild(host); delete notesByMeeting['MTG-R6'];
    return ok;
  });
  // ── lastOpKind flag ──
  run('lastOpKind_text_after_typing', () => {
    const lane = ensureLane('MTG-L1', __USER__.email);
    __lastOpKind = 'structural';
    touchLane(lane);
    const ok = __lastOpKind === 'text';
    delete notesByMeeting['MTG-L1'];
    return ok;
  });
  run('lastOpKind_structural_after_snapshot_path', () => {
    const lane = ensureLane('MTG-L2', __USER__.email);
    __lastOpKind = 'text';
    touchLaneStructural(lane, 'x');
    const ok = __lastOpKind === 'structural';
    delete notesByMeeting['MTG-L2']; delete __undoStacks[lane.id];
    return ok;
  });

  restore(); renderAll();

  const pass = Object.values(results).filter(v=>v==='PASS').length;
  const total = Object.keys(results).length;
  results.__summary__ = `${pass}/${total} passed`;
  return results;
};

</script></body></html>
